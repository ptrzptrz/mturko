<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="turko">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#161512">
<title>turko</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
/* ── Design System Tokens ── */
:root{
  /* Palette B — WCAG AA accessible */
  --bg:#161512;
  --surface:#1d1a16;
  --border:#2a2724;
  --border-light:#252220;
  --text:#e8e6e3;
  --muted:#8a8580;
  --dim:#6a6560;
  --ghost:#504a45;
  --green:#7ab535;
  --green-dark:#3d6b1a;
  --red:#d45454;
  --red-bg:#2a1010;
  --gold:#b8a04a;
  --white-piece:#c8c4be;
  /* Typography scale */
  --fs-hero:48px;
  --fs-hero-sm:32px;
  --fs-title:22px;
  --fs-body:16px;
  --fs-caption:13px;
  --fs-label:12px;
  --fs-micro:10px;
  /* Spacing (4px scale) */
  --sp-xs:4px;
  --sp-sm:8px;
  --sp-md:12px;
  --sp-lg:16px;
  --sp-xl:24px;
  /* Radius */
  --r-sm:10px;
  --r-md:14px;
  --r-lg:16px;
  --r-xl:24px;
  /* Animation */
  --ease-out:cubic-bezier(.2,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur-fast:150ms;
  --dur-normal:250ms;
  --dur-slow:400ms;
}

/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html{background:var(--bg);overscroll-behavior:none}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);max-width:480px;margin:0 auto;height:100dvh;overflow:hidden;overscroll-behavior:none}
input,select,textarea{background:var(--border);border:1px solid var(--ghost);border-radius:var(--r-sm);color:var(--text);padding:13px 14px;font-size:var(--fs-body);font-family:inherit;width:100%;outline:none;display:block;-webkit-user-select:text;user-select:text}
input:focus,select:focus,textarea:focus{border-color:var(--dim)}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0px 1000px #161512 inset;-webkit-text-fill-color:#e8e6e3}
input::placeholder,textarea::placeholder{color:#6a6560}
button{cursor:pointer;font-family:inherit;border:none;-webkit-tap-highlight-color:transparent;outline:none}
.hidden{display:none!important}

/* ── Layout ── */
#main{height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-top:calc(env(safe-area-inset-top,20px) + 12px)}
.pages{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex;flex-direction:column;animation:pageFadeIn .18s ease}
@keyframes pageFadeIn{from{opacity:0}to{opacity:1}}
#page-home.active{height:100%}
#page-profile.active,#page-lb.active,#page-search.active,#page-tourn.active{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}

/* ── Topbar ── */
body.sheet-open #sa-cover{background:#000000}

/* ── Navbar ── */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);background:var(--bg);z-index:100}
.navbar-frost{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(80px + env(safe-area-inset-bottom,0px));background:linear-gradient(to top, var(--bg) 60%, transparent 100%);pointer-events:none;z-index:99}
.nbtn{flex:1;min-height:52px;padding:10px 0;background:none;border:none;color:#6a6560;font-size:10px;text-transform:uppercase;letter-spacing:.8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;transition:color .2s ease}
.nbtn.on{color:#e8e6e3}
.nbtn:active{opacity:.6}
.nicon{width:22px;height:22px;display:block}
.badge{position:absolute;top:8px;right:calc(50% - 20px);background:#d45454;color:#fff;border-radius:8px;padding:0 5px;font-size:9px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center}

/* ── Auth ── */
#auth{min-height:100dvh;display:flex;flex-direction:column;background:#161512;position:relative}
#auth-splash{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 24px;padding-bottom:20vh}
.auth-wordmark{text-align:center}
.auth-name{font-size:64px;font-weight:800;color:#e8e6e3;letter-spacing:-3px;line-height:1;display:block;animation:authFadeIn .6s ease}
.auth-tagline{font-size:12px;color:#504a45;letter-spacing:2px;text-transform:uppercase;margin-top:8px;display:block;animation:authFadeIn .6s ease .15s both}
.auth-actions{margin-top:48px;width:100%;max-width:320px;animation:authFadeIn .6s ease .3s both}
@keyframes authFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Auth sheets */
.auth-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10001;display:flex;align-items:flex-end;pointer-events:none;transition:background .35s ease}
.auth-sheet-overlay.visible{background:rgba(0,0,0,.6);pointer-events:all}
.auth-sheet{background:#161512;border-radius:24px 24px 0 0;padding:8px 24px calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,0,.24,1)}
.auth-sheet-overlay.visible .auth-sheet{transform:translateY(0)}
.auth-sheet-handle{width:36px;height:4px;background:#2a2724;border-radius:2px;margin:0 auto 20px}
.auth-sheet-title{font-size:22px;font-weight:800;color:#e8e6e3;margin-bottom:24px;letter-spacing:-.5px}
.auth-sheet .frow{margin-bottom:4px}
.auth-sheet .btn-g{margin-top:20px}
.auth-sheet-footer{font-size:11px;color:#504a45;text-align:center;margin-top:16px}

/* Field status indicators */
.auth-field{position:relative;margin-bottom:var(--sp-xs)}
.auth-input.valid{border-bottom-color:#7ab535}
.auth-input.invalid{border-bottom-color:#d45454}
.auth-input{background:transparent;border:none;border-bottom:1px solid #2a2724;border-radius:0;padding:14px 40px 14px 0;font-size:var(--fs-body);font-weight:500;color:#e8e6e3;width:100%;outline:none;display:block;transition:border-color .2s ease;font-family:inherit;-webkit-user-select:text;user-select:text}
.auth-input:focus{border-bottom-color:#e8e6e3}
.auth-input::placeholder{color:#504a45;font-weight:400}
.auth-eye{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;padding:10px;cursor:pointer;color:var(--ghost);transition:color var(--dur-fast)}
.auth-eye:active{color:var(--muted)}
.auth-eye svg{width:20px;height:20px;display:block}
.auth-field-hint{font-size:var(--fs-label);color:#504a45;margin-top:2px;margin-bottom:var(--sp-md);min-height:16px;transition:color .2s;display:flex;align-items:center;gap:6px}
.auth-field-hint.ok{color:#7ab535}
.auth-field-hint.err{color:#d45454;opacity:1}
/* Inline check in hint (14px) — no stroke-dash animation for Safari transform compat */
.check-sm{width:14px;height:14px;flex-shrink:0;display:inline-block}
.check-sm svg{display:block;width:14px;height:14px}
.check-sm .circle{fill:none;stroke-width:1.5;stroke-linecap:round;stroke:var(--ghost)}
.check-sm .mark{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke:var(--ghost)}
.check-sm.ok .circle,.check-sm.ok .mark{stroke:var(--green)}
.check-sm.err .circle,.check-sm.err .mark{stroke:var(--red)}
.btn-g{background:#e8e6e3;color:#161512;border-radius:12px;padding:17px 16px;font-size:16px;font-weight:700;width:100%;margin-top:12px;display:block;transition:transform .15s cubic-bezier(.34,1.56,.64,1),opacity .15s ease;letter-spacing:-.2px}
.box .btn-g{margin-top:32px}
.btn-g:active{transform:scale(0.97);opacity:.9}
.btn-g:disabled{background:#252220;color:#504a45;cursor:not-allowed;transform:none}
.btn-o{background:transparent;color:#6a6560;border:none;padding:16px;font-size:14px;width:100%;margin-top:4px;display:block;transition:color .15s ease}
.btn-o:active{color:#e8e6e3}
.err{color:#d45454;font-size:13px;margin-top:12px;min-height:18px;opacity:0;transition:opacity .2s ease}
.err.visible{opacity:1}

/* ── Common ── */
.empty{color:#504a45;text-align:center;margin-top:48px;font-size:14px}
.slabel{font-size:11px;font-weight:600;color:#6a6560;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.divider{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:600;color:#504a45;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1.2px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#252220}

/* ── Notif ── */
.notif{position:fixed;top:calc(env(safe-area-inset-top,20px) + 20px);left:50%;transform:translateX(-50%) translateY(-4px);background:#e8e6e3;color:#161512;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;max-width:90vw;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s}
.notif.err{background:#2a1010;color:#e87070;border:1px solid rgba(200,50,50,.2)}
@keyframes glowWin{0%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0px rgba(98,153,36,0)}50%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 30px rgba(98,153,36,.12)}100%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0px rgba(98,153,36,0)}}
.notif.result{top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 120px);left:50%;font-size:16px;font-weight:700;padding:14px 28px;border-radius:16px;letter-spacing:-.2px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.notif.result-win{background:#1a2a10;color:#8cbf4a;border:1px solid rgba(98,153,36,.15);box-shadow:0 4px 24px rgba(0,0,0,.5);animation:glowWin .6s ease .3s both}
.notif.result-loss{background:#252220;color:#e8e6e3;border:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.notif.result-draw{background:#252220;color:#8a8580;border:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#161512;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Home hero header ── */
/* STEP 1: padding compatto — meno spazio sprecato sopra il fold */
.home-header{flex-shrink:0;background:var(--bg)}
.home-hero{padding:6px 16px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.home-hero:active{opacity:.7}
.home-chips{display:flex;gap:var(--sp-sm);padding:var(--sp-md) 16px}
.home-feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 16px calc(80px + env(safe-area-inset-bottom,0px));overscroll-behavior:contain}
.home-feed::-webkit-scrollbar{display:none}
.home-hero:active{opacity:.7}
.home-hero-nick{font-size:11px;font-weight:600;color:#8a8580;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.home-hero-elo-row{display:flex;align-items:baseline;gap:10px}
.home-hero-elo{font-size:48px;font-weight:800;color:#e8e6e3;letter-spacing:-2px;line-height:1}
.home-hero-delta{font-size:15px;font-weight:600;letter-spacing:-.3px}
.home-hero-delta.up{color:#7ab535}
.home-hero-sub{font-size:11px;color:#504a45;margin-top:0;min-height:0}
.home-hero-progress{margin-top:6px;margin-bottom:8px;width:140px}
.h-progress-bar{height:1.5px;background:#252220;border-radius:1px;overflow:hidden}
.h-progress-fill{height:100%;background:#7ab535;border-radius:1px;transition:width .6s ease}
.h-progress-label{font-size:10px;color:#504a45;margin-top:3px}
/* STEP 1: delta down era #c33 — ora coerente con sistema: rosso solo per perdite, non per draw */
.home-hero-delta.down{color:#d45454}

/* ── Home active section ── */
#home-active{flex-shrink:0}
#home-active:empty{display:none}

/* ── CAB (legacy — hidden) ── */
#cab{display:none}



/* ── Action sheet colore ── */
.asheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10001;display:flex;align-items:flex-end;pointer-events:none}
.asheet-overlay.visible{background:rgba(0,0,0,.75);pointer-events:all}
.asheet{background:#161512;border-radius:24px 24px 0 0;padding:24px 16px 40px;width:100%;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.24,1)}
.asheet-overlay.visible .asheet{transform:translateY(0)}
.asheet-eyebrow{font-size:11px;color:#8a8580;text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.asheet-cta{width:100%;background:#e8e6e3;border:none;border-radius:14px;padding:16px;color:#161512;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .12s;margin-bottom:8px}
.asheet-cta:active{opacity:.85;transform:scale(.99)}
.asheet-cta:disabled{background:#252220;color:#504a45;cursor:not-allowed}

/* Animazioni */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cardEnter{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.card-enter{animation:cardEnter .35s cubic-bezier(.2,0,.2,1) both}

/* ── Storico — archivio, non UI primaria ── */

/* Action sheet risultato */
.rsheet-context{font-size:var(--fs-caption);color:var(--muted);text-align:center;margin-bottom:var(--sp-lg);font-weight:500}
.rsheet-btns{background:#252220;border-radius:14px;overflow:hidden;margin-bottom:8px}
.rsheet-btn{width:100%;padding:var(--sp-lg);border-radius:0;font-size:var(--fs-body);font-weight:600;text-align:center;cursor:pointer;transition:opacity var(--dur-fast),background .1s;border:none;border-bottom:0.5px solid var(--border);font-family:inherit;letter-spacing:-.2px;background:transparent;color:var(--text)}
.rsheet-btn:last-child{border-bottom:none}
.rsheet-btn:active{background:var(--border);opacity:.8}
.rsheet-cancel{width:100%;background:transparent;border:none;color:var(--dim);font-size:var(--fs-caption);font-weight:500;padding:var(--sp-lg);cursor:pointer;font-family:inherit;transition:opacity var(--dur-fast);text-align:center}
.rsheet-cancel:active{opacity:.5}

/* ── Profile ── */
.prof-sticky{flex-shrink:0;background:#161512;padding:0 16px}
.prof-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 16px calc(80px + env(safe-area-inset-bottom,0px));overscroll-behavior:contain}
.prof-scroll::-webkit-scrollbar{display:none}
.prof-header{padding:8px 0 4px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.prof-header-left{flex:1;min-width:0}
.prof-header-right{flex-shrink:0;text-align:right}
.prof-nick{font-size:20px;font-weight:700;color:#e8e6e3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-rank-meta{font-size:11px;color:#6a6560;margin-top:2px}
.prof-bio{font-size:12px;color:#8a8580;margin-top:3px;max-width:200px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prof-city{font-size:11px;color:#504a45;margin-top:2px}
.prof-elo-num{font-size:32px;font-weight:800;color:#e8e6e3;line-height:1}
.prof-elo-peak{font-size:11px;color:#6a6560;margin-top:3px}
.prof-elo-peak strong{color:#8a8580;font-weight:600}
.prof-elo-gap{font-size:11px;color:#d45454;margin-top:1px}
.prof-chart-wrap{margin-bottom:14px;position:relative}
.prof-chart-header{display:flex;align-items:baseline;justify-content:space-between;padding:0 0 8px}
.prof-chart-val{font-size:20px;font-weight:800;color:#e8e6e3;transition:opacity .12s;min-width:50px}
.prof-chart-val.empty{opacity:0}
.prof-chart-date{font-size:11px;color:#6a6560;margin-left:6px;transition:opacity .12s}
.prof-chart-chips{display:flex;gap:4px}
.prof-chart-chip{background:transparent;border:none;color:#6a6560;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit;transition:color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.prof-chart-chip.active{background:#252220;color:#e8e6e3}
.prof-chart-chip:active{opacity:.6}
.prof-kebab{background:none;border:none;color:#504a45;font-size:20px;cursor:pointer;padding:4px 0 4px 8px;line-height:1;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prof-kebab:active{color:#8a8580}
.prof-footer{padding:24px 0 16px;text-align:center}
.prof-footer-link{background:none;border:none;color:#6a6560;font-size:13px;font-weight:500;cursor:pointer;padding:10px 16px;display:block;width:100%;-webkit-tap-highlight-color:transparent}
.prof-footer-link:active{color:#8a8580}
.back-btn{background:none;border:none;color:#6a6560;font-size:13px;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.back-btn:active{opacity:.7}
/* ── Skeleton loading ── */
.skel{border-radius:6px;background:#252220;position:relative;overflow:hidden}
.skel::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);animation:skel-shimmer 1.5s ease infinite}
@keyframes skel-shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.skel-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid #252220}
.skel-row:last-child{border-bottom:none}
.skel-left{display:flex;flex-direction:column;gap:6px}
.skel-chart{margin-bottom:14px}
/* ═══════════════════════════════════════════════════════════
   DESIGN SYSTEM COMPONENTS (v2)
   These coexist with legacy styles during migration.
   Prefix: ds- where ambiguous, otherwise clean names.
   ═══════════════════════════════════════════════════════════ */

/* ── Group: rounded container ── */
.ds-group{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:var(--sp-md)}

/* ── Cell: tappable row inside group, 44px min HIG ── */
.ds-cell{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-md) var(--sp-lg);min-height:44px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background var(--dur-fast)}
.ds-cell:last-child{border-bottom:none}
.ds-cell:active{background:var(--border)}
.ds-cell.static{cursor:default}
.ds-cell.static:active{background:transparent}
.ds-cell.is-me{background:#242018}
.ds-cell.nested{padding-left:var(--sp-xl);background:#242018;cursor:default}
.ds-cell.nested:active{background:#242018}
.ds-cell-left{flex:1;min-width:0}
.ds-cell-right{flex-shrink:0;text-align:right}
.ds-cell-name{font-size:var(--fs-body);font-weight:600;color:var(--text)}
.ds-cell-meta{font-size:var(--fs-label);color:var(--dim);margin-top:2px}
.ds-cell-value{font-size:var(--fs-body);font-weight:700}
.ds-cell-sub{font-size:var(--fs-label);font-weight:500;margin-top:2px}
.ds-cell-rank{font-size:var(--fs-caption);font-weight:600;color:var(--dim);width:24px;text-align:center;flex-shrink:0;margin-right:var(--sp-md)}

/* ── Card A1: active match card with accent bar ── */
.ds-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-md);min-height:56px;margin-bottom:var(--sp-sm);display:flex;align-items:center;overflow:hidden}
.ds-card.passive{opacity:.5}
.ds-card-accent{width:3px;min-width:3px;align-self:stretch;flex-shrink:0}
.ds-card-accent.green{background:var(--green)}
.ds-card-accent.gray{background:var(--ghost)}
.ds-card-accent.red{background:var(--red)}
.ds-card-body{flex:1;min-width:0;padding:var(--sp-md) var(--sp-sm) var(--sp-md) var(--sp-lg)}
.ds-card-name{font-size:var(--fs-body);font-weight:600;color:var(--text)}
.ds-card-elo{font-size:var(--fs-label);color:var(--dim);font-weight:400}
.ds-card-status{font-size:var(--fs-label);color:var(--dim);margin-top:2px}
.ds-card-cta{padding:var(--sp-md) var(--sp-lg);flex-shrink:0}
.ds-card-btn{border:none;border-radius:var(--r-sm);font-size:var(--fs-caption);font-weight:700;cursor:pointer;font-family:inherit;padding:var(--sp-sm) var(--sp-lg);white-space:nowrap;transition:opacity var(--dur-fast),transform .1s}
.ds-card-btn:active{opacity:.75;transform:scale(.97)}
.ds-card-btn.primary{background:var(--text);color:var(--bg)}
.ds-card-btn.ghost{background:var(--border);color:var(--dim)}
.ds-card-btn.danger{background:rgba(212,84,84,.15);color:var(--red)}

/* ── Chip: filter pills ── */
.ds-chip{display:inline-block;padding:var(--sp-sm) var(--sp-lg);border-radius:20px;font-size:var(--fs-caption);font-weight:600;font-family:inherit;cursor:pointer;border:none;background:var(--border);color:var(--dim);white-space:nowrap;transition:background var(--dur-fast),color var(--dur-fast)}
.ds-chip:active{opacity:.6}
.ds-chip.on{background:var(--text);color:var(--bg)}
.ds-chip-sm{display:inline-block;padding:4px 10px;border-radius:20px;font-size:var(--fs-label);font-weight:600;font-family:inherit;cursor:pointer;border:none;background:var(--border);color:var(--dim);transition:background var(--dur-fast),color var(--dur-fast)}
.ds-chip-sm:active{opacity:.6}
.ds-chip-sm.on{background:var(--text);color:var(--bg)}

/* ── W-L-D pills ── */
.ds-wld{display:flex;align-items:center;gap:4px}
.ds-wl{font-size:var(--fs-label);font-weight:700;min-width:24px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;padding:0 6px}
.ds-wl.w{background:rgba(122,181,53,.12);color:var(--green)}
.ds-wl.l{background:rgba(212,84,84,.12);color:var(--red)}
.ds-wl.d{background:rgba(138,133,128,.1);color:var(--dim)}

/* ── Section label ── */
.ds-section{font-size:var(--fs-micro);font-weight:600;color:var(--ghost);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:var(--sp-sm);margin-top:var(--sp-xl)}

/* ── Stats group (collapsible) ── */
.ds-stats{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-md);overflow:hidden;margin-bottom:var(--sp-md)}
.ds-stats-header{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-md) var(--sp-lg);cursor:pointer;min-height:44px;transition:background var(--dur-fast)}
.ds-stats-header:active{background:var(--border)}
.ds-stats-label{font-size:var(--fs-caption);font-weight:600;color:var(--text)}
.ds-stats-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.ds-stats-inner{padding:0 var(--sp-lg) var(--sp-lg);border-top:0.5px solid var(--border)}
.ds-stats-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-sm) 0}
.ds-stats-row:first-child{padding-top:var(--sp-md)}
.ds-stats-row:last-child{padding-bottom:0}
.ds-stats-row-label{font-size:var(--fs-label);color:var(--dim)}
.ds-stats-row-value{font-size:var(--fs-caption);font-weight:600;color:var(--text)}

/* ── Buttons ── */
.ds-btn-primary{background:var(--text);color:var(--bg);border:none;border-radius:var(--r-md);padding:17px var(--sp-lg);font-size:var(--fs-body);font-weight:700;font-family:inherit;width:100%;cursor:pointer;transition:transform var(--dur-fast) var(--ease-spring),opacity var(--dur-fast);letter-spacing:-.2px}
.ds-btn-primary:active{transform:scale(.97);opacity:.9}
.ds-btn-primary:disabled{background:var(--border);color:var(--ghost);cursor:not-allowed;transform:none}
.ds-btn-secondary{background:transparent;color:var(--dim);border:none;padding:var(--sp-lg);font-size:var(--fs-caption);font-weight:500;font-family:inherit;width:100%;cursor:pointer;text-align:center}
.ds-btn-secondary:active{color:var(--text)}

/* ── Sheet ── */
.ds-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10001;display:flex;align-items:flex-end;pointer-events:none;transition:background .35s}
.ds-sheet-overlay.visible{background:rgba(0,0,0,.6);pointer-events:all}
.ds-sheet{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:var(--sp-sm) var(--sp-xl) calc(var(--sp-xl) + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform var(--dur-slow) var(--ease-out)}
.ds-sheet-overlay.visible .ds-sheet{transform:translateY(0)}
.ds-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.ds-sheet-title{font-size:var(--fs-title);font-weight:800;color:var(--text);margin-bottom:var(--sp-xl);letter-spacing:-.5px}
.ds-sheet-option{width:100%;padding:var(--sp-lg) 0;border:none;background:transparent;color:var(--text);font-size:var(--fs-body);font-weight:500;text-align:left;cursor:pointer;font-family:inherit;border-bottom:0.5px solid var(--border);transition:opacity var(--dur-fast)}
.ds-sheet-option:last-child{border-bottom:none}
.ds-sheet-option:active{opacity:.5}
.ds-sheet-option.danger{color:var(--red)}

/* ── Dot (presence) ── */
.ds-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green)}
.ds-dot.playing{animation:ds-dp 1.5s ease-in-out infinite}
@keyframes ds-dp{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Accordion ── */
.ds-acc{max-height:0;overflow:hidden;transition:max-height .3s ease}

/* ── Feed divider ── */
.ds-divider{display:flex;align-items:center;gap:10px;font-size:var(--fs-micro);font-weight:600;color:var(--ghost);margin:var(--sp-lg) 0 var(--sp-sm);text-transform:uppercase;letter-spacing:1.2px}
.ds-divider::before,.ds-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── Challenge sheet (Uber-style) ── */
.ch-time-chip{flex:1;padding:var(--sp-md) 0;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--dim);font-size:var(--fs-caption);font-weight:600;font-family:inherit;cursor:pointer;text-align:center;transition:border-color var(--dur-fast),color var(--dur-fast),background var(--dur-fast)}
.ch-time-chip:active{opacity:.6}
.ch-time-chip.on{border-color:var(--text);color:var(--text);background:var(--surface)}
.ch-color-btn{flex:1;border:none;border-radius:var(--r-lg);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;height:80px;transition:transform var(--dur-normal) var(--ease-spring),opacity var(--dur-fast);opacity:.5}
.ch-color-btn:active{transform:scale(.92);opacity:1}
.ch-color-white{background:var(--text)}
.ch-color-white span{font-size:var(--fs-body);font-weight:700;color:var(--bg);letter-spacing:-.2px}
.ch-color-black{background:var(--bg);box-shadow:inset 0 0 0 1px var(--border)}
.ch-color-black span{font-size:var(--fs-body);font-weight:700;color:var(--text);letter-spacing:-.2px}
.ch-player-row{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-md) 0;border-bottom:0.5px solid var(--border);cursor:pointer;transition:opacity var(--dur-fast)}
.ch-player-row:last-child{border-bottom:none}
.ch-player-row:active{opacity:.5}

/* ── Nav Plus button ── */
.nav-plus-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:52px}
.nav-plus{width:32px;height:32px;border-radius:50%;background:var(--text);color:var(--bg);font-size:22px;font-weight:300;display:flex;align-items:center;justify-content:center;line-height:1;cursor:pointer;border:none;font-family:inherit;transition:transform var(--dur-fast) var(--ease-spring),opacity var(--dur-fast)}
.nav-plus:active{transform:scale(.9);opacity:.8}

/* ── Swipe-to-challenge ── */
.swipe-wrap{position:relative;overflow:hidden;touch-action:pan-y;border-bottom:0.5px solid var(--border)}
.swipe-wrap:last-child{border-bottom:none}
.swipe-reveal{position:absolute;top:0;right:0;bottom:0;width:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:var(--sp-xl);background:var(--border)}

.swipe-reveal.armed{background:var(--text);transition:background 100ms}
.swipe-reveal.armed .swipe-reveal-label{color:var(--bg);transform:scale(1.08)}

.swipe-cell{position:relative;z-index:1;background:var(--surface);transform:translate3d(0,0,0);-webkit-transform:translate3d(0,0,0);touch-action:pan-y}
.swipe-cell.ds-cell{border-bottom:none}
.home-feed.swipe-active{overflow-y:hidden!important}
</style>

<script>
// ── PWA Manifest ──
(function() {
  const manifest = {
    name: 'turko',
    short_name: 'turko',
    description: 'built for over-the-board chess',
    start_url: '/',
    display: 'standalone',
    background_color: '#161512',
    theme_color: '#161512',
    orientation: 'portrait',
    icons: [{
      src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23161512'/><text y='78' x='12' font-size='75'>♟</text></svg>",
      sizes: 'any',
      type: 'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
})();

const SUPA_URL = "https://prmptevzfofmohefyvrl.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBybXB0ZXZ6Zm9mbW9oZWZ5dnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTg2ODEsImV4cCI6MjA4NzY3NDY4MX0.o-CjHwIbfBnCmJfKTDKKtbUok6h6mFQz8Y8O6XiWMzI";

const supabaseClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);

let authToken = null;
let me = null, players = [], matches = [], activeMatch = null, pollTimer = null, heartbeatTimer = null;
let globalMatches = [];
let globalEloCache = {};
let globalEvents = [];
let matchStakes = {}; // Cache: matchId -> {win_delta, loss_delta, draw_delta}

// ── Auto-login: restore session on PWA reopen ──
(async function autoLogin() {
  var authEl = document.getElementById('auth');
  // Hide auth initially
  authEl.style.opacity = '0';
  authEl.style.transition = 'opacity .3s ease';
  
  try {
    // Timeout: if session restore takes > 3s, show splash
    var timeout = setTimeout(function() {
      authEl.style.opacity = '1';
    }, 3000);
    
    var sess = await supabaseClient.auth.getSession();
    if(sess && sess.data && sess.data.session && sess.data.session.access_token) {
      authToken = sess.data.session.access_token;
      var uid = sess.data.session.user.id;
      var res = await fetch(SUPA_URL + '/rest/v1/players?id=eq.' + uid + '&select=*', {
        headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + authToken}
      });
      if(res.ok) {
        var profiles = await res.json();
        if(Array.isArray(profiles) && profiles[0]) {
          clearTimeout(timeout);
          enterApp(profiles[0]);
          return;
        }
      }
    }
  } catch(e) { /* session restore failed */ }
  
  // No valid session — show splash
  authToken = null;
  authEl.style.opacity = '1';
})();

function startPolling() {
  stopPolling();
  pollTimer = setInterval(fetchAll, 10000);
}
function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}
function startHeartbeat() {
  stopHeartbeat();
  sendHeartbeat();
  heartbeatTimer = setInterval(sendHeartbeat, 5000);
}
function stopHeartbeat() {
  clearInterval(heartbeatTimer);
  heartbeatTimer = null;
}
async function sendHeartbeat() {
  if(!me || !authToken) return;
  try {
    await db.patch("players", `id=eq.${me.id}`, {last_seen_at: new Date().toISOString()});
  } catch(e) {}
}

let realtimeChannel = null;
let realtimeOk = false;

function startRealtime() {
  if(realtimeChannel) realtimeChannel.unsubscribe();
  realtimeOk = false;
  realtimeChannel = supabaseClient
    .channel('app-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'matches'}, () => fetchAll())
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'players'}, (payload) => {
      if(payload.new && Array.isArray(players)) {
        const idx = players.findIndex(p => p.id === payload.new.id);
        if(idx !== -1) players[idx] = {...players[idx], ...payload.new};
        else players.push(payload.new);
        if(payload.new.id === me.id) me = {...me, ...payload.new};
      }
    })
    .subscribe((status) => {
      realtimeOk = (status === 'SUBSCRIBED');
      if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        setTimeout(() => { if(me) startRealtime(); }, 3000);
      }
    });
}

function stopRealtime() {
  if(realtimeChannel) { realtimeChannel.unsubscribe(); realtimeChannel = null; }
}

document.addEventListener('visibilitychange', () => {
  if(!me) return;
  if(document.visibilityState === 'visible') {
    fetchAll();
    startPolling();
    startHeartbeat();
  } else {
    stopPolling();
    stopHeartbeat();
  }
});

let profileStack = [];
// ELO chart data managed in drawEloChart

function authHeaders() {
  return {
    "apikey": SUPA_KEY,
    "Authorization": "Bearer " + (authToken || SUPA_KEY),
    "Content-Type": "application/json",

  };
}

const db = {
  async get(t, q="") {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/${t}?${q}`, {headers: authHeaders()});
      return r.json();
    } catch(e) { toast("Errore di connessione", "err"); return null; }
  },
  async post(t, b) {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/${t}`, {method:"POST", headers: authHeaders(), body: JSON.stringify(b)});
      return r.json();
    } catch(e) { toast("Errore di connessione", "err"); return null; }
  },
  async patch(t, q, b) {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/${t}?${q}`, {method:"PATCH", headers: authHeaders(), body: JSON.stringify(b)});
      return r.json();
    } catch(e) { toast("Errore di connessione", "err"); return null; }
  },
  async rpc(fn, b) {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, {method:"POST", headers: authHeaders(), body: JSON.stringify(b)});
      if(r.status === 204 || r.headers.get('content-length') === '0') return {};
      const text = await r.text();
      return text ? JSON.parse(text) : {};
    } catch(e) { toast("Errore di connessione", "err"); return null; }
  },
  async delete(t, q) {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/${t}?${q}`, {method:"DELETE", headers: authHeaders()});
      return r.status;
    } catch(e) { toast("Errore di connessione", "err"); return null; }
  },
};

// ── Copy variantivo risultati ──
const _WIN_COPY  = ['Boom!', 'GG', 'Semplice', 'Clean', 'Bravo', 'Mica male', 'Ez', 'Next.', 'Chirurgico', 'OK!'];
const _LOSS_COPY = ['Capita', 'Skill issue?', 'Cooked', 'Bruh', 'Ahi', 'La prossima', 'No.', 'L', 'Outplayed', 'Rough'];
const _DRAW_COPY = ['Meh', 'Pari', '50/50', 'Mah', 'Ok, I guess', 'Respect', 'Nulla di fatto', 'Pari e patta', 'Mid', 'X'];

function resultCopy(type, delta) {
  const d = delta !== null ? `${delta >= 0 ? '+' : ''}${delta} · ` : '';
  const pool = type === 'win' ? _WIN_COPY : type === 'loss' ? _LOSS_COPY : _DRAW_COPY;
  return d + pool[Math.floor(Math.random() * pool.length)];
}

// ── Toast ──
let _toastQueue = [];
let _toastBusy = false;

function toast(msg, type="ok") {
  _toastQueue.push({msg, type});
  if(!_toastBusy) _toastFlush();
}

function _toastFlush() {
  if(!_toastQueue.length) { _toastBusy = false; return; }
  _toastBusy = true;
  const {msg, type} = _toastQueue.shift();
  const el = $("notif");
  el.textContent = msg;

  const isResult = type.startsWith('result');
  let cls = 'notif';
  if(type === 'err') cls += ' err';
  else if(type === 'result-win')  cls += ' result result-win';
  else if(type === 'result-loss') cls += ' result result-loss';
  else if(type === 'result-draw') cls += ' result result-draw';
  else if(isResult) cls += ' result result-loss';
  el.className = cls;

  el.style.display = "block";
  const initTransform = isResult ? "translateX(-50%) scale(.94)" : "translateX(-50%) translateY(-4px)";
  const showTransform = isResult ? "translateX(-50%) scale(1)"   : "translateX(-50%) translateY(0)";
  const hideTransform = isResult ? "translateX(-50%) scale(.97)" : "translateX(-50%) translateY(-4px)";

  el.style.opacity = "0";
  el.style.transform = initTransform;
  el.style.transition = isResult
    ? 'opacity .2s ease, transform .25s cubic-bezier(.2,1,.3,1)'
    : 'opacity .2s, transform .2s';
  el.getBoundingClientRect();
  el.style.opacity = "1";
  el.style.transform = showTransform;

  const duration = isResult ? 3500 : 2400;
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.transition = isResult
      ? 'opacity .3s ease, transform .3s ease'
      : 'opacity .2s, transform .2s';
    el.style.opacity = "0";
    el.style.transform = hideTransform;
    setTimeout(() => {
      el.style.display = "none";
      _toastBusy = false;
      _toastFlush();
    }, 300);
  }, duration);
}

function isRelativeDate(iso) {
  const now = new Date();
  const d = new Date(iso);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((today - dateDay) / 86400000) <= 7;
}
function fmtDate(iso, relative=false) {
  const now = new Date();
  const d = new Date(iso);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dayDiff = Math.round((today - dateDay) / 86400000);
  if(relative) {
    if(dayDiff === 0) return 'oggi';
    if(dayDiff === 1) return 'ieri';
    if(dayDiff < 7) return `${dayDiff} giorni`;
    if(dayDiff === 7) return 'una settimana';
  } else {
    if(dayDiff === 0) return 'oggi';
    if(dayDiff === 1) return 'ieri';
    if(dayDiff < 7) return `${dayDiff} giorni fa`;
    if(dayDiff === 7) return 'una settimana fa';
  }
  return d.toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'});
}

function makeCheckSvg(ok) {
  var c = ok ? '#7ab535' : '#d45454';
  if(ok) return '<span style="display:inline-block;width:14px;height:14px;flex-shrink:0"><svg viewBox="0 0 14 14" width="14" height="14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="'+c+'" stroke-width="1.5"/><polyline points="4,7.5 6,9.5 10,5" stroke="'+c+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>';

}

function setFieldState(inputId, hintId, checkId, state, text) {
  var input = $(inputId);
  var hint = $(hintId);
  if(input) { input.classList.remove('valid','invalid'); if(state) input.classList.add(state); }
  if(hint) {
    var checkHtml = '';
    if(state === 'valid') checkHtml = makeCheckSvg(true);
    else if(state === 'invalid') checkHtml = makeCheckSvg(false);
    hint.innerHTML = checkHtml + (text ? '<span>' + text + '</span>' : '');
    hint.className = 'auth-field-hint' + (state === 'valid' ? ' ok' : state === 'invalid' ? ' err' : '');
  }
}

$("r-nick").addEventListener("input", function() {
  var nick = this.value.trim();

  if(nick.length < 3) { _setNickState('', 'Ancora ' + (3 - nick.length)); validateRegForm(); return; }

  _nickCheckTimer = setTimeout(async function() {
    if($('r-nick').value.trim() !== checkNick) return;
    try {
      var res = await fetch(SUPA_URL + '/rest/v1/players?nickname=ilike.' + encodeURIComponent(checkNick) + '&select=id', {
        headers: {'apikey': SUPA_KEY}
      });

async function doLogin() {
  clearErr("l-err");
  const nick = $("l-nick").value.trim();
  const pass = $("l-pass").value;
  if(!nick || !pass) return setErr("l-err", "Compila tutti i campi.")
  setLoading("l-btn", true, "Entro...");
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: nick.toLowerCase() + "@barscacchi.local",
    password: pass
  });
  setLoading("l-btn", false, "Entra");
  if(error || !data.session) return setErr("l-err", "Nickname o password errati.")
  authToken = data.session.access_token;
  const profile = await db.get("players", `id=eq.${data.user.id}&select=*`);
  if(!Array.isArray(profile) || !profile[0]) return setErr("l-err", "Profilo non trovato.")
  enterApp(profile[0]);
}

async function doRegister() {
  clearErr("r-err");
  const nick = $("r-nick").value.trim();
  const pass = $("r-pass").value;
  const conf = $("r-conf").value;
  if(!nick) return setErr("r-err", "Inserisci un nickname.")
  if(nick.length < 3) return setErr("r-err", "Nickname minimo 3 caratteri.")
  if(nick.length > 12) return setErr("r-err", "Nickname massimo 12 caratteri.")
  if(!/^[a-zA-Z0-9_-]+$/.test(nick)) return setErr("r-err", "Solo lettere, numeri, _ e - sono permessi.")
  if(pass.length < 6) return setErr("r-err", "Password minimo 6 caratteri.")
  if(pass !== conf) return setErr("r-err", "Le password non coincidono.")
  setLoading("r-btn", true, "Registro...");

  // Try signup
  const { data: signUpData, error: signUpErr } = await supabaseClient.auth.signUp({
    email: nick.toLowerCase() + "@barscacchi.local",
    password: pass
  });

  if(signUpErr) {
    // User might already exist — try login
    const { data: loginData, error: loginErr } = await supabaseClient.auth.signInWithPassword({
      email: nick.toLowerCase() + "@barscacchi.local",
      password: pass
    });
    if(loginErr || !loginData.session) {
      setLoading("r-btn", false, "Registrati");
      return setErr("r-err", "Nickname già in uso.")
    }
    authToken = loginData.session.access_token;
    const existing = await db.get("players", `id=eq.${loginData.user.id}&select=*`);
    if(Array.isArray(existing) && existing[0]) {
      setLoading("r-btn", false, "Registrati");
      return setErr("r-err", "Nickname già in uso.")
    }
    const profile2 = await db.post("players", {id: loginData.user.id, nickname: nick});
    setLoading("r-btn", false, "Registrati");
    if(!Array.isArray(profile2) || !profile2[0]) return setErr("r-err", "Errore nella creazione del profilo.")
    enterApp(profile2[0]);
    return;
  }

  if(!signUpData.user) {
    setLoading("r-btn", false, "Registrati");
    return setErr("r-err", "Errore nella registrazione. Riprova.")
  }

  // Sign in after signup to get session
  const { data: loginData2, error: loginErr2 } = await supabaseClient.auth.signInWithPassword({
    email: nick.toLowerCase() + "@barscacchi.local",
    password: pass
  });
  if(loginErr2 || !loginData2.session) {
    setLoading("r-btn", false, "Registrati");
    return setErr("r-err", "Errore nel login dopo registrazione. Riprova.")
  }
  authToken = loginData2.session.access_token;
  const profile = await db.post("players", {id: signUpData.user.id, nickname: nick});
  setLoading("r-btn", false, "Registrati");
  if(!Array.isArray(profile) || !profile[0]) return setErr("r-err", "Nickname già in uso o errore.")
  enterApp(profile[0]);
}

async function generateMatchEvents(m) {
  if(!m.result || m.result === 'cancelled' || m.result === 'draw') return;

  const winnerId = m.result === 'p1' ? m.p1 : m.p2;
  const loserId = m.result === 'p1' ? m.p2 : m.p1;
  const winner = getP(winnerId);
  const loser = getP(loserId);
  if(!winner || !loser) return;

  const winEh = eloCache[m.id] || globalEloCache[m.id + '_' + winnerId];
  const loseEh = globalEloCache[m.id + '_' + loserId];
  if(!winEh) return;

  const winOldElo = winEh.elo_before;
  const winNewElo = winEh.elo_after;
  const loseOldElo = loseEh ? loseEh.elo_before : null;
  const loseNewElo = loseEh ? loseEh.elo_after : null;

  const eventsToInsert = [];

  // Sorpasso diretto
  if(loseOldElo !== null && loseNewElo !== null) {
    if(winOldElo < loseOldElo && winNewElo > loseNewElo) {
      eventsToInsert.push({
        type: 'overtake', player_id: winnerId, target_id: loserId, match_id: m.id,
        data: { winner_name: winner.nickname, overtaken_name: loser.nickname, new_elo: winNewElo, overtaken_elo: loseNewElo }
      });
    }
  }

  // Sorpassi indiretti (vincitore scavalca terzi)
  players.forEach(p => {
    if(p.id === winnerId || p.id === loserId) return;
    if(p.elo >= winOldElo && p.elo < winNewElo) {
      eventsToInsert.push({
        type: 'overtake', player_id: winnerId, target_id: p.id, match_id: m.id,
        data: { winner_name: winner.nickname, overtaken_name: p.nickname, new_elo: winNewElo, overtaken_elo: p.elo }
      });
    }
  });

  // Sorpassi inversi (terzi superano il perdente)
  if(loseOldElo !== null && loseNewElo !== null) {
    players.forEach(p => {
      if(p.id === winnerId || p.id === loserId) return;
      if(p.elo <= loseOldElo && p.elo > loseNewElo) {
        eventsToInsert.push({
          type: 'overtake', player_id: p.id, target_id: loserId, match_id: m.id,
          data: { winner_name: p.nickname, overtaken_name: loser.nickname, new_elo: p.elo, overtaken_elo: loseNewElo }
        });
      }
    });
  }

  // Upset
  if(loseOldElo !== null && loseOldElo - winOldElo >= 50) {
    eventsToInsert.push({
      type: 'upset', player_id: winnerId, target_id: loserId, match_id: m.id,
      data: { winner_name: winner.nickname, loser_name: loser.nickname, diff: loseOldElo - winOldElo, delta: winNewElo - winOldElo }
    });
  }

  // Milestone ELO
  if(Math.floor(winNewElo / 100) > Math.floor(winOldElo / 100) && winNewElo >= 1500) {
    eventsToInsert.push({
      type: 'milestone', player_id: winnerId, match_id: m.id,
      data: { nickname: winner.nickname, milestone: Math.floor(winNewElo / 100) * 100, elo: winNewElo }
    });
  }

  // Streak (3, 5, 10)
  const streak = winner.win_streak || 0;
  if(streak === 3 || streak === 5 || streak === 10) {
    eventsToInsert.push({
      type: 'streak', player_id: winnerId, match_id: m.id,
      data: { nickname: winner.nickname, streak: streak }
    });
  }

  // Peak (non milestone)
  if(winNewElo > winOldElo && winNewElo > 1500 && Math.floor(winNewElo / 100) === Math.floor(winOldElo / 100)) {
    if(winNewElo >= (winner.elo_peak || 1500)) {
      eventsToInsert.push({
        type: 'peak', player_id: winnerId, match_id: m.id,
        data: { nickname: winner.nickname, elo: winNewElo }
      });
    }
  }

  // Inserisci (fire and forget)
  for(const ev of eventsToInsert) {
    try { await db.post('events', ev); } catch(e) { console.log('Event insert failed:', e); }
  }
}

// --- DATA ---
let eloCache = {};
const _toastedMatchIds = new Set();
const _eventedMatchIds = new Set();

async function fetchAll() {
  if(!me) return;
  const prevMatches = [...matches];
  const [ps, ms, done, eloH, globalDone, globalEloH, dbEvents] = await Promise.all([
    db.get("players", "order=elo.desc"),
    db.get("matches", `or=(p1.eq.${me.id},p2.eq.${me.id})&status=in.(active,pending_challenge)&select=*&order=created_at.desc&limit=50`),
    db.get("matches", `or=(p1.eq.${me.id},p2.eq.${me.id})&status=eq.done&select=*&order=updated_at.desc&limit=30`),
    db.get("elo_history", `player_id=eq.${me.id}&select=*&order=created_at.desc&limit=20`),
    db.get("matches", "status=eq.done&result=not.is.null&result=not.eq.cancelled&order=updated_at.desc&limit=30&select=*"),
    db.get("elo_history", "order=created_at.desc&limit=120&select=*"),
    db.get("events", "order=created_at.desc&limit=50&select=*")
  ]);
  if(Array.isArray(ps)) {
    players = ps;
    const upd = ps.find(p => p.id===me.id);
    if(upd) me = upd;
  }
  if(Array.isArray(ms) && Array.isArray(done)) matches = [...ms, ...done];
  else if(Array.isArray(ms)) matches = ms;
  if(Array.isArray(eloH)) eloH.forEach(e => eloCache[e.match_id] = e);
  if(Array.isArray(globalDone)) globalMatches = globalDone;
  if(Array.isArray(globalEloH)) globalEloH.forEach(e => globalEloCache[e.match_id + '_' + e.player_id] = e);
  if(Array.isArray(dbEvents)) globalEvents = dbEvents;

  updateTopbar();
  await cleanupExpired();

  if(Array.isArray(done)) {
    done.forEach(m => {
      const wasActive = prevMatches.find(p => p.id === m.id && p.status === 'active');
      if(wasActive && !_toastedMatchIds.has(m.id)) {
        _toastedMatchIds.add(m.id);

        if(m.result === 'cancelled') {
          const wasDisputed = wasActive.disputed;
          toast(wasDisputed ? "Partita annullata — nessun accordo" : "Partita annullata", "err");
        } else if(m.result) {
          const isP1 = m.p1 === me.id;
          const won = m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : null;
          const elo = eloCache[m.id];
          const delta = elo ? (elo.elo_after - elo.elo_before) : null;
          if(won === null) toast(resultCopy('draw', delta), 'result-draw');
          else if(won) toast(resultCopy('win', delta), 'result-win');
          else toast(resultCopy('loss', delta), 'result-loss');

          // Genera eventi per questa partita (fire and forget, guard anti-duplicati)
          if(!_eventedMatchIds.has(m.id)) {
            _eventedMatchIds.add(m.id);
            generateMatchEvents(m);
          }
        }
      }
    });
  }

  if(Array.isArray(ms)) {
    ms.forEach(m => {
      const prev = prevMatches.find(p => p.id === m.id);
      if(prev && !prev.disputed && m.disputed) {
        const opp = players.find(p => p.id === (m.p1===me.id ? m.p2 : m.p1));
        // STEP 1: messaggio disputa più chiaro e umano
        toast(`${opp?.nickname||"?"} non è d'accordo`, "err");
      }
    });
  }

  // Fetch ELO stakes for pending challenges
  await fetchMatchStakes();

  renderHome();
}

function updateCountdowns() {
  if(!me) return;
  const now = Date.now();
  let anyExpired = false;
  matches.forEach(m => {
    if(m.status === 'pending_challenge') {
      const elapsed = Date.now() - new Date(m.created_at).getTime();
      const remaining = CHALLENGE_EXPIRE_MS - elapsed;
      const pct = Math.max(0, Math.min(100, (remaining / CHALLENGE_EXPIRE_MS) * 100));
      const urgent = pct < 20;
      const bar = document.getElementById('prog-' + m.id);
      if(bar) {
        bar.style.width = pct + '%';
        bar.className = 'card-challenge-progress' + (urgent ? ' urgent' : '');
      }
      if(remaining <= 0) anyExpired = true;
    }
  });
  if(anyExpired) cleanupExpired();
}
setInterval(updateCountdowns, 1000);

function getP(id) { return players.find(p => p.id===id); }

// ── ELO Odometer ──
let _lastElo = null;
let _lastDelta = null;
let _eloAnimating = false;
const REEL_DURATION = 1200; // ms per il rullo più veloce (cifra meno significativa)
const REEL_STEP = 80;      // ms aggiuntivi per ogni posizione verso sinistra

function animateElo(el, newVal) {
  const firstRender = _lastElo === null;
  if(firstRender) {
    // Login: mostra direttamente, nessuna animazione
    el.textContent = String(newVal);
    _lastElo = newVal;
    return;
  }
  if(_lastElo === newVal) return;
  if(_eloAnimating) { _lastElo = newVal; el.textContent = String(newVal); return; }

  const oldStr = String(_lastElo).padStart(String(newVal).length, '0');
  const newStr = String(newVal).padStart(oldStr.length, '0');
  const goingUp = newVal > _lastElo;
  _lastElo = newVal;
  _eloAnimating = true;

  // Costruisci rulli — una colonna per digit
  el.style.display = 'inline-flex';
  el.style.alignItems = 'flex-start';
  el.style.overflow = 'hidden';
  el.style.lineHeight = '1';

  const digits = newStr.split('');
  const oldDigits = oldStr.split('');
  const total = digits.length;

  el.innerHTML = digits.map((d, i) => {
    const changed = d !== oldDigits[i];
    return `<span class="odo-col" data-new="${d}" data-old="${oldDigits[i]}" data-changed="${changed}" style="display:inline-block;overflow:hidden;vertical-align:top;line-height:1"></span>`;
  }).join('');

  const cols = el.querySelectorAll('.odo-col');
  let maxDuration = 0;

  cols.forEach((col, i) => {
    const changed = col.dataset.changed === 'true';
    const newD = col.dataset.new;
    const oldD = col.dataset.old;

    if(!changed) {
      col.textContent = newD;
      return;
    }

    // Posizione da destra: 0 = cifra meno significativa
    const posFromRight = total - 1 - i;
    const duration = REEL_DURATION + posFromRight * REEL_STEP;
    const delay = posFromRight * 30; // stagger leggero: le unità partono prima
    maxDuration = Math.max(maxDuration, duration + delay);

    // Stack: old sopra, new sotto (o viceversa)
    const fromY = goingUp ? '110%' : '-110%';
    col.style.position = 'relative';
    col.innerHTML = `
      <span class="odo-old" style="display:block">${oldD}</span>
      <span class="odo-new" style="display:block;position:absolute;top:0;left:0;transform:translateY(${fromY})">${newD}</span>`;

    const oldEl = col.querySelector('.odo-old');
    const newEl = col.querySelector('.odo-new');
    const toOld = goingUp ? '-110%' : '110%';

    setTimeout(() => {
      oldEl.style.transition = `transform ${duration}ms cubic-bezier(.2,1,.3,1)`;
      newEl.style.transition = `transform ${duration}ms cubic-bezier(.2,1,.3,1)`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        oldEl.style.transform = `translateY(${toOld})`;
        newEl.style.transform = 'translateY(0)';
      }));
    }, delay);
  });

  // Cleanup dopo animazione
  setTimeout(() => {
    el.textContent = String(newVal);
    el.style.display = '';
    el.style.overflow = '';
    el.style.lineHeight = '';
    _eloAnimating = false;
  }, maxDuration + 100);
}

function updateTopbar() {
  const hNick = $("h-nick");
  const hElo = $("h-elo");
  const hDelta = $("h-delta");
  if(hNick) hNick.textContent = me.nickname;
  if(hElo) animateElo(hElo, me.elo);
  if(hDelta) {
    const myMatches = matches.filter(m => m.status === "done" && (m.p1===me.id||m.p2===me.id));
    const last = myMatches[0];
    const elo = last ? eloCache[last.id] : null;
    const delta = elo ? (elo.elo_after - elo.elo_before) : null;
    if(delta !== null && delta !== 0) {
      const text = (delta > 0 ? '+' : '') + delta;
      // STEP 1: draw delta in hero — delta 0 non appare mai, ma se appare è neutro
      const cls = 'home-hero-delta ' + (delta > 0 ? 'up' : 'down');
      hDelta.classList.remove('hidden');
      if(delta === _lastDelta) {
        hDelta.textContent = text;
        hDelta.className = cls;
      } else {
        _lastDelta = delta;
        const from = delta > 0 ? '60%' : '-60%';
        const delay = REEL_DURATION + 200;
        hDelta.textContent = text;
        hDelta.className = cls;
        hDelta.style.opacity = '0';
        hDelta.style.transform = `translateY(${from})`;
        hDelta.style.transition = 'none';
        setTimeout(() => {
          hDelta.style.transition = `transform 1s cubic-bezier(.15,0,.1,1), opacity .5s ease`;
          requestAnimationFrame(() => requestAnimationFrame(() => {
            hDelta.style.transform = 'translateY(0)';
            hDelta.style.opacity = '1';
          }));
        }, delay);
      }
    } else {
      _lastDelta = null;
      hDelta.classList.add('hidden');
    }
  }
  // Sub-label hero
  const hSub = $('h-sub');
  if(hSub) hSub.textContent = '';

  // Progress bar Zeigarnik
  const hProgress = $('h-progress');
  if(hProgress && me.elo) {
    const nextMilestone = Math.ceil(me.elo / 100) * 100;
    const prevMilestone = nextMilestone - 100;
    const progress = ((me.elo - prevMilestone) / 100) * 100;
    const remaining = nextMilestone - me.elo;
    if(remaining > 0 && remaining < 100) {
      $('h-progress-fill').style.width = progress + '%';
      var milestoneColor = remaining <= 20 ? '#e8e6e3' : '#8a8580';
      var textColor = remaining <= 20 ? '#6a6560' : '#504a45';
      $('h-progress-label').innerHTML = '<span style="color:' + textColor + '">' + remaining + ' pt ai </span><span style="color:' + milestoneColor + ';font-weight:600">' + nextMilestone + '</span>';
      hProgress.classList.remove('hidden');
    } else {
      hProgress.classList.add('hidden');
    }
  }
}

function matchLabel(m) {

// ── renderActiveCards: unico entry point per card attive ──

function renderActiveCards(activeCards, sentChallenges, incomingChallenges) {
  const container = $('home-active');
  const cards = [];
  const total = incomingChallenges.length + activeCards.length + sentChallenges.length;
  if(total === 0) { container.innerHTML = ''; return; }

  // Helper — ds-card A1 structure
  function mkCard(accentClass, name, eloStr, statusText, ctaHtml, passive=false) {
    return `<div class="ds-card${passive ? ' passive' : ''}">
      <div class="ds-card-accent ${accentClass}"></div>
      <div class="ds-card-body">
        <div class="ds-card-name">${name}${eloStr ? ` <span class="ds-card-elo">${eloStr}</span>` : ''}</div>
        <div class="ds-card-status">${statusText}</div>
      </div>
      <div class="ds-card-cta">${ctaHtml}</div>
    </div>`;
  }

  // Helper — format stakes HTML from cache
  function stakesHtml(matchId) {
    const s = matchStakes[matchId];
    if(!s) return '';
    return ' · <span style="color:var(--green)">+' + s.win_delta + '</span> / <span style="color:var(--red)">' + s.loss_delta + '</span>';
  }

  // 1. Incoming challenges
  incomingChallenges.forEach(m => {
    const opp = getP(m.p1);
    const oppName = opp?.nickname || '?';
    const eloStr = opp?.elo ? String(Math.round(opp.elo)) : '';
    let statusParts = ['ti sfida'];
    if(m.time_control) statusParts.push(m.time_control.charAt(0).toUpperCase() + m.time_control.slice(1));
    if(m.white_player_id) {
      const amIWhite = m.white_player_id === me.id;
      statusParts.push('giochi con il ' + (amIWhite ? 'bianco' : 'nero'));
    }
    const stakes = stakesHtml(m.id);
    cards.push(mkCard('green', oppName, eloStr, statusParts.join(' · ') + stakes,
      `<div style="display:flex;align-items:center;gap:var(--sp-md)"><button class="ds-card-btn primary" onclick="acceptChallenge('${m.id}')">Gioca</button><span style="color:var(--ghost);font-size:var(--fs-label);font-weight:500;cursor:pointer;white-space:nowrap" onclick="rejectChallenge('${m.id}')">Rifiuta</span></div>`
    ));
  });

  // 2. Disputes
  activeCards.filter(c => c.type === 'disputed').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('red', opp?.nickname||'?', opp?.elo ? String(Math.round(opp.elo)) : '',
      'Risultati non coincidono · reinserisci',
      `<button class="ds-card-btn danger" onclick="openResultSheet('${m.id}')">Reinserisci</button>`
    ));
  });

  // 3. Live — need to submit result
  activeCards.filter(c => c.type === 'live').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('green', opp?.nickname||'?', opp?.elo ? String(Math.round(opp.elo)) : '',
      'Com\'è andata?',
      `<button class="ds-card-btn primary" onclick="openResultSheet('${m.id}')">Risultato</button>`
    ));
  });

  // 4. Waiting — submitted, waiting for other
  activeCards.filter(c => c.type === 'waiting').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('gray', opp?.nickname||'?', '',
      'Risultato inviato · attendi conferma',
      `<span class="ds-card-btn ghost">Inviato</span>`,
      true
    ));
  });

  // 5. Sent challenges — waiting for acceptance
  sentChallenges.forEach(m => {
    const opp = getP(m.p2);
    let statusParts = ['Sfida inviata'];
    if(m.time_control) statusParts.push(m.time_control.charAt(0).toUpperCase() + m.time_control.slice(1));
    if(m.white_player_id) {
      const amIWhite = m.white_player_id === me.id;
      statusParts.push('giochi con il ' + (amIWhite ? 'bianco' : 'nero'));
    }
    const stakes = stakesHtml(m.id);
    cards.push(mkCard('gray', opp?.nickname||'?', opp?.elo ? String(Math.round(opp.elo)) : '',
      statusParts.join(' · ') + stakes,
      `<button class="ds-card-btn ghost" onclick="cancelChallenge('${m.id}')">Annulla</button>`,
      true
    ));
  });

  container.innerHTML = cards.join('');
}

// ── Swipe-to-challenge system ──
var _swipeActive = null;
var _swipePrevArmed = false;
var SWIPE_SNAP = 130;
var SWIPE_RESIST = 0.25;

function _swipeTx(el, x) {
  el.style.webkitTransform = 'translate3d(' + x + 'px,0,0)';
  el.style.transform = 'translate3d(' + x + 'px,0,0)';
}

function _swipeOffset(dx) {
  var d = Math.abs(dx);
  if(d <= SWIPE_SNAP) return d;
  return SWIPE_SNAP + (d - SWIPE_SNAP) * SWIPE_RESIST;
}

function _swipeSpringBack(el) {
  el.style.transition = '-webkit-transform 250ms cubic-bezier(.25,.46,.45,.94), transform 250ms cubic-bezier(.25,.46,.45,.94)';
  _swipeTx(el, 0);
  el.addEventListener('transitionend', function h() { el.style.transition = ''; el.removeEventListener('transitionend', h); });
}

function _swipeSlideOut(el, cb) {
  var w = el.offsetWidth;
  el.style.transition = '-webkit-transform 450ms cubic-bezier(.32,0,.24,1), transform 450ms cubic-bezier(.32,0,.24,1)';
  _swipeTx(el, -(w + 20));
  el.addEventListener('transitionend', function h() {
    el.removeEventListener('transitionend', h);
    el.style.transition = '';
    setTimeout(function() {
      _swipeTx(el, 40);
      el.offsetHeight;
      el.style.transition = '-webkit-transform 600ms cubic-bezier(.34,1.56,.64,1), transform 600ms cubic-bezier(.34,1.56,.64,1)';
      _swipeTx(el, 0);
      el.addEventListener('transitionend', function h2() { el.style.transition = ''; el.removeEventListener('transitionend', h2); });
      if(cb) cb();
    }, 450);
  });
}

function _swipeShake(el) {
  var steps = [8, -6, 4, -2, 0];
  var i = 0;
  function next() { if(i >= steps.length) return; _swipeTx(el, steps[i]); i++; setTimeout(next, 50); }
  next();
}



// Evaluate swipe state for an opponent
function _swipeEval(oppId) {
  // Am I busy?
  if(isPlayerBusy(me.id)) return { ok: false, label: 'Hai una partita' };
  // Do I have incoming challenge?
  var incoming = (matches||[]).some(function(m) { return m.status === 'pending_challenge' && m.p2 === me.id; });
  if(incoming) return { ok: false, label: 'Sfida in arrivo' };
  // Already have pending with this opp?
  var pending = (matches||[]).some(function(m) { return m.status === 'pending_challenge' && ((m.p1===me.id && m.p2===oppId) || (m.p1===oppId && m.p2===me.id)); });
  if(pending) return { ok: false, label: 'Sfida già inviata' };
  // Is opp online?
  var opp = getP(oppId);
  if(!opp) return { ok: false, label: 'Non trovato' };
  var online = opp.last_seen_at && (Date.now() - new Date(opp.last_seen_at).getTime()) < 30000;
  if(!online) return { ok: false, label: 'Offline' };
  // Is opp busy?
  if(isPlayerBusy(oppId)) return { ok: false, label: 'In partita' };
  return { ok: true, label: 'Sfida' };
}

function initFeedSwipe(container) {
  if(!container) return;
  container.querySelectorAll('.swipe-wrap').forEach(function(wrap) {
    if(wrap._swipeInit) return;
    wrap._swipeInit = true;
    var cell = wrap.querySelector('.swipe-cell');
    var reveal = wrap.querySelector('.swipe-reveal');
    if(!cell || !reveal) return;

    var startX = 0, startY = 0, isSwiping = false;

    wrap.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isSwiping = false;
      cell.style.transition = 'none';
    }, {passive: true});

    wrap.addEventListener('touchmove', function(e) {
      if(e.touches.length !== 1) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;

      if(!isSwiping) {
        if(Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)) {
          if(dx > 0) return; // right swipe, ignore
          isSwiping = true;
          var feed = $('home-feed');
          if(feed) feed.classList.add('swipe-active');
          e.preventDefault();
          e.stopPropagation();
        } else if(Math.abs(dy) > 12) {
          return;
        } else {
          return;
        }
      }

      if(isSwiping) {
        e.preventDefault();
        e.stopPropagation();
        if(dx > 0) dx = 0;
        var d = Math.abs(dx);
        var offset = d <= SWIPE_SNAP ? d : SWIPE_SNAP + (d - SWIPE_SNAP) * SWIPE_RESIST;
        _swipeTx(cell, -offset);
        if(offset >= SWIPE_SNAP) { reveal.classList.add('armed'); }
        else { reveal.classList.remove('armed'); }
      }
    }, {passive: false});

    wrap.addEventListener('touchend', function(e) {
      var feed = $('home-feed');
      if(feed) feed.classList.remove('swipe-active');
      if(!isSwiping) return;

      var dx = e.changedTouches[0].clientX - startX;
      var d = Math.abs(dx);
      var offset = d <= SWIPE_SNAP ? d : SWIPE_SNAP + (d - SWIPE_SNAP) * SWIPE_RESIST;
      var armed = offset >= SWIPE_SNAP;
      var oppId = cell.dataset.opp;

      if(armed && oppId) {
        var ev = _swipeEval(oppId);
        if(ev.ok) {
          _swipeSlideOut(cell, function() { reveal.classList.remove('armed'); });
          setTimeout(function() { openNewChallengeSheetForPlayer(oppId); }, 500);
        } else {
          reveal.classList.remove('armed');
          _swipeShake(cell);
        }
      } else {
        _swipeSpringBack(cell);
        reveal.classList.remove('armed');
      }
      isSwiping = false;
    }, {passive: true});
  });
}

async function fetchMatchStakes() {
  if(!me) return;
  const relevant = (matches || []).filter(m =>
    (m.status === 'pending_challenge' || m.status === 'active') &&
    (m.p1 === me.id || m.p2 === me.id)
  );
  for(const m of relevant) {
    if(matchStakes[m.id]) continue;
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    try {
      const res = await db.rpc('estimate_match_delta', { p1_id: me.id, p2_id: oppId });
      if(res && !res.error && res.win_delta !== undefined) {
        matchStakes[m.id] = res;
      }
    } catch(e) { /* silently skip */ }
  }
}

function renderHome() {
  const incomingChallenges = matches.filter(m => m.status==="pending_challenge" && m.p2===me.id);
  const sentChallenges     = matches.filter(m => m.status==="pending_challenge" && m.p1===me.id);
  const allActive = matches.filter(m => m.status==="active" && !m.tournament_id);
  const done = matches.filter(m => m.status==="done" && (m.p1===me.id||m.p2===me.id)).slice(0,15);

  const badge = $("badge");
  if(incomingChallenges.length > 0) { badge.textContent = incomingChallenges.length; badge.classList.remove("hidden"); }
  else badge.classList.add("hidden");

  updateCountdowns();

  const activeCards = allActive.map(m => {
    const isP1 = m.p1===me.id;
    const myRes = isP1 ? m.result_p1 : m.result_p2;
    if(m.disputed && !myRes) return { m, type: 'disputed' };
    if(!myRes) return { m, type: 'live' };
    return { m, type: 'waiting' };
  });
  const liveCards     = activeCards.filter(c => c.type === 'live');
  const disputedCards = activeCards.filter(c => c.type === 'disputed');
  window._homeState = { incomingChallenges, sentChallenges, liveCards, disputedCards };

  // Active cards — zona fissa tra CAB e storico
  renderActiveCards(activeCards, sentChallenges, incomingChallenges);

  // ── Feed ──
  const activeChip = document.querySelector('.home-chips .ds-chip.on');
  const chipText = activeChip ? activeChip.textContent.trim() : 'Tutto';
  const activeView = chipText === 'Classifica' ? 'ranking' : chipText === 'Partite' ? 'mine' : chipText === 'Attività' ? 'events' : 'all';

  if(activeView === 'all') renderHomeFeedAll();
  if(activeView === 'mine') renderHomeMine();
  if(activeView === 'events') renderHomeEvents();
  if(activeView === 'ranking') renderHomeRanking();
}

// Tap sulla CAB in stato idle — apre search
function switchHomeChip(btn, view) {
  document.querySelectorAll('.home-chips .ds-chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  $('home-feed-all').classList.toggle('hidden', view !== 'all');
  $('home-feed-mine').classList.toggle('hidden', view !== 'mine');
  $('home-feed-events').classList.toggle('hidden', view !== 'events');
  $('home-feed-ranking').classList.toggle('hidden', view !== 'ranking');
  if(view === 'all') renderHomeFeedAll();
  if(view === 'mine') renderHomeMine();
  if(view === 'events') renderHomeEvents();
  if(view === 'ranking') renderHomeRanking();
}

function renderHomeFeedAll() {
  const container = $('home-history');
  if(!container) return;
  const feedItems = [];
  const myJoinedAt = me.created_at ? new Date(me.created_at).getTime() : 0;

  // Events from DB — filtered
  (globalEvents || []).forEach(ev => {
    if(ev.type === 'peak') return;
    if(new Date(ev.created_at).getTime() < myJoinedAt) return;
    const data = ev.data || {};
    const player = getP(ev.player_id);
    const target = getP(ev.target_id);
    const pName = player?.nickname || data.nickname || '?';
    const tName = target?.nickname || data.overtaken_name || '?';
    let text = '', deltaStr = '';

    switch(ev.type) {
      case 'overtake':
        if(ev.target_id === me.id) text = pName + ' ti ha superato';
        else if(ev.player_id === me.id) text = 'Hai superato ' + tName;
        break;
      case 'upset':
        var eloDiff = data.elo_diff || 0;
        if(eloDiff >= 100) { text = pName + ' ha battuto ' + tName; deltaStr = '+' + eloDiff; }
        break;
      case 'milestone':
        var ms = data.milestone || data.elo;
        if(ms && ms % 100 === 0) text = pName + ' ha raggiunto quota ' + ms;
        break;
      case 'streak':
        if(data.streak >= 5) { text = pName + ', ' + data.streak + ' vittorie di fila!'; if(data.elo_gain) deltaStr = '+' + data.elo_gain; }
        break;
      case 'new_player':
        text = (data.nickname || pName) + ' si è unito a turko';
        break;
    }
    if(text) feedItems.push({ type: 'event', time: new Date(ev.created_at).getTime(), text, deltaStr, playerId: ev.player_id });
  });

  // All done matches (everyone's — others only after my join date)
  const allDone = (globalMatches || []).filter(m => {
    if(m.status !== 'done' || !m.result || m.result === 'cancelled') return false;
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    if(!isMyMatch && new Date(m.updated_at || m.created_at).getTime() < myJoinedAt) return false;
    return true;
  }).slice(0, 30);
  allDone.forEach(m => {
    const isDraw = m.result === 'draw';
    const winnerId = m.result === 'p1' ? m.p1 : m.result === 'p2' ? m.p2 : m.p1;
    const loserId = isDraw ? m.p2 : (m.result === 'p1' ? m.p2 : m.p1);
    const winner = getP(winnerId), loser = getP(loserId);
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    const p1 = getP(m.p1), p2 = getP(m.p2);

    let text;
    if(isMyMatch) {
      const oppName = (m.p1 === me.id ? p2 : p1)?.nickname || '?';
      if(isDraw) text = 'Patta con ' + oppName;
      else if(winnerId === me.id) text = 'Hai vinto contro ' + oppName;
      else text = 'Hai perso contro ' + oppName;
    } else {
      if(isDraw) text = (p1?.nickname||'?') + ' patta con ' + (p2?.nickname||'?');
      else text = (winner?.nickname||'?') + ' ha vinto contro ' + (loser?.nickname||'?');
    }

    let deltaStr = '', deltaColor = 'var(--dim)';
    if(isMyMatch) {
      const elo = eloCache[m.id];
      if(elo) {
        const d = elo.elo_after - elo.elo_before;
        deltaStr = d > 0 ? '+' + d : '' + d;
        deltaColor = isDraw ? 'var(--dim)' : d > 0 ? 'var(--green)' : 'var(--red)';
      }
    }

    const oppId = isMyMatch ? (m.p1 === me.id ? m.p2 : m.p1) : winnerId;
    feedItems.push({ type: 'match', time: new Date(m.updated_at || m.created_at).getTime(), text, deltaStr, deltaColor, isMyMatch, profileId: oppId });
  });

  feedItems.sort((a, b) => b.time - a.time);

  if(!feedItems.length) {
    container.innerHTML = '<div style="margin-top:32px;text-align:center;padding:0 24px"><div style="font-size:var(--fs-body);color:var(--dim);font-weight:600;margin-bottom:var(--sp-sm)">La tua prima partita ti aspetta</div><div style="font-size:var(--fs-label);color:var(--ghost);line-height:1.5;cursor:pointer" onclick="onPlusTap()">Tap + per sfidare qualcuno</div></div>';
    return;
  }

  // All rows same style — chip filters, doesn't change design
  container.innerHTML = '<div class="ds-group">' + feedItems.map(item => {
    let rightHtml = '';
    const isEvent = item.type === 'event';

    if(item.deltaStr) {
      const dColor = (item.type === 'match' && item.isMyMatch) ? item.deltaColor : 'var(--green)';
      rightHtml = '<div class="ds-cell-right"><div class="ds-cell-value" style="color:' + dColor + '">' + item.deltaStr + '</div></div>';
    }

    const onclick = isEvent ? '' : ' onclick="openProfile(\'' + (item.profileId || item.playerId || '') + '\',\'home\')"';
    const innerHtml = '<div class="ds-cell-left"><div class="ds-cell-name">' + item.text + '</div><div class="ds-cell-meta">' + timeAgo(new Date(item.time).toISOString()) + '</div></div>' + rightHtml;

    // Wrap my matches in swipe container
    if(item.type === 'match' && item.isMyMatch && item.profileId) {
      var ev = _swipeEval(item.profileId);
      var revealClass = ev.ok ? 'swipe-reveal ok' : 'swipe-reveal blocked';
      return '<div class="swipe-wrap"><div class="' + revealClass + '"><span class="swipe-reveal-label">' + ev.label + '</span></div><div class="swipe-cell ds-cell" data-opp="' + item.profileId + '"' + onclick + '>' + innerHtml + '</div></div>';
    }
    return '<div class="ds-cell' + (isEvent ? ' static' : '') + '"' + onclick + '>' + innerHtml + '</div>';
  }).join('') + '</div>';

  initFeedSwipe(container.querySelector('.ds-group'));
}

function renderHomeRanking() {
  const list = $('home-ranking-list');
  if(!list || !players.length) return;
  const sorted = [...players].sort((a, b) => b.elo - a.elo);
  const now = Date.now();

  // Dense ranking: same ELO = same rank, no skips
  const ranks = [];
  let currentRank = 1;
  sorted.forEach((p, i) => {
    if(i > 0 && Math.round(p.elo) < Math.round(sorted[i-1].elo)) currentRank++;
    ranks.push(currentRank);
  });

  const myIdx = sorted.findIndex(p => p.id === me.id);
  const myRank = myIdx >= 0 ? ranks[myIdx] : -1;

  let html = '';
  sorted.forEach((p, i) => {
    const isMe = p.id === me.id;
    const elo = Math.round(p.elo);
    const rank = ranks[i];
    const online = p.last_seen_at && (now - new Date(p.last_seen_at).getTime()) < 30000;
    const dotHtml = online ? ' <span class="ds-dot"></span>' : '';

    // Daily delta — only show if non-zero
    const dailyDelta = getDailyDelta(p.id, elo);
    let deltaHtml = '';
    if(dailyDelta > 0) deltaHtml = '<div class="ds-cell-sub" style="color:var(--green);font-weight:600">+' + dailyDelta + '</div>';
    else if(dailyDelta < 0) deltaHtml = '<div class="ds-cell-sub" style="color:var(--red);font-weight:600">' + dailyDelta + '</div>';

    // Gap hint — only for me and the one below me, skip ties
    let metaHtml = '';
    if(isMe && i > 0) {
      const above = sorted[i - 1];
      const gap = Math.round(above.elo) - elo;
      if(gap > 0) metaHtml = '<div class="ds-cell-meta" style="color:var(--dim)">a ' + gap + ' punti da #' + ranks[i-1] + '</div>';
    } else if(myIdx >= 0 && i === myIdx + 1) {
      const gap = Math.round(sorted[myIdx].elo) - elo;
      if(gap > 0) metaHtml = '<div class="ds-cell-meta" style="color:var(--dim)">a ' + gap + ' punti da te</div>';
    }

    html += '<div class="ds-cell' + (isMe ? ' is-me' : '') + '" onclick="openProfile(\'' + p.id + '\',\'home\')">' +
      '<div style="font-size:var(--fs-caption);font-weight:700;color:' + (isMe ? 'var(--text)' : 'var(--ghost)') + ';min-width:24px;text-align:center;flex-shrink:0;margin-right:var(--sp-md)">' + rank + '</div>' +
      '<div class="ds-cell-left">' +
        '<div class="ds-cell-name">' + escHtml(p.nickname) + (isMe ? ' <span style="font-size:var(--fs-micro);color:var(--dim);font-weight:400">tu</span>' : '') + dotHtml + '</div>' +
        metaHtml +
      '</div>' +
      '<div class="ds-cell-right">' +
        '<div class="ds-cell-value">' + elo + '</div>' +
        deltaHtml +
      '</div>' +
    '</div>';
  });

  list.innerHTML = '<div class="ds-group">' + html + '</div>';
}

function onPlusTap() {
  // If there's an active match needing result, open result sheet
  const liveCards = (matches||[]).filter(m => m.status==='active' && (m.p1===me.id||m.p2===me.id) && !m['result_p'+(m.p1===me.id?'1':'2')]);
  if(liveCards.length > 0) {
    openResultSheet(liveCards[0].id);
    return;
  }
  // If there's an incoming challenge, don't allow new challenge
  const incoming = (matches||[]).filter(m => m.status==='pending_challenge' && m.p2===me.id);
  if(incoming.length > 0) {
    toast('Hai una sfida in arrivo', 'err');
    return;
  }
  // If busy (already sent challenge or have active match waiting), block
  if(isPlayerBusy(me.id)) {
    toast('Hai già una partita in corso', 'err');
    return;
  }
  // Open new challenge sheet
  openNewChallengeSheet();
}

// ── New Challenge Sheet (Uber-style 2-step) ──
var _chOppId = null;

function openNewChallengeSheet() {
  // Reset to step 1
  $('ch-step1').style.display = 'block';
  $('ch-step2').style.display = 'none';
  $('ch-search').value = '';
  _chOppId = null;

  // Render player list
  renderChallengePlayers('');

  // Show sheet
  const overlay = $('challenge-sheet-overlay2');
  overlay.style.display = 'flex';
  document.body.classList.add('sheet-open');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.classList.add('visible');
    setTimeout(() => $('ch-search').focus(), 400);
  }));
}

function closeNewChallengeSheet() {
  const overlay = $('challenge-sheet-overlay2');
  overlay.classList.remove('visible');
  document.body.classList.remove('sheet-open');
  setTimeout(() => { overlay.style.display = 'none'; _chOppId = null; }, 320);
}

function renderChallengePlayers(query) {
  const list = $('ch-player-list');
  if(!list) return;
  const q = query.toLowerCase();
  const eligible = players.filter(p => p.id !== me.id && (!q || p.nickname.toLowerCase().includes(q)));
  // Sort: online first, then by elo
  const now = Date.now();
  eligible.sort((a, b) => {
    const aOnline = a.last_seen_at && (now - new Date(a.last_seen_at).getTime()) < 30000 ? 1 : 0;
    const bOnline = b.last_seen_at && (now - new Date(b.last_seen_at).getTime()) < 30000 ? 1 : 0;
    if(aOnline !== bOnline) return bOnline - aOnline;
    return b.elo - a.elo;
  });
  if(!eligible.length) {
    list.innerHTML = '<div style="padding:var(--sp-xl) 0;text-align:center;color:var(--ghost);font-size:var(--fs-label)">Nessun giocatore trovato</div>';
    return;
  }
  list.innerHTML = eligible.map(p => {
    const online = p.last_seen_at && (now - new Date(p.last_seen_at).getTime()) < 30000;
    const busy = isPlayerBusy(p.id);
    const canChallenge = online && !busy;
    if(!canChallenge) {
      const reason = busy ? 'in partita' : 'offline';
      return `<div class="ch-player-row" style="opacity:.4;pointer-events:none">
        <span style="font-size:var(--fs-body);font-weight:500;color:var(--dim);display:flex;align-items:center;gap:6px">${escHtml(p.nickname)} <span style="font-size:var(--fs-micro);color:var(--ghost)">${reason}</span></span>
        <span style="font-size:var(--fs-caption);color:var(--ghost)">${Math.round(p.elo)}</span>
      </div>`;
    }
    return `<div class="ch-player-row" onclick="selectChallengePlayer('${p.id}')">
      <span style="font-size:var(--fs-body);font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px">${escHtml(p.nickname)} <span class="ds-dot"></span></span>
      <span style="font-size:var(--fs-caption);color:var(--dim)">${Math.round(p.elo)}</span>
    </div>`;
  }).join('');
}

function filterChallengePlayers(query) {
  renderChallengePlayers(query);
}

  const opp = getP(oppId);
