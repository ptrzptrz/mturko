  // Events from DB — filtered + deduped
  const _seenEvents = new Set();
  (globalEvents || []).forEach(ev => {
    if(new Date(ev.created_at).getTime() < myJoinedAt) return;
    // Dedup: same type + player + target + match = duplicate
    const evKey = ev.type + '_' + (ev.player_id||'') + '_' + (ev.target_id||'') + '_' + (ev.match_id||'');
    if(_seenEvents.has(evKey)) return;
    _seenEvents.add(evKey);
    const data = ev.data || {};
    const player = getP(ev.player_id);
    const target = getP(ev.target_id);
    const pName = player?.nickname || data.nickname || '?';
    const tName = target?.nickname || data.overtaken_name || '?';
    const isMine = ev.player_id === me.id;
    const evTc = data.time_control || 'rapid';
    let text = '', subtext = '', evType = ev.type, evData = data;

    switch(ev.type) {
      case 'overtake':
        if(ev.target_id === me.id) text = pName + ' ti ha superato';
        else if(isMine) text = 'Hai superato ' + tName;
        else text = pName + ' ha superato ' + tName;
        subtext = evTc;
        break;
      case 'overtake_multi':
        if(isMine) {
          text = 'Hai superato ' + data.count + ' giocatori';
        } else if(data.is_reverse) {
          // Skip reverse multi-overtakes for others — redundant
          if(ev.player_id === me.id) text = 'Superato da ' + data.count + ' giocatori';
          // else: don't show "X superato da N giocatori" — noise
        } else {
          text = pName + ' ha superato ' + data.count + ' giocatori';
        }
        subtext = evTc;
        break;
      case 'upset':
        var eloDiff = data.diff || data.elo_diff || 0;
        if(eloDiff >= 50) {
          text = (isMine ? 'Hai battuto ' + (data.loser_name || tName) : pName + ' ha battuto ' + (data.loser_name || tName));
          subtext = eloDiff + ' punti di differenza';
        }
        break;
      case 'milestone':
        var ms = data.milestone || data.elo;
        if(ms && ms % 100 === 0) {
          text = isMine ? 'Hai raggiunto ' + ms : pName + ' ha raggiunto ' + ms;
          subtext = evTc;
        }
        break;
      case 'streak':
        if(data.streak >= 3) {
          text = isMine ? data.streak + ' vittorie di fila' : pName + ', ' + data.streak + ' vittorie di fila';
          subtext = evTc;
        }
        break;
      case 'peak':
        var peakElo = data.elo;
        if(peakElo) {
          text = isMine ? 'Record personale: ' + peakElo : pName + ': record ' + peakElo;
          subtext = evTc;
        }
        break;
      case 'new_player':
        text = (data.nickname || pName) + ' si è unito a turko';
        break;
    }
    if(text) feedItems.push({
      type: 'event', evType: ev.type, time: new Date(ev.created_at).getTime(),
      text, subtext, isMine, playerId: ev.player_id, playerNick: pName, evData: data
    });
  });

  // All done matches
  const allDone = (globalMatches || []).filter(m => {
    if(m.status !== 'done' || !m.result || m.result === 'cancelled') return false;
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    if(!isMyMatch && new Date(m.updated_at || m.created_at).getTime() < myJoinedAt) return false;
    return true;
  }).slice(0, 50);

  allDone.forEach(m => {
    const isDraw = m.result === 'draw';
    const winnerId = m.result === 'p1' ? m.p1 : m.result === 'p2' ? m.p2 : m.p1;
    const loserId = isDraw ? m.p2 : (m.result === 'p1' ? m.p2 : m.p1);
    const winner = getP(winnerId), loser = getP(loserId);
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    const p1 = getP(m.p1), p2 = getP(m.p2);
    const oppId = isMyMatch ? (m.p1 === me.id ? m.p2 : m.p1) : null;
    const opp = oppId ? getP(oppId) : null;

    let text, matchType;
    if(isMyMatch) {
      const oppName = opp?.nickname || '?';
      if(isDraw) { text = 'Patta con ' + oppName; matchType = 'draw'; }
      else if(winnerId === me.id) { text = 'Hai vinto contro ' + oppName; matchType = 'win'; }
      else { text = 'Hai perso contro ' + oppName; matchType = 'loss'; }
    } else {
      if(isDraw) text = (p1?.nickname||'?') + ' patta con ' + (p2?.nickname||'?');
      else text = (winner?.nickname||'?') + ' ha vinto contro ' + (loser?.nickname||'?');
      matchType = 'others';
    }

    let deltaNum = 0, deltaStr = '', eloBefore = null, eloAfter = null;
    if(isMyMatch) {
      const elo = eloCache[m.id];
      if(elo) {
        deltaNum = elo.elo_after - elo.elo_before;
        deltaStr = deltaNum > 0 ? '+' + deltaNum : '' + deltaNum;
        eloBefore = Math.round(elo.elo_before);
        eloAfter = Math.round(elo.elo_after);
      }
    } else {
      // Others' matches: get actor's delta from globalEloCache
      const actorElo = globalEloCache[m.id + '_' + winnerId];
      if(actorElo) {
        deltaNum = actorElo.elo_after - actorElo.elo_before;
        deltaStr = deltaNum > 0 ? '+' + deltaNum : '' + deltaNum;
      }
    }

    // Opponent ELO for meta
    const oppElo = opp ? Math.round(getPlayerElo(opp, m.time_control || 'rapid').elo) : null;
    const matchTc = m.time_control || 'rapid';
    // For others' matches: who did the action (for batching)
    const actorId = isMyMatch ? null : winnerId;
    const actorNick = isMyMatch ? null : (winner?.nickname || '?');

    feedItems.push({
      type: 'match', matchType, time: new Date(m.updated_at || m.created_at).getTime(),
      text, deltaStr, deltaNum, isMyMatch, oppId, oppElo, actorId, actorNick, matchId: m.id, eloBefore, eloAfter, matchTc
    });
  });

  feedItems.sort((a, b) => b.time - a.time);

  if(!feedItems.length) {
    container.innerHTML = '<div style="margin-top:32px;text-align:center;padding:0 24px"><div style="font-size:var(--fs-body);color:var(--dim);font-weight:600;margin-bottom:var(--sp-sm)">La tua prima partita ti aspetta</div><div style="font-size:var(--fs-label);color:var(--ghost);line-height:1.5;cursor:pointer" onclick="onPlusTap()">Tap + per sfidare qualcuno</div></div>';
    return;
  }

  // ── Time divider logic ──
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterdayStart = todayStart - 86400000;
  const weekStart = todayStart - 6 * 86400000;
  const lastWeekStart = todayStart - 13 * 86400000;
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

  function getTimeBucket(ts) {
    if(ts >= todayStart) return 'Oggi';
    if(ts >= yesterdayStart) return 'Ieri';
    if(ts >= weekStart) return 'Questa settimana';
    if(ts >= lastWeekStart) return 'Scorsa settimana';
    if(ts >= monthStart) return 'Questo mese';
    var d = new Date(ts);
    var months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    return months[d.getMonth()] + ' ' + d.getFullYear();
  }

  // ── Collapse: group 3+ others' matches by same actor in same bucket ──
  // First pass: collect all others' matches per actor per bucket
  const _actorMatches = {}; // key: "actorId|bucket" → [items]
  for(var ci = 0; ci < feedItems.length; ci++) {
    var fi = feedItems[ci];
    if(fi.type === 'match' && fi.matchType === 'others' && fi.actorId) {
      var ck = fi.actorId + '|' + getTimeBucket(fi.time);
      if(!_actorMatches[ck]) _actorMatches[ck] = [];
      _actorMatches[ck].push(fi);
    }
  }
  // Second pass: emit items, replacing 3rd+ match with collapse
  const processed = [];
  const _actorEmitted = {}; // key → count emitted
  for(var ci = 0; ci < feedItems.length; ci++) {
    var fi = feedItems[ci];
    if(fi.type === 'match' && fi.matchType === 'others' && fi.actorId) {
      var ck = fi.actorId + '|' + getTimeBucket(fi.time);
      var total = _actorMatches[ck].length;
      _actorEmitted[ck] = (_actorEmitted[ck] || 0) + 1;
      var n = _actorEmitted[ck];
      if(total < 3) {
        // No collapse needed
        processed.push(fi);
      } else if(n <= 2) {
        // Show first 2
        processed.push(fi);
        if(n === 2) {
          // Immediately insert collapse for remaining
          var remaining = _actorMatches[ck].slice(2);
          var word = remaining.length === 1 ? 'altra partita' : 'altre ' + remaining.length + ' partite';
          processed.push({ type: 'collapse', time: fi.time, actorNick: fi.actorNick, label: word + ' di ' + fi.actorNick, count: remaining.length, items: remaining });
        }
      }
      // else: n > 2, skip (already in collapse)
    } else {
      processed.push(fi);
    }
  }

  // ── Render ──
  var html = '';
  var lastBucket = '';

  processed.forEach(function(item) {
    var bucket = getTimeBucket(item.time);
    if(bucket !== lastBucket) {
      html += '<div class="time-div">' + bucket + '</div>';
      lastBucket = bucket;
    }

    if(item.type === 'event') {
      var evClick = item.playerId ? ' onclick="openProfile(\'' + item.playerId + '\',\'home\')"' : '';

      if(item.evType === 'new_player') {
        // New player: compressed with small avatar
        var avC = getAvatarColor(item.playerId || '');
        var avL = getAvatarLetters(item.playerNick || '?');
        var miniAv = '<div style="width:20px;height:20px;border-radius:50%;background:' + avC.bg + ';color:' + avC.fg + ';font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + avL + '</div>';
        html += '<div class="fr oc" style="gap:8px;display:flex;align-items:center"' + evClick + '>' + miniAv + '<div class="fr-l"><div class="fr-n">' + item.text + '</div></div></div>';

      } else if(item.isMine) {
        // MY moments: icon/number in box (K3)
        var boxHtml = '';
        if(item.evType === 'overtake' || item.evType === 'overtake_multi') {
          boxHtml = '<div class="mi-box glyph green">↑</div>';
        } else if(item.evType === 'streak') {
          boxHtml = '<div class="mi-box num green">' + (item.evData.streak || '3') + '</div>';
        } else if(item.evType === 'milestone') {
          boxHtml = '<div class="mi-box gold"><svg viewBox="0 0 24 24" fill="none" stroke="url(#mi-grad-gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>';
        } else if(item.evType === 'peak') {
          boxHtml = '<div class="mi-box green"><svg viewBox="0 0 24 24" fill="none" stroke="url(#mi-grad-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></svg></div>';
        } else if(item.evType === 'upset') {
          boxHtml = '<div class="mi-box glyph green">↑</div>';
        }
        var subHtml = item.subtext ? '<div class="mi-sub"><span class="fmt">' + item.subtext + '</span></div>' : '';
        html += '<div class="mi"' + evClick + '>' + boxHtml + '<div class="mi-body"><div class="mi-title">' + item.text + '</div>' + subHtml + '</div></div>';

      } else {
        // OTHERS' moments: same density as compressed matches
        var label = '';
        if(item.evType === 'upset') label = 'impresa · ';
        else if(item.evType === 'overtake' || item.evType === 'overtake_multi') label = 'sorpasso · ';
        else if(item.evType === 'streak') label = 'serie · ';
        else if(item.evType === 'milestone') label = 'traguardo · ';
        else if(item.evType === 'peak') label = 'record · ';
        var labelHtml = label ? '<span class="mt-label">' + label + '</span>' : '';
        var isFmtSub = item.subtext === 'rapid' || item.subtext === 'blitz' || item.subtext === 'classic';
        var subHtml = item.subtext ? '<div class="mt-sub">' + (isFmtSub ? '<span class="fmt">' + item.subtext + '</span>' : item.subtext) + '</div>' : '';
        html += '<div class="mt"' + evClick + '><div class="fr-l"><div class="fr-n" style="white-space:normal">' + labelHtml + '<span class="mt-title">' + item.text + '</span></div>' + subHtml + '</div></div>';
      }

    } else if(item.type === 'collapse') {
      // Collapsable "altre N partite di X"
      var collapseId = 'oc-c-' + Math.random().toString(36).substr(2,6);
      html += '<div class="fr oc oc-more" onclick="expandCollapse(this,\'' + collapseId + '\')"><div class="fr-l"><div class="fr-n">' + escHtml(item.label) + '</div></div></div>';
      item.items.forEach(function(sub) {
        var meta = '';
        if(bucket === 'Oggi') meta = timeAgo(new Date(sub.time).toISOString());
        if(sub.matchTc) meta += (meta ? ' ' : '') + '<span class="fmt">' + sub.matchTc + '</span>';
        var metaHtml = meta ? '<div class="fr-m">' + meta + '</div>' : '';
        var onclick = sub.actorId ? ' onclick="openProfile(\'' + sub.actorId + '\',\'home\')"' : '';
        html += '<div class="fr oc oc-hidden" data-collapse="' + collapseId + '"' + onclick + '><div class="fr-l"><div class="fr-n">' + sub.text + '</div>' + metaHtml + '</div></div>';
      });

    } else if(item.type === 'match') {
      // Matches: 4 levels
      var cls, deltaHtml = '';

      if(item.matchType === 'win') {
        cls = 'fr w';
        deltaHtml = '<div class="fr-r"><div class="fr-d">' + item.deltaStr + '</div></div>';
      } else if(item.matchType === 'loss') {
        cls = 'fr l';
        deltaHtml = '<div class="fr-r"><div class="fr-d">' + item.deltaStr + '</div></div>';
      } else if(item.matchType === 'draw') {
        cls = 'fr p';
        deltaHtml = '<div class="fr-r"><div class="fr-d">' + (item.deltaStr || '0') + '</div></div>';
      } else {
        cls = 'fr oc';
      }

      // Meta: time + ELO snapshot for my matches
      var meta = '';
      if(bucket === 'Oggi') meta = timeAgo(new Date(item.time).toISOString());
      if(item.isMyMatch && item.eloBefore !== null && item.eloAfter !== null) {
        var snap = item.eloBefore + ' → ' + item.eloAfter;
        meta = meta ? meta + ' · ' + snap : snap;
      }
      if(item.matchTc) meta += ' <span class="fmt">' + item.matchTc + '</span>';
      var metaHtml = meta ? '<div class="fr-m">' + meta + '</div>' : '';

      var clickTarget = item.isMyMatch ? item.oppId : (item.actorId || '');
      var onclick = clickTarget ? ' onclick="openProfile(\'' + clickTarget + '\',\'home\')"' : '';

      var innerHtml = '<div class="fr-l"><div class="fr-n">' + item.text + '</div>' + metaHtml + '</div>' + deltaHtml;

      // Wrap my matches in swipe container
      if(item.isMyMatch && item.oppId) {
        var ev = _swipeEval(item.oppId);
        var revealClass = ev.ok ? 'swipe-reveal ok' : 'swipe-reveal blocked';
        html += '<div class="swipe-wrap"><div class="' + revealClass + '"><span class="swipe-reveal-label">' + ev.label + '</span></div><div class="swipe-cell ' + cls + '" data-opp="' + item.oppId + '"' + onclick + '>' + innerHtml + '</div></div>';
      } else {
        html += '<div class="' + cls + '"' + onclick + '>' + innerHtml + '</div>';
      }
    }
  });

  container.innerHTML = '<div class="ds-group">' + html + '</div>';
  initFeedSwipe(container.querySelector('.ds-group'));
}

function renderHomeRanking() {
  const list = $('home-ranking-list');
  if(!list || !players.length) return;
  const sorted = [...players].sort((a, b) => getPlayerElo(b, _rankingFormat).elo - getPlayerElo(a, _rankingFormat).elo);
  const now = Date.now();

  // Dense ranking: same ELO = same rank, no skips
  const ranks = [];
  let currentRank = 1;
  sorted.forEach((p, i) => {
    if(i > 0 && Math.round(getPlayerElo(p, _rankingFormat).elo) < Math.round(getPlayerElo(sorted[i-1], _rankingFormat).elo)) currentRank++;
    ranks.push(currentRank);
  });

  const myIdx = sorted.findIndex(p => p.id === me.id);
  const myRank = myIdx >= 0 ? ranks[myIdx] : -1;

  let html = '';
  sorted.forEach((p, i) => {
    const isMe = p.id === me.id;
    const elo = Math.round(getPlayerElo(p, _rankingFormat).elo);
    const rank = ranks[i];
    const online = p.last_seen_at && (now - new Date(p.last_seen_at).getTime()) < 30000;
    const dotHtml = online ? ' <span class="ds-dot"></span>' : '';

    // Daily delta — only show if non-zero
    const dailyDelta = getDailyDelta(p.id, elo);
    let deltaHtml = '';
    if(dailyDelta > 0) deltaHtml = '<div class="ds-cell-sub" style="color:var(--green);font-weight:600">+' + dailyDelta + '</div>';
    else if(dailyDelta < 0) deltaHtml = '<div class="ds-cell-sub" style="color:var(--red);font-weight:600">' + dailyDelta + '</div>';

    // Gap hint — only for me and the one below me, skip ties
    let metaHtml = '';
    if(isMe && i > 0) {
      const above = sorted[i - 1];
      const gap = Math.round(getPlayerElo(above, _rankingFormat).elo) - elo;
      if(gap > 0) metaHtml = '<div class="ds-cell-meta" style="color:var(--dim)">a ' + gap + ' punti da #' + ranks[i-1] + '</div>';
    } else if(myIdx >= 0 && i === myIdx + 1) {
      const gap = Math.round(getPlayerElo(sorted[myIdx], _rankingFormat).elo) - elo;
      if(gap > 0) metaHtml = '<div class="ds-cell-meta" style="color:var(--dim)">a ' + gap + ' punti da te</div>';
    }

    html += '<div class="ds-cell' + (isMe ? ' is-me' : '') + '" onclick="openProfile(\'' + p.id + '\',\'home\')">' +
      '<div style="font-size:var(--fs-caption);font-weight:700;color:' + (isMe ? 'var(--text)' : 'var(--ghost)') + ';min-width:24px;text-align:center;flex-shrink:0;margin-right:var(--sp-md)">' + rank + '</div>' +
      '<div class="ds-cell-left">' +
        '<div class="ds-cell-name">' + escHtml(p.nickname) + (isMe ? ' <span style="font-size:var(--fs-micro);color:var(--dim);font-weight:400">tu</span>' : '') + dotHtml + '</div>' +
        metaHtml +
      '</div>' +
      '<div class="ds-cell-right">' +
        '<div class="ds-cell-value">' + elo + '</div>' +
        deltaHtml +
      '</div>' +
    '</div>';
  });

  list.innerHTML = '<div class="ds-group">' + html + '</div>';
}



function onPlusTap() {
  // If there's an active match needing result, open result sheet
  const liveCards = (matches||[]).filter(m => m.status==='active' && (m.p1===me.id||m.p2===me.id) && !m['result_p'+(m.p1===me.id?'1':'2')]);
  if(liveCards.length > 0) {
    openResultSheet(liveCards[0].id);
    return;
  }
  // If there's an incoming challenge, don't allow new challenge
  const incoming = (matches||[]).filter(m => m.status==='pending_challenge' && m.p2===me.id);
  if(incoming.length > 0) {
    toast('Hai una sfida in arrivo', 'err');
    return;
  }
  // If busy (already sent challenge or have active match waiting), block
  if(isPlayerBusy(me.id)) {
    toast('Hai già una partita in corso', 'err');
    return;
  }
  // Open new challenge sheet
  openNewChallengeSheet();
}

// ── New Challenge Sheet (Uber-style 2-step) ──
var _chOppId = null;

function openNewChallengeSheet() {
  // Reset to step 1
  $('ch-step1').style.display = 'block';
  $('ch-step2').style.display = 'none';
  $('ch-search').value = '';
  _chOppId = null;

  // Render player list
  renderChallengePlayers('');

  // Show sheet
  const overlay = $('challenge-sheet-overlay2');
  overlay.style.display = 'flex';
  document.body.classList.add('sheet-open');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.classList.add('visible');
    setTimeout(() => $('ch-search').focus(), 400);
  }));
}

function closeNewChallengeSheet() {
  const overlay = $('challenge-sheet-overlay2');
  overlay.classList.remove('visible');
  document.body.classList.remove('sheet-open');
  setTimeout(() => { overlay.style.display = 'none'; _chOppId = null; }, 320);
}

function renderChallengePlayers(query) {
  const list = $('ch-player-list');
  if(!list) return;
  const q = query.toLowerCase();
  const selFmt = getSelectedChallengeFormat();
  const eligible = players.filter(p => p.id !== me.id && (!q || p.nickname.toLowerCase().includes(q)));
  // Sort: online first, then by elo for selected format
  const now = Date.now();
  eligible.sort((a, b) => {
    const aOnline = a.last_seen_at && (now - new Date(a.last_seen_at).getTime()) < 30000 ? 1 : 0;
    const bOnline = b.last_seen_at && (now - new Date(b.last_seen_at).getTime()) < 30000 ? 1 : 0;
    if(aOnline !== bOnline) return bOnline - aOnline;
    return getPlayerElo(b, selFmt).elo - getPlayerElo(a, selFmt).elo;
  });
  if(!eligible.length) {
    list.innerHTML = '<div style="padding:var(--sp-xl) 0;text-align:center;color:var(--ghost);font-size:var(--fs-label)">Nessun giocatore trovato</div>';
    return;
  }
  list.innerHTML = eligible.map(p => {
    const online = p.last_seen_at && (now - new Date(p.last_seen_at).getTime()) < 30000;
    const busy = isPlayerBusy(p.id);
    const canChallenge = online && !busy;
    const pElo = Math.round(getPlayerElo(p, selFmt).elo);
    if(!canChallenge) {
      const reason = busy ? 'in partita' : 'offline';
      return `<div class="ch-player-row" style="opacity:.4;pointer-events:none">
        <span style="font-size:var(--fs-body);font-weight:500;color:var(--dim);display:flex;align-items:center;gap:6px">${escHtml(p.nickname)} <span style="font-size:var(--fs-micro);color:var(--ghost)">${reason}</span></span>
        <span style="font-size:var(--fs-caption);color:var(--ghost)">${pElo}</span>
      </div>`;
    }
    return `<div class="ch-player-row" onclick="selectChallengePlayer('${p.id}')">
      <span style="font-size:var(--fs-body);font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px">${escHtml(p.nickname)} <span class="ds-dot"></span></span>
      <span style="font-size:var(--fs-caption);color:var(--dim)">${pElo}</span>
    </div>`;
  }).join('');
}

function filterChallengePlayers(query) {
  renderChallengePlayers(query);
}

function selectChallengePlayer(oppId) {
  const opp = getP(oppId);
  if(!opp) return;
  _chOppId = oppId;

  // Switch to step 2
  $('ch-step1').style.display = 'none';
  $('ch-step2').style.display = 'block';
  $('ch-opp-name').textContent = opp.nickname;
  $('ch-opp-elo').textContent = Math.round(getPlayerElo(opp, 'rapid').elo);

  // Reset time to Rapid
  document.querySelectorAll('.ch-time-chip').forEach(c => c.classList.remove('on'));
  document.querySelector('.ch-time-chip[data-time="rapid"]').classList.add('on');
}

function pickChallengeTime(btn) {
  document.querySelectorAll('.ch-time-chip').forEach(c => c.classList.remove('on'));
  // Bounce: shrink then spring back via CSS transition

// --- pulizia partite scadute ---
const CHALLENGE_EXPIRE_MS = 2 * 60 * 1000;
const MATCH_EXPIRE_MS = 15 * 60 * 1000;

// ── Funzione unificata: un giocatore è "occupato" se ha una partita attiva
// dove non ha ancora inserito il risultato.
// Una partita dove entrambi hanno già inserito NON blocca nuove sfide.
function isPlayerBusy(playerId) {
  // Occupato se ha partite attive dove non ha ancora inserito il risultato
  const hasUnsubmitted = matches.some(m => {
    if(m.status !== 'active') return false;
    if(m.tournament_id) return false;
    const isP1 = m.p1 === playerId;
    const isP2 = m.p2 === playerId;
    if(!isP1 && !isP2) return false;
    const myRes = isP1 ? m.result_p1 : m.result_p2;
    return !myRes;
  });
  if(hasUnsubmitted) return true;
  // Per se stesso: sfide incoming non gestite bloccano (devi rispondere prima)
  if(playerId === me?.id) {
    return matches.some(m => m.status === 'pending_challenge' && m.p2 === playerId);
  }
  return false;
}

async function cleanupExpired() {
  if(!me) return;
  const now = Date.now();
  const before = matches.length;

  const expiredChallenges = matches.filter(m => {
    if(m.status !== 'pending_challenge') return false;
    return (now - new Date(m.created_at).getTime()) > CHALLENGE_EXPIRE_MS;
  });

  // Partite active scadute — nessuno ha inserito entro il timeout
  const expiredMatches = matches.filter(m => {
    if(m.status !== 'active') return false;
    const ageFromUpdate = now - new Date(m.updated_at || m.created_at).getTime();
    return ageFromUpdate > MATCH_EXPIRE_MS;
  });

  matches = matches.filter(m => {
    const age = now - new Date(m.created_at).getTime();
    if(m.status === 'pending_challenge') return age <= CHALLENGE_EXPIRE_MS;
    if(m.status === 'active') {
      const ageFromUpdate = now - new Date(m.updated_at || m.created_at).getTime();
      return ageFromUpdate <= MATCH_EXPIRE_MS;
    }
    return true;
  });

  // Patcha DB per sfide scadute
  for(const m of expiredChallenges) {
    db.patch("matches", `id=eq.${m.id}`, {status: "done", result: "cancelled"}).catch(() => {});
  }
  // Patcha DB per partite active scadute — libera entrambi i giocatori
  for(const m of expiredMatches) {
    db.patch("matches", `id=eq.${m.id}`, {status: "done", result: "cancelled"}).catch(() => {});
  }

  if(matches.length !== before) renderHome();
}

let resultSheetMatchId = null;

function openResultSheet(matchId) {
  const m = matches.find(x => x.id===matchId);
  if(!m) return;
  resultSheetMatchId = matchId;
  const isDisputed = m.disputed;
  const isP1 = m.p1 === me.id;
  const oppId = isP1 ? m.p2 : m.p1;
  const opp = getP(oppId);
  const oppName = opp?.nickname || '?';

  $('rsheet-eyebrow').textContent = isDisputed ? 'Disaccordo' : 'Com\'è andata?';

  const white = m.white_player_id ? getP(m.white_player_id) : getP(m.p1);
  const black = m.white_player_id ? getP(m.white_player_id === m.p1 ? m.p2 : m.p1) : getP(m.p2);

  if(isDisputed && white && black) {
    const oppLastRes = isP1 ? m.last_result_p2 : m.last_result_p1;
    const oppPlayerId = isP1 ? m.p2 : m.p1;
    const oppSaid = oppLastRes === 'draw' ? 'Patta'
      : oppLastRes === oppPlayerId ? 'Ha vinto'
      : oppLastRes ? 'Ha perso' : null;
    $('rsheet-context').innerHTML = oppSaid
      ? `<div style="font-size:var(--fs-caption);color:var(--muted)">${oppName} dice: <strong>${oppSaid}</strong></div>`
      : `<div style="font-size:var(--fs-caption);color:var(--muted)">${oppName} non è d'accordo</div>`;
    $('rsheet-dispute-warn').classList.remove('hidden');
  } else if(white && black) {
    var rsFmt = m.time_control || 'rapid';
    $('rsheet-context').innerHTML = `<div style="font-size:var(--fs-caption);color:var(--muted)">${white.nickname} (${Math.round(getPlayerElo(white, rsFmt).elo)}) — ${black.nickname} (${Math.round(getPlayerElo(black, rsFmt).elo)})</div>`;
    $('rsheet-dispute-warn').classList.add('hidden');
  } else {
    var rsFmt2 = m.time_control || 'rapid';
    $('rsheet-context').innerHTML = `<div style="font-size:var(--fs-caption);color:var(--muted)">${me.nickname} (${Math.round(getPlayerElo(me, rsFmt2).elo)}) — ${oppName} (${opp ? Math.round(getPlayerElo(opp, rsFmt2).elo) : '?'})</div>`;
    $('rsheet-dispute-warn').classList.add('hidden');
  }

  const overlay = $('result-sheet-overlay');
  overlay.style.display = 'flex';
  document.body.classList.add('sheet-open');
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
}

function closeResultSheet() {
  const overlay = $('result-sheet-overlay');
  overlay.classList.remove('visible');
  document.body.classList.remove('sheet-open');
  setTimeout(() => { overlay.style.display = 'none'; resultSheetMatchId = null; }, 320);
}

async function confirmResultSheet(choice) {
  const matchId = resultSheetMatchId;
  if(!matchId) return;
  const m = matches.find(x => x.id===matchId);
  if(!m) return;
  closeResultSheet();
  const isP1 = m.p1 === me.id;
  const myResult = choice === 'win' ? (isP1 ? 'p1' : 'p2')
                 : choice === 'loss' ? (isP1 ? 'p2' : 'p1')
                 : 'draw';
  const field = isP1 ? 'result_p1' : 'result_p2';

  // Optimistic update — aggiorna il match locale immediatamente
  m[field] = myResult;
  renderHome();

  // Feedback
  toast('Risultato inviato');

  // Scrivi su DB e sincronizza
  await db.patch('matches', `id=eq.${matchId}`, {[field]: myResult});
  activeMatch = null;
  await fetchAll();
}

function getDailyDelta(playerId, currentElo) {

  const stored = sessionStorage.getItem(key);

  return currentElo - parseInt(stored);
}

function getRankChange(playerId, currentRank) {
  const key = 'turko_rank_' + playerId;

  return parseInt(stored) - currentRank; // positivo = salito
}

function renderEloSection(player) {
  var total = player.wins + player.losses + player.draws;
  var winRate = total > 0 ? Math.round((player.wins / total) * 100) : 0;
  var streak = player.win_streak || 0;
  var bestStreak = player.best_streak || 0;

  var whiteWins = 0, whiteLosses = 0, whiteDraws = 0;
  var blackWins = 0, blackLosses = 0, blackDraws = 0;
  currentProfileMatches.forEach(function(m) {
    if(m.result === 'cancelled') return;
    var isP1 = m.p1 === player.id;
    var playsWhite = m.white_player_id === player.id;
    var won = m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : null;
    if(playsWhite) {
      if(won === true) whiteWins++; else if(won === false) whiteLosses++; else whiteDraws++;
    } else if(m.white_player_id) {
      if(won === true) blackWins++; else if(won === false) blackLosses++; else blackDraws++;
    }
  });
  var whiteTotal = whiteWins + whiteLosses + whiteDraws;
  var blackTotal = blackWins + blackLosses + blackDraws;
  var whiteRate = whiteTotal > 0 ? Math.round((whiteWins / whiteTotal) * 100) : null;
  var blackRate = blackTotal > 0 ? Math.round((blackWins / blackTotal) * 100) : null;

  var trendDelta = 0;
  var recentMatches = currentProfileMatches.filter(function(m) { return m.result !== 'cancelled'; }).slice(0, 12);
  if(recentMatches.length >= 3) {
    recentMatches.forEach(function(m) {
      var key = m.id + '_' + player.id;
      var eh = globalEloCache[key];
      if(eh) trendDelta += (eh.elo_after - eh.elo_before);
    });
  }

  // Build stats rows
  var rows = '';
  rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Partite totali</div><div class="ds-stats-row-value">' + total + '</div></div>';
  if(total > 0) rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Win rate</div><div class="ds-stats-row-value">' + winRate + '%</div></div>';
  if(whiteRate !== null) rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Win rate bianco</div><div class="ds-stats-row-value">' + whiteRate + '%</div></div>';
  if(blackRate !== null) rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Win rate nero</div><div class="ds-stats-row-value">' + blackRate + '%</div></div>';
  if(recentMatches.length >= 3 && trendDelta !== 0) {
    var trendCls = trendDelta > 0 ? ' style="color:var(--green)"' : ' style="color:var(--red)"';
    rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Ultime ' + recentMatches.length + '</div><div class="ds-stats-row-value"' + trendCls + '>' + (trendDelta > 0 ? '+' : '') + trendDelta + '</div></div>';
  }
  if(bestStreak >= 3) rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Streak migliore</div><div class="ds-stats-row-value">' + bestStreak + '</div></div>';
  if(streak >= 2) rows += '<div class="ds-stats-row"><div class="ds-stats-row-label">Streak attuale</div><div class="ds-stats-row-value" style="color:var(--green)">' + streak + '</div></div>';

  $("prof-elo-section").innerHTML =
    '<div class="ds-stats">' +
      '<div class="ds-stats-header" onclick="toggleProfileStats(this)">' +
        '<div class="ds-stats-label">Statistiche</div>' +
        '<div class="ds-wld"><span class="ds-wl w">' + player.wins + '</span><span class="ds-wl l">' + player.losses + '</span><span class="ds-wl d">' + player.draws + '</span></div>' +
      '</div>' +
      '<div class="ds-stats-detail" id="prof-stats-detail">' +
        '<div class="ds-stats-inner">' + rows + '</div>' +
      '</div>' +
    '</div>';
}



function renderH2H(playerId, matchH) {

function renderBestWins(playerId, matchH) {
  var wins = matchH.filter(function(m) {
    if(m.result === 'cancelled' || m.result === 'draw') return false;
    var isP1 = m.p1 === playerId;
    return m.result === 'p1' ? isP1 : !isP1;
  });

  var rated = wins.map(function(m) {
    var isP1 = m.p1 === playerId;
    var oppId = isP1 ? m.p2 : m.p1;
    var oppEloKey = m.id + '_' + oppId;
    var oppEh = globalEloCache[oppEloKey];
    var oppElo = oppEh ? oppEh.elo_before : (getP(oppId) ? Math.round(getPlayerElo(getP(oppId), m.time_control || 'rapid').elo) : 0);
    return {matchId: m.id, oppId: oppId, oppElo: oppElo, date: m.created_at};
  });

  rated.sort(function(a, b) { return b.oppElo - a.oppElo; });
  var top3 = rated.slice(0, 3);

  if(top3.length === 0) { $("prof-best-wins").innerHTML = ''; return; }

  var rows = top3.map(function(w) {
    var opp = getP(w.oppId);
    var d = new Date(w.date);
    var monthNames = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
    var dateStr = d.getDate() + ' ' + monthNames[d.getMonth()];
    return '<div class="ds-cell" onclick="openProfile(\'' + w.oppId + '\',\'profile\')">' +
      '<div class="ds-cell-left"><div class="ds-cell-name">' + (opp ? escHtml(opp.nickname) : '?') + '</div><div class="ds-cell-meta">' + dateStr + '</div></div>' +
      '<div style="font-size:var(--fs-caption);font-weight:700;color:var(--green)">' + w.oppElo + '</div>' +
    '</div>';
  }).join('');

  $("prof-best-wins").innerHTML =
    '<div class="ds-section">Best wins</div>' +
    '<div class="ds-group">' + rows + '</div>';
}

function renderRivals(playerId, matchH) {
  const rivalMap = {};
  matchH.forEach(m => {
    const oppId = m.p1 === playerId ? m.p2 : m.p1;
    if(!rivalMap[oppId]) rivalMap[oppId] = {wins: 0, losses: 0, draws: 0, total: 0};
    rivalMap[oppId].total++;
    if(m.result === 'draw') { rivalMap[oppId].draws++; return; }
    const winnerId = m.result === 'p1' ? m.p1 : m.p2;
    if(winnerId === playerId) rivalMap[oppId].wins++;
    else rivalMap[oppId].losses++;
  });

  const rivals = Object.entries(rivalMap)
    .map(([id, r]) => ({id, ...r}))
    .sort((a, b) => b.total - a.total)
    .slice(0, 5);

  if(rivals.length === 0) {
    $("prof-rivals").innerHTML = '';
    return;
  }

  const rows = rivals.map(r => {
    const opp = getP(r.id);
    return `<div class="ds-cell" onclick="openProfile('${r.id}','profile')">
      <div class="ds-cell-name">${opp ? escHtml(opp.nickname) : '?'}</div>
      <div class="ds-wld"><span class="ds-wl w">${r.wins}</span><span class="ds-wl l">${r.losses}</span><span class="ds-wl d">${r.draws}</span></div>
    </div>`;
  }).join('');

  $("prof-rivals").innerHTML = `
    <div class="ds-section">Rivali</div>
    <div class="ds-group">${rows}</div>`;
}

function renderDayGroups(matchH, eloMap, playerId) {

  matchH.forEach(function(m) {

    if(!byDay[day]) { byDay[day] = []; dayOrder.push(day); }
    byDay[day].push(m);
  });

  var html = '<div class="ds-section">Storico</div><div class="ds-group">';

  dayOrder.forEach(function(day, dayIdx) {
    var ms = byDay[day];
    var validMs = ms.filter(function(m) { return m.result !== 'cancelled'; });
    var wins = 0, losses = 0, draws = 0;
    validMs.forEach(function(m) {
      var isP1 = m.p1 === playerId;
      if(m.result === 'draw') draws++;
      else if((m.result === 'p1' && isP1) || (m.result === 'p2' && !isP1)) wins++;
      else losses++;
    });

    var dayElos = validMs.map(function(m) { return eloMap[m.id]; }).filter(Boolean).sort(function(a, b) {
      return new Date(a.created_at) - new Date(b.created_at);
    });
    var eloStart = dayElos.length ? dayElos[0].elo_before : null;
    var eloEnd = dayElos.length ? dayElos[dayElos.length - 1].elo_after : null;
    var totalDelta = dayElos.length ? eloEnd - eloStart : 0;
    var deltaColor = totalDelta > 0 ? 'var(--green)' : totalDelta < 0 ? 'var(--red)' : 'var(--dim)';
    var deltaStr = totalDelta !== 0 ? ' <span style="color:' + deltaColor + '">' + (totalDelta > 0 ? '+' : '') + totalDelta + '</span>' : '';

    var eloRange = eloStart !== null ? eloStart + '→' + eloEnd + deltaStr : '';
    var groupId = 'prof-day-' + dayIdx;

    var wldHtml = '<div class="ds-wld"><span class="ds-wl w">' + wins + '</span><span class="ds-wl l">' + losses + '</span><span class="ds-wl d">' + draws + '</span></div>';

      '<div class="ds-cell-left">' +

        (eloRange ? '<div class="ds-cell-meta">' + eloRange + '</div>' : '') +
      '</div>' +
      '<div class="ds-cell-right">' + wldHtml + '</div>' +
    '</div>';

    html += '<div class="ds-acc" id="' + groupId + '">';
    validMs.forEach(function(m) {
      var isP1 = m.p1 === playerId;
      var oppId = isP1 ? m.p2 : m.p1;
      var opp = getP(oppId);
      var won = m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : null;
      var elo = eloMap[m.id];
      var delta = elo ? (elo.elo_after - elo.elo_before) : null;
      var dColor = delta !== null ? (delta >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--dim)';
      var deltaHtml = delta !== null ? '<div style="font-size:var(--fs-caption);font-weight:700;color:' + dColor + '">' + (delta >= 0 ? '+' : '') + delta + '</div>' : '';

      html += '<div class="ds-cell nested" onclick="event.stopPropagation();openProfile(&apos;' + oppId + '&apos;,&apos;profile&apos;)">' +
        '<div class="ds-cell-left">' +
          '<div class="ds-cell-name">' + (opp ? escHtml(opp.nickname) : '?') + '</div>' +
          '<div class="ds-cell-meta">' + timeAgo(m.created_at) + '</div>' +
        '</div>' +
        '<div class="ds-cell-right">' + deltaHtml + '</div>' +

    });

  html += '</div>';

// ── Swipe-back profilo ──
(function() {
  var scrollEl = $('prof-scroll');
  if(!scrollEl) return;
  var startX = 0, startY = 0, swiping = false;

  scrollEl.addEventListener('touchstart', function(e) {
    var touch = e.touches[0];
    if(touch.clientX > 25) return;
    startX = touch.clientX;
    startY = touch.clientY;
    swiping = true;
  }, {passive: true});

  scrollEl.addEventListener('touchmove', function(e) {
    if(!swiping) return;
    var dx = e.touches[0].clientX - startX;
    var dy = Math.abs(e.touches[0].clientY - startY);
    if(dy > Math.abs(dx)) { swiping = false; }
  }, {passive: true});

  scrollEl.addEventListener('touchend', function(e) {
    if(!swiping) return;
    swiping = false;
    var dx = e.changedTouches[0].clientX - startX;
    if(dx > 80) {
      var profPage = $('page-profile');
      if(profPage) {
        profPage.style.transition = 'transform .25s ease, opacity .25s ease';
        profPage.style.transform = 'translateX(100%)';
        profPage.style.opacity = '0';
        setTimeout(function() {
          profPage.style.transition = '';
          profPage.style.transform = '';
          profPage.style.opacity = '';
          var backBtn = $('profile-back');
          if(backBtn) backBtn.click();
        }, 260);
      }
    }
  }, {passive: true});
})();

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  const now = new Date();
  const date = new Date(iso);
  const diff = Math.floor((now - date) / 1000);
  if(diff < 60) return 'adesso';
  if(diff < 3600) { const m=Math.floor(diff/60); return m===1?'1 min fa':`${m} min fa`; }
  if(diff < 86400) { const h=Math.floor(diff/3600); return h===1?'1 ora fa':`${h} ore fa`; }
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayDiff = Math.round((today - dateDay) / 86400000);
  if(dayDiff === 1) return 'ieri';
  if(dayDiff < 7) return `${dayDiff} giorni fa`;
  if(dayDiff < 14) return '1 settimana fa';
  if(dayDiff < 21) return '2 settimane fa';
  if(dayDiff < 28) return '3 settimane fa';
  if(dayDiff < 60) return '1 mese fa';
  if(dayDiff < 365) { const mo=Math.floor(dayDiff/30); return `${mo} mesi fa`; }
  return fmtDate(iso);
}

// ── ELO Chart (SVG, style B — Apple Health + chips) ──
var _eloChartAllData = [];
var _eloChartCurrentElo = 1500;

function drawEloChart(eloH, currentElo) {
  var container = $('elo-chart-container');
  var wrap = $('prof-chart-wrap');
  if(!container || !wrap) return;

  _eloChartCurrentElo = currentElo;

  if(!Array.isArray(eloH) || eloH.length === 0) {
    container.innerHTML = '';
    _eloChartAllData = [];
    return;
  }

  // Prepare all data points
  _eloChartAllData = [{value: eloH[0].elo_before, date: eloH[0].created_at}];
  eloH.forEach(function(e) { _eloChartAllData.push({value: e.elo_after, date: e.created_at}); });

  // Reset chips to "Tutto"
  var chips = document.querySelectorAll('.prof-chart-chip');
  chips.forEach(function(c) { c.classList.toggle('active', c.getAttribute('data-range') === '0'); });

  renderEloSvg(_eloChartAllData);
}

function switchEloRange(days, btn) {
  btn.parentElement.querySelectorAll('.prof-chart-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');

  var data;
  if(days === 0 || _eloChartAllData.length < 2) {
    data = _eloChartAllData;
  } else {
    var lastDate = new Date(_eloChartAllData[_eloChartAllData.length - 1].date).getTime();
    var cutoff = lastDate - days * 86400000;
    data = _eloChartAllData.filter(function(p) { return new Date(p.date).getTime() >= cutoff; });
    if(data.length < 2) data = _eloChartAllData.slice(-2);
  }
  renderEloSvg(data);
}

function renderEloSvg(data) {
  var container = $('elo-chart-container');
  var wrap = $('prof-chart-wrap');
  if(!container || !wrap) return;

  var valEl = $('prof-chart-val');
  var dateEl = $('prof-chart-date');
  if(valEl) { valEl.textContent = ''; valEl.classList.add('empty'); }
  if(dateEl) dateEl.textContent = '';

  container.innerHTML = '';
  if(data.length < 2) return;

  var n = data.length;
  var w = wrap.clientWidth;
  var h = 150;
  var padTop = 8, padBot = 20, padL = 2, padR = 2;
  var plotW = w - padL - padR;
  var plotH = h - padTop - padBot;

  var values = data.map(function(p) { return p.value; });
  var vMin = Math.min.apply(null, values);
  var vMax = Math.max.apply(null, values);
  var vRange = vMax - vMin || 1;
  vMin -= vRange * 0.08;
  vMax += vRange * 0.08;
  vRange = vMax - vMin;

  var peakIdx = values.indexOf(Math.max.apply(null, values));

  var coords = data.map(function(p, i) {
    return {
      x: padL + (i / Math.max(n - 1, 1)) * plotW,
      y: padTop + plotH - ((p.value - vMin) / vRange) * plotH,
      value: p.value,
      date: p.date
    };
  });

  var linePath = _eloMonotonePath(coords);
  var fillPath = linePath + 'L' + coords[n-1].x.toFixed(1) + ',' + h + 'L' + coords[0].x.toFixed(1) + ',' + h + 'Z';

  // Date labels
  var monthNames = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  var labelCount = Math.min(4, n);
  var labelIndices = [];
  for(var i = 0; i < labelCount; i++) labelIndices.push(Math.round(i * (n-1) / Math.max(labelCount-1, 1)));
  var dateLabels = labelIndices.map(function(idx) {
    var d = new Date(data[idx].date);
    var txt = d.getDate() + ' ' + monthNames[d.getMonth()];
    return '<text x="' + coords[idx].x.toFixed(1) + '" y="' + (h - 4) + '" fill="#48484A" font-size="10" text-anchor="middle" font-family="Inter,system-ui,sans-serif">' + txt + '</text>';
  }).join('');

  var svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="display:block">' +
    '<defs><linearGradient id="eloGradB" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="#F2F2F7" stop-opacity="0.12"/>' +
    '<stop offset="60%" stop-color="#F2F2F7" stop-opacity="0.03"/>' +
    '<stop offset="100%" stop-color="#F2F2F7" stop-opacity="0"/>' +
    '</linearGradient></defs>' +
    '<path d="' + fillPath + '" fill="url(#eloGradB)"/>' +
    '<path d="' + linePath + '" fill="none" stroke="#F2F2F7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="' + coords[peakIdx].x.toFixed(1) + '" cy="' + coords[peakIdx].y.toFixed(1) + '" r="4" fill="#30D158" stroke="#1C1C1E" stroke-width="2"/>' +
    dateLabels +
    '<line class="elo-touch-line" x1="0" y1="0" x2="0" y2="' + h + '" stroke="#636366" stroke-width="0.5" opacity="0"/>' +
    '<circle class="elo-touch-dot" cx="0" cy="0" r="5" fill="#F2F2F7" stroke="#0A0A0A" stroke-width="2" opacity="0"/>' +
    '</svg>';

  container.innerHTML = svg;

  // Touch handler
  var svgEl = container.querySelector('svg');
  var touchLine = svgEl.querySelector('.elo-touch-line');
  var touchDot = svgEl.querySelector('.elo-touch-dot');
  var active = false;

  function findNearest(clientX) {
    var rect = svgEl.getBoundingClientRect();
    var x = clientX - rect.left;
    var best = 0, bestDist = Infinity;
    for(var i = 0; i < coords.length; i++) {
      var dist = Math.abs(coords[i].x - x);
      if(dist < bestDist) { bestDist = dist; best = i; }
    }
    return best;
  }

  function showTip(idx) {
    var c = coords[idx];
    touchLine.setAttribute('x1', c.x); touchLine.setAttribute('x2', c.x); touchLine.setAttribute('opacity', '1');
    touchDot.setAttribute('cx', c.x); touchDot.setAttribute('cy', c.y); touchDot.setAttribute('opacity', '1');
    if(valEl) { valEl.textContent = data[idx].value; valEl.classList.remove('empty'); }
    if(dateEl) {
      var d = new Date(data[idx].date);
      dateEl.textContent = d.getDate() + ' ' + monthNames[d.getMonth()];
    }
  }

  function hideTip() {
    touchLine.setAttribute('opacity', '0');
    touchDot.setAttribute('opacity', '0');
    if(valEl) { valEl.textContent = ''; valEl.classList.add('empty'); }
    if(dateEl) dateEl.textContent = '';
  }

  svgEl.addEventListener('touchstart', function(e) { e.preventDefault(); active = true; showTip(findNearest(e.touches[0].clientX)); }, {passive: false});
  svgEl.addEventListener('touchmove', function(e) { if(!active) return; e.preventDefault(); showTip(findNearest(e.touches[0].clientX)); }, {passive: false});
  svgEl.addEventListener('touchend', function() { active = false; hideTip(); }, {passive: true});
  svgEl.addEventListener('touchcancel', function() { active = false; hideTip(); }, {passive: true});
}

// Monotone cubic spline (Fritsch-Carlson)
function _eloMonotonePath(pts) {
  var len = pts.length;
  if(len < 2) return '';
  if(len === 2) return 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1) + 'L' + pts[1].x.toFixed(1) + ',' + pts[1].y.toFixed(1);
  var dx = [], dy = [], m = [], t = [];
  for(var i = 0; i < len-1; i++) { dx[i] = pts[i+1].x - pts[i].x; dy[i] = pts[i+1].y - pts[i].y; m[i] = dx[i] === 0 ? 0 : dy[i] / dx[i]; }
  t[0] = m[0];
  for(var i = 1; i < len-1; i++) { if(m[i-1] * m[i] <= 0) t[i] = 0; else t[i] = (m[i-1] + m[i]) / 2; }
  t[len-1] = m[len-2];
  for(var i = 0; i < len-1; i++) {
    if(m[i] === 0) { t[i] = 0; t[i+1] = 0; continue; }
    var a = t[i] / m[i], b = t[i+1] / m[i], s = a * a + b * b;
    if(s > 9) { var tau = 3 / Math.sqrt(s); t[i] = tau * a * m[i]; t[i+1] = tau * b * m[i]; }
  }
  var path = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1);
  for(var i = 0; i < len-1; i++) {
    var d0 = dx[i] / 3;
    path += 'C' + (pts[i].x + d0).toFixed(1) + ',' + (pts[i].y + d0 * t[i]).toFixed(1) + ',' + (pts[i+1].x - d0).toFixed(1) + ',' + (pts[i+1].y - d0 * t[i+1]).toFixed(1) + ',' + pts[i+1].x.toFixed(1) + ',' + pts[i+1].y.toFixed(1);
  }
  return path;
}

$("profile-back").onclick = () => {
  const current = profileStack.pop();
  const from = current ? current.from : 'home';
  if(from === 'profile') {
    const prev = profileStack[profileStack.length - 1];
    if(prev) { openProfile(prev.id, prev.from, true); return; }
  }
  currentProfileId = null;
  profileStack = [];
  showPage(from);
};

// --- NAV ---
const pageMap = {home:"page-home", profile:"page-profile", "profile-me":"page-profile"};

function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nbtn").forEach(b => b.classList.remove("on"));
  const pageEl = $(pageMap[name]);
  if(pageEl) pageEl.classList.add("active");
  const navBtn = document.querySelector(`.nbtn[data-page="${name}"]`) || document.querySelector('.nbtn[data-page="profile-me"]');
  if(navBtn) navBtn.classList.add("on");
  if(name==="profile-me") { openProfile(me.id, "home"); }
}

document.querySelectorAll(".nbtn").forEach(btn => {
  btn.onclick = () => showPage(btn.dataset.page);
});

// ── Navbar: fluid hide on scroll (home feed only) ──
(function() {
  var navbar = document.querySelector('.navbar');
  var frost = document.querySelector('.navbar-frost');
  var feed = document.querySelector('.home-feed');
  if(!feed || !navbar || !frost) return;

  var navH = 80; // approx navbar height + safe area
  var offset = 0; // current hide offset in px (0 = visible, navH = hidden)
  var lastY = 0;
  var ticking = false;

  function applyOffset() {
    var clamped = Math.max(0, Math.min(navH, offset));
    var pct = clamped / navH * 100;
    navbar.style.setProperty('--nav-y', pct + '%');
    frost.style.setProperty('--nav-y', pct + '%');
  }

  feed.addEventListener('scroll', function() {
    if(ticking) return;
    ticking = true;
    requestAnimationFrame(function() {
      var y = feed.scrollTop;
      var dy = y - lastY;
      lastY = y;

      // Near top: always show
      if(y < 60) {
        offset = 0;
      } else {
        // Accumulate offset following the finger
        offset += dy;
        offset = Math.max(0, Math.min(navH, offset));
      }

      applyOffset();
      ticking = false;
    });
  }, {passive: true});
})();

</script>
