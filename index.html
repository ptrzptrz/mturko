<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="cal">
<meta name="theme-color" content="#161512">
<title>cal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#161512;font-family:system-ui;color:#fff;height:100dvh;overflow:hidden}

#cover{
  position:fixed;top:0;left:0;right:0;
  height:calc(env(safe-area-inset-top,20px) + 50px);
  background:#161512;
  z-index:10003;
  pointer-events:none;
}

#content{
  margin-top:calc(env(safe-area-inset-top,20px) + 50px);
  padding:20px;
  overflow-y:auto;
  height:calc(100dvh - env(safe-area-inset-top,20px) - 50px);
}

#test-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  z-index:10002;
  display:none;
  align-items:flex-end;
  pointer-events:none;
}
#test-overlay.visible{
  background:rgba(0,0,0,.75);
  pointer-events:all;
}
#test-sheet{
  background:#1a1714;
  border-radius:24px 24px 0 0;
  padding:24px 16px calc(24px + env(safe-area-inset-bottom,0px));
  width:100%;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,0,.24,1);
}
#test-overlay.visible #test-sheet{
  transform:translateY(0);
}

button{
  display:block;width:100%;padding:14px;margin:6px 0;
  background:#e8e6e3;color:#161512;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
}
button.sm{background:#2a2724;color:#e8e6e3;font-size:13px;padding:10px;margin:4px 0}
.info{font-size:13px;color:#888;margin:8px 0;line-height:1.6}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin:16px 0 6px}
#color-val{font-size:20px;font-weight:700;color:#e8e6e3;margin:8px 0;font-family:monospace}
</style>
</head>
<body>

<div id="cover"></div>

<div id="content">
  <div class="label">Calibra colore status bar</div>
  <div class="info">
    1. Tap "Apri sheet"<br>
    2. Con lo sheet aperto, usa i bottoni per cambiare il colore del cover<br>
    3. Trova il colore dove la status bar è indistinguibile dal resto<br>
    4. Screenshotta e dimmi il valore
  </div>
  <button onclick="openSheet()">Apri sheet</button>
  <div id="color-val">#161512</div>
</div>

<div id="test-overlay" onclick="closeSheet()">
  <div id="test-sheet" onclick="event.stopPropagation()">
    <div style="text-align:center;font-size:12px;color:#888;margin-bottom:12px">Cambia colore del cover e trova il match</div>
    <div id="sheet-color-val" style="text-align:center;font-size:20px;font-weight:700;color:#e8e6e3;margin-bottom:12px;font-family:monospace">#161512</div>
    
    <button class="sm" onclick="setColor('#161512')">#161512 (base app)</button>
    <button class="sm" onclick="setColor('#060504')">#060504 (calcolato)</button>
    <button class="sm" onclick="setColor('#050403')">#050403</button>
    <button class="sm" onclick="setColor('#040303')">#040303</button>
    <button class="sm" onclick="setColor('#030202')">#030202</button>
    <button class="sm" onclick="setColor('#020101')">#020101</button>
    <button class="sm" onclick="setColor('#010101')">#010101</button>
    <button class="sm" onclick="setColor('#000000')">#000000 (nero puro)</button>
    <button class="sm" onclick="setColor('#070605')">#070605</button>
    <button class="sm" onclick="setColor('#080706')">#080706</button>
    <button class="sm" onclick="setColor('#0a0908')">#0a0908</button>
    <button class="sm" onclick="setColor('#0c0b09')">#0c0b09</button>
    <button class="sm" onclick="setColor('transparent')">transparent</button>

    <div style="height:12px"></div>
    <button onclick="closeSheet()">Chiudi</button>
  </div>
</div>

<script>
function setColor(c) {
  document.getElementById('cover').style.background = c;
  document.getElementById('color-val').textContent = c;
  document.getElementById('sheet-color-val').textContent = c;
}

function openSheet() {
  const overlay = document.getElementById('test-overlay');
  // cover a #060504 prima di mostrare overlay
  setColor('#060504');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    overlay.classList.add('visible');
  }));
}

function closeSheet() {
  const overlay = document.getElementById('test-overlay');
  overlay.classList.remove('visible');
  setTimeout(() => {
    overlay.style.display = 'none';
    setColor('#161512');
  }, 400);
}
</script>
</body>
</html>
