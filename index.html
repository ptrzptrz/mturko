<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="turko">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#161512">
<title>turko</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#161512}
body{background:#161512;font-family:'Inter',system-ui,sans-serif;color:#e8e6e3;max-width:480px;margin:0 auto;height:100dvh;overflow:hidden}
input,select,textarea{background:#2a2724;border:1px solid #3a3630;border-radius:10px;color:#e8e6e3;padding:13px 14px;font-size:16px;font-family:inherit;width:100%;outline:none;display:block}
input:focus,select:focus,textarea:focus{border-color:#6a6560}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0px 1000px #161512 inset;-webkit-text-fill-color:#e8e6e3}
input::placeholder,textarea::placeholder{color:#4a4642}
button{cursor:pointer;font-family:inherit;border:none;-webkit-tap-highlight-color:transparent;outline:none}
.hidden{display:none!important}

/* ── Layout ── */
#auth{min-height:100dvh;display:flex;flex-direction:column;justify-content:flex-start;padding:env(safe-area-inset-top,40px) 24px 40px;padding-top:max(env(safe-area-inset-top,0px) + 60px, 80px);gap:40px}
#main{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.pages{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow:hidden}
.page.active{display:flex;flex-direction:column}
#page-home.active{height:100%}
#page-profile.active,#page-lb.active,#page-search.active,#page-tourn.active{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}

/* ── Topbar ── */
.topbar{background:#161512;padding:env(safe-area-inset-top,20px) 16px 0;min-height:calc(50px + env(safe-area-inset-top,20px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10000}
body.sheet-open .topbar{background:#000000}
body.sheet-open #sa-cover{background:#000000}
.topbar-logout{background:none;border:none;color:#3a3630;font-size:12px;cursor:pointer;padding:14px;transition:color .15s ease}
.topbar-logout:active{color:#e8e6e3}
.logo{color:#e8e6e3;font-size:15px;font-weight:700;letter-spacing:-.2px}

/* ── Navbar ── */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;padding-bottom:max(env(safe-area-inset-bottom),8px);background:transparent;z-index:100}
/* STEP 1: frost ridotto 140→80px — meno schermo coperto */
.navbar-frost{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:80px;background:linear-gradient(to top, #161512 50%, transparent 100%);pointer-events:none;z-index:99}
.nbtn{flex:1;min-height:52px;padding:10px 0;background:none;border:none;color:#4a4642;font-size:10px;text-transform:uppercase;letter-spacing:.8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;transition:color .2s ease}
.nbtn.on{color:#e8e6e3}
.nbtn:active{opacity:.6}
.nicon{width:22px;height:22px;display:block}
.badge{position:absolute;top:8px;right:calc(50% - 20px);background:#c33;color:#fff;border-radius:8px;padding:0 5px;font-size:9px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center}

/* ── Auth ── */
.auth-wordmark{text-align:center;padding-top:8px}
.auth-name{font-size:64px;font-weight:800;color:#e8e6e3;letter-spacing:-3px;line-height:1;display:block}
.auth-tagline{font-size:12px;color:#3a3630;letter-spacing:2px;text-transform:uppercase;margin-top:8px;display:block}
.box{padding:0}
.box-label{font-size:11px;color:#4a4642;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:24px;display:block}
.frow{margin-bottom:16px;position:relative}
.auth-input{background:transparent;border:none;border-bottom:1px solid #2a2724;border-radius:0;padding:14px 0;font-size:17px;font-weight:500;color:#e8e6e3;width:100%;outline:none;display:block;transition:border-color .2s ease}
.auth-input:focus{border-bottom-color:#e8e6e3}
.auth-input::placeholder{color:#3a3630;font-weight:400;font-size:15px}
.btn-g{background:#e8e6e3;color:#161512;border-radius:12px;padding:17px 16px;font-size:16px;font-weight:700;width:100%;margin-top:12px;display:block;transition:transform .15s cubic-bezier(.34,1.56,.64,1),opacity .15s ease;letter-spacing:-.2px}
.box .btn-g{margin-top:32px}
.btn-g:active{transform:scale(0.97);opacity:.9}
.btn-g:disabled{background:#252220;color:#3a3630;cursor:not-allowed;transform:none}
.btn-o{background:transparent;color:#4a4642;border:none;padding:16px;font-size:14px;width:100%;margin-top:4px;display:block;transition:color .15s ease}
.btn-o:active{color:#e8e6e3}
.err{color:#c33;font-size:13px;margin-top:12px;min-height:18px;opacity:0;transition:opacity .2s ease}
.err.visible{opacity:1}
.auth-hint{font-size:11px;color:#3a3630;margin-bottom:20px;line-height:1.5}

/* ── Common ── */
.empty{color:#3a3630;text-align:center;margin-top:48px;font-size:14px}
.slabel{font-size:11px;font-weight:600;color:#4a4642;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.divider{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:600;color:#3a3630;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1.2px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#252220}

/* ── Notif ── */
.notif{position:fixed;top:calc(env(safe-area-inset-top,20px) + 58px);left:50%;transform:translateX(-50%) translateY(-4px);background:#e8e6e3;color:#161512;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;max-width:90vw;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s}
.notif.err{background:#2a1010;color:#e87070;border:1px solid rgba(200,50,50,.2)}
@keyframes glowWin{0%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0px rgba(98,153,36,0)}50%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 30px rgba(98,153,36,.12)}100%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0px rgba(98,153,36,0)}}
.notif.result{top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 120px);left:50%;font-size:16px;font-weight:700;padding:14px 28px;border-radius:16px;letter-spacing:-.2px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.notif.result-win{background:#1a2a10;color:#8cbf4a;border:1px solid rgba(98,153,36,.15);box-shadow:0 4px 24px rgba(0,0,0,.5);animation:glowWin .6s ease .3s both}
.notif.result-loss{background:#252220;color:#e8e6e3;border:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.notif.result-draw{background:#252220;color:#6a6560;border:none;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#161512;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Home hero header ── */
/* STEP 1: padding compatto — meno spazio sprecato sopra il fold */
.home-hero{padding:6px 16px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.home-hero:active{opacity:.7}
.home-hero-nick{font-size:11px;font-weight:600;color:#6a6560;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.home-hero-elo-row{display:flex;align-items:baseline;gap:10px}
.home-hero-elo{font-size:48px;font-weight:800;color:#e8e6e3;letter-spacing:-2px;line-height:1}
.home-hero-delta{font-size:15px;font-weight:600;letter-spacing:-.3px}
.home-hero-delta.up{color:#629924}
.home-hero-sub{font-size:11px;color:#3a3630;margin-top:1px;min-height:14px}
/* STEP 1: delta down era #c33 — ora coerente con sistema: rosso solo per perdite, non per draw */
.home-hero-delta.down{color:#c33}

/* ── Home active section ── */
#home-active{flex-shrink:0;padding:0 16px}
#home-active:empty{display:none}
.home-active-label{font-size:10px;font-weight:600;color:#3a3630;text-transform:uppercase;letter-spacing:1.4px;padding:10px 0 6px}

/* ── Sistema card attive — geometria rigida condivisa da tutti gli stati ──
   Altezza minima fissa: 64px. Tutti gli stati usano questa struttura:
   [accent 3px] [body flex] [cta-wrap 124px fisso]
   L'unica variante è il contenuto, non la geometria.
*/
.acard{
  background:#1d1a16;
  border:0.5px solid #2a2724;
  border-radius:14px;
  min-height:64px;
  margin-bottom:6px;
  display:flex;align-items:stretch;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.acard.acard-passive{
  background:#1d1a16;
  border-color:#1d1a16;
  opacity:.70;
}
/* Accent bar — 3px, colore per stato */
.acard-accent{width:3px;min-width:3px;flex-shrink:0;background:#252220}
.acard-accent.green{background:#629924}
.acard-accent.red{background:#c33}

/* Body — flex, prende tutto lo spazio */
.acard-body{
  flex:1;min-width:0;
  padding:0 8px 0 14px;
  display:flex;flex-direction:column;justify-content:center;
  gap:3px;
}
.acard-name{
  font-size:15px;font-weight:600;color:#e8e6e3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.2;
}
.acard.acard-passive .acard-name{color:#3a3630;font-weight:500}
.acard-elo{font-size:11px;font-weight:400;color:#3a3630;margin-left:5px}
.acard-status{font-size:13px;color:#4a4642;line-height:1.2;font-weight:400}
.acard-status.red{color:#c33}
.acard.acard-passive .acard-status{color:#3a3630}

/* Riga colore — solo card incoming */
.acard-colors{
  display:flex;align-items:center;gap:10px;
  margin-top:1px;
}
.acard-color-player{
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:400;color:#3a3630;
}
.cdot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.cdot.w{background:#c8c4be;box-shadow:inset 0 0 0 1px #6a6560}
.cdot.b{background:#252220;box-shadow:inset 0 0 0 1px #3a3630}

/* CTA wrap — larghezza fissa 96px, allineamento centrato */
.acard-cta{
  width:124px;min-width:124px;
  display:flex;align-items:center;justify-content:center;
  padding:10px 12px;
  flex-shrink:0;
}
.acard-btn{
  border:none;border-radius:10px;
  font-size:13px;font-weight:700;
  cursor:pointer;
  transition:opacity .12s,transform .1s;
  font-family:inherit;
  padding:8px 14px;
  letter-spacing:-.1px;
  white-space:nowrap;
  width:100%;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.acard-btn:active{opacity:.75;transform:scale(.97)}
.acard-btn.primary{background:#e8e6e3;color:#161512}
.acard-btn.danger{background:#2a1010;color:#e87070;border:1px solid #3a1515}
.acard-btn.muted{
  background:transparent;color:#3a3630;
  font-weight:400;font-size:12px;
  cursor:default;
}
.acard-btn.muted:active{opacity:1;transform:none}
.acard-btn.cancel{background:#252220;color:#6a6560;font-weight:500;font-size:12px;border:none}
.acard-btn.cancel:active{opacity:.5;transform:scale(.97)}

/* Card incoming — due bottoni in fondo, stessa larghezza totale */
.acard-incoming-btns{
  display:flex;
  border-top:0.5px solid #252220;
  flex-shrink:0;
}
.acard-accept{
  flex:1;padding:13px 0;
  font-size:14px;font-weight:700;
  background:#e8e6e3;color:#161512;
  border:none;border-radius:0 0 0 14px;
  cursor:pointer;font-family:inherit;
  letter-spacing:-.2px;
  transition:opacity .12s;
  -webkit-tap-highlight-color:transparent;
}
.acard-accept:active{opacity:.75}
.acard-decline{
  padding:13px 18px;
  font-size:12px;font-weight:500;
  background:transparent;color:#4a4642;
  border:none;border-left:0.5px solid #252220;
  border-radius:0 0 14px 0;
  cursor:pointer;font-family:inherit;
  transition:opacity .12s;
  -webkit-tap-highlight-color:transparent;
}
.acard-decline:active{color:#6a6560}

/* Progress bar countdown nelle acard (incoming/sent) */
.acard-progress-wrap{
  height:2px;background:#252220;flex-shrink:0;
  margin:0;width:100%;
}
.acard-progress{
  height:100%;background:#629924;
  transition:width 1s linear;
  border-radius:0;
}
.acard-progress.urgent{background:#c33}

/* Storico — label ripristinata */
#home-history-label{
  font-size:10px;font-weight:600;color:#3a3630;
  text-transform:uppercase;letter-spacing:1.4px;
  padding:8px 0 5px;flex-shrink:0;
}
#home-history-label:empty{display:none}

/* Storico collassato — riga singola cliccabile */
#home-history-collapsed{
  display:none;
  align-items:center;justify-content:space-between;
  padding:12px 0;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#home-history-collapsed.visible{display:flex}
#home-history-collapsed span{font-size:12px;color:#3a3630;font-weight:500}
#home-history-collapsed .hcoll-arrow{font-size:12px;color:#2a2724}

/* Storico espanso — animazione collasso */
#home-history-list{
  overflow:hidden;
  transition:max-height .3s ease-out, opacity .3s ease-out;
}
#home-history-list.collapsed{
  max-height:0!important;
  opacity:0;
  pointer-events:none;
}

/* STEP 2: CAB è inline — padding bottom solo per navbar */
#home-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 16px calc(80px + env(safe-area-inset-bottom,0px))}
#home-scroll::-webkit-scrollbar{display:none}

/* ── STEP 2: Contextual Action Bar — inline sotto l'ELO ── */
#cab{
  position:relative;
  width:100%;
  padding:0 16px 10px;
}

/* Barra principale — altezza fissa, contenuto cambia */
.cab-bar{
  height:52px;
  border-radius:16px;
  display:flex;align-items:center;
  padding:0 18px;
  gap:12px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:background .2s ease, box-shadow .2s ease, opacity .15s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  flex-shrink:0;
}
.cab-bar:active{opacity:.85;transform:scale(.99)}
/* reset active per stati non-tappabili */
.cab-bar.cab-inactive:active{opacity:1;transform:none}

/* Stato IDLE: surface con bordo — tappabile ma non compete con ELO */
.cab-idle{
  background:#1d1a16;
  box-shadow:inset 0 0 0 2px #4a4642;
}
.cab-idle .cab-label{color:#e8e6e3;font-size:16px;font-weight:800;letter-spacing:-.3px}
.cab-idle .cab-arrow{opacity:.4}
.cab-idle:active{opacity:.75;transform:scale(.99)}
.cab-icon{display:none!important}

/* Stato WAITING/disabled: quasi invisibile — le card comunicano già tutto */
.cab-waiting{
  background:#1d1a16;
  box-shadow:inset 0 0 0 0.5px #2a2724;
  cursor:default;animation:none;
}
.cab-waiting .cab-label{color:#6a6560;font-size:13px;font-weight:500;letter-spacing:0}
.cab-inactive{pointer-events:none}

/* Label container: permette cross-fade tra stati */
.cab-label-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;min-width:0}
.cab-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cab-arrow{font-size:15px;opacity:.4;flex-shrink:0;margin-left:auto}

/* Search aperta nella CAB: la barra diventa input */
.cab-search-bar{
  height:52px;
  background:#1d1a16;
  border:1px solid #3a3630;
  border-radius:16px;
  display:none;
  align-items:center;
  padding:0 14px 0 18px;
  gap:10px;
  flex-shrink:0;
}
.cab-search-bar.open{display:flex}
.cab-search-input{
  flex:1;background:transparent;border:none;border-radius:0;
  padding:0;font-size:16px;font-weight:500;color:#e8e6e3;
  outline:none;height:100%;
}
.cab-search-input::placeholder{color:#4a4642;font-weight:400;font-size:15px}
.cab-close-btn{background:none;border:none;color:#6a6560;font-size:20px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0;transition:color .15s}
.cab-close-btn:active{color:#e8e6e3}

/* Risultati search — appaiono sotto la barra */
.cab-results{
  position:absolute;
  top:calc(100% + 4px);
  left:16px;right:16px;
  background:#161512;
  border:1px solid #2a2724;
  border-radius:16px;
  overflow:hidden;
  max-height:300px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
  z-index:10;
}
.cab-results.open{display:block}
.cab-results::-webkit-scrollbar{display:none}

/* Feedback "Risultato inviato" — cross-fade sopra la barra */
@keyframes cabFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cabFadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-4px)}}
.cab-feedback{
  position:absolute;inset:0;
  border-radius:16px;
  background:#1d1a16;
  border:1px solid #2a2724;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:#6a6560;letter-spacing:-.1px;
  pointer-events:none;
  opacity:0;
}
.cab-feedback.show{animation:cabFadeIn .3s ease forwards}
.cab-feedback.hide{animation:cabFadeOut .3s ease forwards}



/* Search aperta — solo lo storico sfuma, state-bar resta visibile */
#page-home.search-open #home-scroll{
  opacity:.06;
  pointer-events:none;
  transition:opacity .18s ease;
}
#page-home:not(.search-open) #home-scroll{
  opacity:1;
  pointer-events:auto;
  transition:opacity .18s ease;
}

/* Lista giocatori nella search */
.prow{background:#1d1a16;border:1px solid #252220;border-radius:12px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.prow:active{border-color:#3a3630}
.pname{font-size:15px;color:#e8e6e3;font-weight:600}
.pelo{font-size:12px;color:#4a4642;margin-top:2px}

/* ── Action sheet colore ── */
.asheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10001;display:flex;align-items:flex-end;pointer-events:none}
.asheet-overlay.visible{background:rgba(0,0,0,.75);pointer-events:all}
.asheet{background:#161512;border-radius:24px 24px 0 0;padding:24px 16px 40px;width:100%;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.24,1)}
.asheet-overlay.visible .asheet{transform:translateY(0)}
.asheet-eyebrow{font-size:11px;color:#6a6560;text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.asheet-colors{display:flex;gap:8px;margin-bottom:12px}
.asheet-color-btn{flex:1;border:none;border-radius:16px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .2s;position:relative;height:88px}
.asheet-color-btn:active{transform:scale(.94)}
.asheet-color-white{background:#e8e6e3}
.asheet-color-white .asheet-color-name{font-size:14px;font-weight:700;color:#161512;letter-spacing:-.2px}
.asheet-color-black{background:#161512;box-shadow:inset 0 0 0 1px #2a2724}
.asheet-color-black .asheet-color-name{font-size:14px;font-weight:700;color:#e8e6e3;letter-spacing:-.2px}
.asheet-color-white{opacity:1}
.asheet-color-black{opacity:.38}
.asheet-cta{width:100%;background:#e8e6e3;border:none;border-radius:14px;padding:16px;color:#161512;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .12s;margin-bottom:8px}
.asheet-cta:active{opacity:.85;transform:scale(.99)}
.asheet-cta:disabled{background:#252220;color:#3a3630;cursor:not-allowed}

/* Animazioni */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes cardEnter{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.card-enter{animation:cardEnter .35s cubic-bezier(.2,0,.2,1) both}
@keyframes swipeHint{0%{transform:translateX(0)}40%{transform:translateX(-9px)}60%{transform:translateX(-9px)}100%{transform:translateX(0)}}
.hrow-swipe-hint{animation:swipeHint .7s cubic-bezier(.25,0,.25,1) 1.4s both}

/* ── Storico — archivio, non UI primaria ── */

/* Action sheet risultato */
.rsheet-context{font-size:13px;color:#6a6560;text-align:center;margin-bottom:16px;font-weight:500}
.rsheet-btns{background:#252220;border-radius:14px;overflow:hidden;margin-bottom:8px}
.rsheet-btn{width:100%;padding:16px 20px;border-radius:0;font-size:16px;font-weight:600;text-align:left;cursor:pointer;transition:opacity .15s,background .1s;border:none;border-bottom:0.5px solid #3a3630;font-family:inherit;letter-spacing:-.2px;background:transparent;color:#e8e6e3}
.rsheet-btn:last-child{border-bottom:none}
.rsheet-btn:active{background:#2a2724;opacity:.8}
.rsheet-btn.win{}
.rsheet-btn.draw{}
.rsheet-btn.loss{}
.rsheet-cancel{width:100%;background:transparent;border:none;color:#4a4642;font-size:15px;font-weight:500;padding:14px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.rsheet-cancel:active{opacity:.5}
.btn-result{width:100%;background:#e8e6e3;color:#161512;border:none;border-radius:12px;padding:15px 18px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .2s cubic-bezier(.34,1.56,.64,1);text-align:left;display:flex;align-items:center;justify-content:space-between}
.btn-result:not(.no-arrow)::after{content:'→';font-size:16px;opacity:.5}
.btn-result:active{opacity:.8;transform:scale(.97)}
.btn-result.waiting{background:#1d1a16;color:#6a6560;border:1px solid #2a2724;cursor:default}
.btn-result.waiting::after{display:none}
.waiting-dots{font-size:11px;color:#3a3630;flex-shrink:0}

.btn-accept{flex:1;background:#e8e6e3;color:#161512;border:none;border-radius:12px;padding:15px 0;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .2s cubic-bezier(.34,1.56,.64,1);font-family:inherit;letter-spacing:-.2px}
.btn-accept:active{opacity:.8;transform:scale(.96)}
.btn-decline{background:transparent;color:#6a6560;border:none;padding:15px 14px;font-size:14px;cursor:pointer;transition:opacity .15s;font-family:inherit;white-space:nowrap;font-weight:500}
.btn-decline:active{opacity:.4}

/* ── ELO strip ── */
.elo-info-btn{width:13px;height:13px;border-radius:50%;border:1px solid #3a3630;color:#4a4642;font-size:8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.elo-tooltip{position:absolute;top:calc(100% + 6px);left:0;width:230px;background:#1d1a16;border:1px solid #3a3630;border-radius:10px;padding:12px;z-index:30;box-shadow:0 4px 20px rgba(0,0,0,.6);display:none}
.elo-tooltip.visible{display:block}
.elo-tooltip-title{font-size:11px;font-weight:700;color:#e8e6e3;margin-bottom:6px}
.elo-tooltip-text{font-size:10px;color:#6a6560;line-height:1.6}
#home-history{margin-top:0}

/* ── Alert ── */
.alert{background:#1d1a16;border:1px solid #3a3630;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.alert-t{font-size:10px;color:#4a4642;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.alert-vs{font-size:15px;color:#e8e6e3;font-weight:600;margin-bottom:3px}
.alert-r{font-size:12px;color:#6a6560;margin-bottom:12px}
.alert-btns{display:flex;gap:8px}
.btn-yes{background:#e8e6e3;color:#161512;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;transition:opacity .15s}
.btn-yes:active{opacity:.8}
.btn-no{background:transparent;color:#c33;border:1px solid #c33;border-radius:8px;padding:10px 16px;font-size:13px;transition:opacity .15s}
.btn-no:active{opacity:.7}

.btn-sm{background:#2a2724;color:#e8e6e3;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;flex-shrink:0;transition:opacity .15s;border:1px solid #3a3630}
.btn-sm:active{opacity:.7}
.btn-play{background:#e8e6e3;color:#161512;border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:700;flex-shrink:0;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.btn-play:active{opacity:.8;transform:scale(.97)}
.btn-play.unavailable{background:transparent;color:#3a3630;border:1px solid #252220;cursor:default;font-weight:500;font-size:13px}

/* ── Search / Prow ── */
.prow{background:#1d1a16;border:1px solid #252220;border-radius:12px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.prow:active{border-color:#3a3630}
.pname{font-size:15px;color:#e8e6e3;font-weight:600}
.pelo{font-size:12px;color:#4a4642;margin-top:2px}

/* ── Leaderboard / Attività ── */
#page-lb.active{display:flex;flex-direction:column;overflow:hidden}
.lb-chips{display:flex;gap:8px;padding:12px 16px 8px;flex-shrink:0;background:#161512;position:sticky;top:0;z-index:5}
.lb-chip{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;border:none;outline:none;background:#252220;color:#6a6560}
.lb-chip:active{opacity:.75}
.lb-chip.active{background:#e8e6e3;color:#161512}
.lb-view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:8px 16px calc(80px + env(safe-area-inset-bottom,0px))}
.lb-view::-webkit-scrollbar{display:none}
.lb-view.active{display:block}
.lb-leader{background:#1d1a16;border:1px solid #3a3630;border-radius:14px;padding:20px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lb-leader:active{background:#252220}
.lb-leader.me{background:#252220}
.lb-leader-rank{font-size:22px;font-weight:800;color:#e8e6e3;width:30px;text-align:center;flex-shrink:0}
.lb-leader-name{font-size:17px;font-weight:700;color:#e8e6e3}
.lb-leader-elo{font-size:24px;font-weight:800;color:#e8e6e3;margin-left:auto;letter-spacing:-1px}
.lb-group{background:#1d1a16;border:0.5px solid #2a2724;border-radius:14px;overflow:hidden}
.lb-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:0.5px solid #252220;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.lb-row:last-child{border-bottom:none}
.lb-row:active{background:#252220}
.lb-row.me{background:#252220}
.lb-row-rank{font-size:13px;font-weight:600;color:#4a4642;width:24px;text-align:center;flex-shrink:0}
.lb-row-info{flex:1;min-width:0}
.lb-row-name{font-size:15px;font-weight:600;color:#e8e6e3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.lb-row-me-tag{font-size:10px;font-weight:400;color:#4a4642}
.lb-row-sub{font-size:11px;color:#4a4642;margin-top:2px}
.lb-row-elo-wrap{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.lb-row-elo{font-size:16px;font-weight:700;color:#e8e6e3}
.lb-row-daily{font-size:11px;font-weight:500}
.lb-row-daily.pos{color:#3d6b1a}
.lb-row-daily.neg{color:#7a2020}
.lb-row-trend{font-size:9px;margin-left:2px}
.lb-row-trend.up{color:#3d6b1a}
.lb-row-trend.down{color:#7a2020}
.lb-me-sticky{position:fixed;bottom:calc(52px + max(env(safe-area-inset-bottom),8px));left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:0 16px;z-index:50}
.lb-me-sticky-inner{background:#1d1a16;border:1px solid #3a3630;border-radius:12px;display:flex;align-items:center;gap:12px;padding:12px 14px;box-shadow:0 -4px 20px rgba(0,0,0,.5);cursor:pointer;-webkit-tap-highlight-color:transparent}
.lb-me-sticky-inner:active{background:#252220}
.lb-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#3d6b1a;margin-left:6px;vertical-align:middle}
.lb-dot.playing{animation:lb-pulse 1.5s ease-in-out infinite}
@keyframes lb-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lb-status{font-size:11px;color:#4a4642;font-weight:400}
.lb-feed-row{padding:11px 14px;border-bottom:0.5px solid #252220;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;background:transparent}
.lb-feed-row:active{background:#252220}
.lb-feed-row:last-child{border-bottom:none}
.lb-group .lb-feed-row:last-child{border-bottom:none}
.lb-feed-left{flex:1;min-width:0}
.lb-feed-name{font-size:14px;font-weight:400;color:#6a6560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.lb-feed-name strong{font-weight:700}
.lb-feed-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end}
.lb-feed-delta{font-size:14px;font-weight:700;line-height:1}
.lb-feed-delta.pos{color:#3d6b1a}
.lb-feed-delta.neg{color:#7a2020}
.lb-feed-delta.draw{color:#3a3630}
.lb-feed-event .lb-feed-name{color:#e8e6e3;font-weight:400}
.lb-feed-event .lb-feed-name strong{font-weight:600}
.lb-feed-event .lb-feed-name strong.ev-overtake-pos{color:#629924}
.lb-feed-event .lb-feed-name strong.ev-overtake-neg{color:#7a2020}
.lb-feed-event .lb-feed-name strong.ev-overtake-other{color:#6a6560}
.lb-feed-event .lb-feed-name strong.ev-upset{color:#b8a04a}
.lb-feed-event .lb-feed-name strong.ev-milestone{color:#b8a04a}
.lb-feed-event .lb-feed-name strong.ev-streak{color:#e8e6e3}
.lb-feed-event .lb-feed-name strong.ev-newplayer{color:#e8e6e3}
.lb-feed-event.ev-other .lb-feed-name{color:#6a6560}
.lb-feed-event.ev-other .lb-feed-name strong{color:#6a6560}
.feed-divider{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:600;color:#3a3630;margin:14px 0 6px;text-transform:uppercase;letter-spacing:1.2px}
.feed-divider::before,.feed-divider::after{content:'';flex:1;height:0.5px;background:#252220}
.feed-counter{font-size:13px;color:#6a6560;text-align:center;padding:8px 0 12px;font-weight:600}
/* ── Profile ── */
.prof-sticky{flex-shrink:0;background:#161512;padding:0 16px}
.prof-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 16px calc(80px + env(safe-area-inset-bottom,0px))}
.prof-scroll::-webkit-scrollbar{display:none}
.prof-header{background:#1d1a16;border:1px solid #252220;border-radius:14px;padding:20px 16px;margin-bottom:12px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px}
.prof-back-icon{position:absolute;top:12px;left:14px;background:none;border:none;color:#3a3630;font-size:18px;cursor:pointer;padding:4px;line-height:1;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.prof-back-icon:active{opacity:.6}
.prof-nick{font-size:20px;font-weight:700;color:#e8e6e3;text-align:center;margin-bottom:4px}
.prof-rank-meta{font-size:11px;color:#4a4642;text-align:center;margin-bottom:3px}
.prof-bio{font-size:12px;color:#4a4642;text-align:center;margin-bottom:0}
.prof-edit-form{background:#1d1a16;border:1px solid #252220;border-radius:14px;padding:16px;margin-bottom:14px}
.prof-edit-form input,.prof-edit-form textarea{margin-bottom:8px}
.prof-elo-hero{text-align:center;margin-bottom:2px}
.prof-elo-num{font-size:32px;font-weight:800;color:#e8e6e3;line-height:1}
.prof-elo-peak{font-size:11px;color:#4a4642;margin-top:4px}
.prof-elo-peak strong{color:#6a6560;font-weight:600}
.prof-elo-gap{font-size:11px;color:#7a2020;margin-top:2px;text-align:center}
.prof-stats-line{font-size:13px;color:#6a6560;text-align:center;margin-top:6px;margin-bottom:14px}
.prof-stats-line .win{color:#3d6b1a;font-weight:600}
.prof-stats-line .loss{color:#7a2020;font-weight:600}
.prof-stats-line .draw{color:#4a4642;font-weight:600}
.prof-stats-line .rate{color:#e8e6e3;font-weight:700}
.prof-stats-line .streak{color:#e8e6e3;font-weight:600}
.prof-chart-wrap{margin-bottom:14px}
canvas{width:100%!important;display:block}
.prof-section-label{font-size:10px;font-weight:600;color:#3a3630;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px;margin-top:18px}
.prof-h2h{background:#1d1a16;border:1px solid #252220;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.prof-h2h-label{font-size:14px;color:#e8e6e3;font-weight:600}
.prof-h2h-record{font-size:14px;font-weight:700;display:flex;gap:6px}
.prof-h2h-record .w{color:#3d6b1a}
.prof-h2h-record .l{color:#7a2020}
.prof-h2h-record .d{color:#4a4642}
.prof-rival-row{padding:11px 14px;border-bottom:0.5px solid #252220;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.prof-rival-row:active{background:#252220}
.prof-rival-row:last-child{border-bottom:none}
.prof-rival-name{font-size:14px;font-weight:600;color:#e8e6e3}
.prof-rival-record{font-size:13px;color:#6a6560;font-weight:500}
.prof-rival-record .w{color:#3d6b1a;font-weight:700}
.prof-rival-record .l{color:#7a2020;font-weight:700}
.prof-rival-record .d{color:#4a4642;font-weight:700}
.prof-day-header{display:flex;align-items:center;justify-content:space-between;padding:6px 0 6px}
.prof-day-label{font-size:12px;color:#4a4642;font-weight:600}
.prof-day-summary{font-size:11px;color:#4a4642}
.prof-day-summary .elo-up{color:#3d6b1a}
.prof-day-summary .elo-down{color:#7a2020}
.prof-match-row{padding:11px 14px;border-bottom:0.5px solid #252220;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.prof-match-row:active{background:#252220}
.prof-match-row:last-child{border-bottom:none}
.prof-match-left{flex:1;min-width:0}
.prof-match-name{font-size:14px;font-weight:600;color:#e8e6e3}
.prof-match-meta{font-size:11px;color:#4a4642;margin-top:1px}
.prof-match-right{text-align:right;flex-shrink:0}
.prof-match-result{font-size:11px;font-weight:500}
.prof-match-result.win{color:#3d6b1a}
.prof-match-result.loss{color:#7a2020}
.prof-match-result.draw{color:#4a4642}
.prof-match-delta{font-size:14px;font-weight:700;margin-top:1px}
.prof-footer{padding:24px 0 16px;text-align:center}
.prof-footer-link{background:none;border:none;color:#4a4642;font-size:13px;font-weight:500;cursor:pointer;padding:10px 16px;display:block;width:100%;-webkit-tap-highlight-color:transparent}
.prof-footer-link:active{color:#6a6560}
.prof-cta{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));background:linear-gradient(transparent,#161512 30%);z-index:50}
.prof-cta button{width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer}
.prof-cta button.active{background:#e8e6e3;color:#161512}
.prof-cta button.active:active{opacity:.85}
.prof-cta button.disabled{background:#252220;color:#4a4642;pointer-events:none}
.back-btn{background:none;border:none;color:#4a4642;font-size:13px;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.back-btn:active{opacity:.7}
/* ── hrow — storico home ── */
.hrow-wrap{position:relative;overflow:hidden;margin-bottom:0;background:transparent}
.hrow-reveal{position:absolute;right:0;top:0;bottom:0;width:0;overflow:hidden;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:width 0s}
.hrow-reveal.state-ok{background:#e8e6e3}
.hrow-reveal.state-err{background:#2a2724}
.hrow-reveal-label{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.hrow-reveal.state-ok .hrow-reveal-label{color:#161512}
.hrow-reveal.state-err .hrow-reveal-label{color:#6a6560}
.hrow{background:transparent;border:none;border-bottom:0.5px solid #252220;border-radius:0;padding:11px 14px;display:flex;align-items:center;gap:10px;position:relative;will-change:transform;-webkit-tap-highlight-color:transparent}
.hrow:active{background:#252220}
.hrow-wrap:last-child .hrow{border-bottom:none}
/* nessuna accent bar nello storico — il colore è nel dot */
.hrow-accent{display:none}
.hrow-left{flex:1;min-width:0}
.hrow-opp{font-size:14px;color:#e8e6e3;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.color-dot{width:7px;height:7px;min-width:7px;min-height:7px;border-radius:50%;flex-shrink:0;display:block}
.color-dot-white{background:#4a4642;box-shadow:0 0 0 1px #3a3630}
.color-dot-black{background:#252220;box-shadow:0 0 0 1px #2a2724}
.hrow-meta{font-size:11px;color:#4a4642;margin-top:2px;display:flex;gap:5px;align-items:center}
.hrow-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.hrow-result{font-size:11px;font-weight:500;color:#2a2724}
.hrow-result.win{color:#3d6b1a}
.hrow-result.loss{color:#7a2020}
.hrow-result.draw{color:#2a2724}
.hrow-result.cancelled{color:#252220}
.hrow-elo{font-size:14px;font-weight:700;line-height:1;color:#4a4642}
.elo-up{color:#3d6b1a}
.elo-down{color:#7a2020}
.elo-draw{color:#2a2724}
.d-pos{color:#3d6b1a;font-size:12px}
.d-neg{color:#7a2020;font-size:12px}

/* ── Long press ── */
.lp-btn{position:relative;overflow:hidden;cursor:pointer;font-family:inherit;user-select:none}
.lp-bar{position:absolute;left:0;top:0;height:100%;width:0%;background:rgba(195,51,51,0.15);transition:none;pointer-events:none;border-radius:inherit}
.lp-btn.pressing .lp-bar{width:100%;transition:width 0.8s linear}

/* ── Comments (legacy) ── */
.comment-nick{font-size:12px;font-weight:600;color:#e8e6e3;cursor:pointer}
.comment-nick:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="sa-cover" style="position:fixed;top:0;left:0;right:0;height:calc(env(safe-area-inset-top,20px) + 50px);background:#161512;z-index:9999;pointer-events:none;transition:background .35s"></div>
<div id="notif" class="notif"></div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-wordmark">
    <span class="auth-name">turko</span>
    <span class="auth-tagline">built for over-the-board chess</span>
  </div>
  <div id="box-login" class="box">
    <span class="box-label">Accedi</span>
    <div class="frow"><input id="l-nick" class="auth-input" placeholder="nickname" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false"></div>
    <div class="frow"><input id="l-pass" class="auth-input" type="password" placeholder="password" autocomplete="current-password"></div>
    <div id="l-err" class="err"></div>
    <button id="l-btn" class="btn-g">Entra</button>
    <button id="l-toreg" class="btn-o">Crea account</button>
  </div>

  <div id="box-reg" class="box hidden">
    <span class="box-label">Nuovo account</span>
    <div class="auth-hint">Non perdere la password, non la puoi recuperare.</div>
    <div class="frow"><input id="r-nick" class="auth-input" placeholder="nickname (3-20 caratteri)" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false" maxlength="20"></div>
    <div class="frow"><input id="r-pass" class="auth-input" type="password" placeholder="password" autocomplete="new-password"></div>
    <div class="frow"><input id="r-conf" class="auth-input" type="password" placeholder="conferma password" autocomplete="new-password"></div>
    <div id="r-err" class="err"></div>
    <button id="r-btn" class="btn-g">Registrati</button>
    <button id="r-tolog" class="btn-o">Accedi</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <div class="topbar">

const _WIN_COPY  = ['Boom!', 'GG', 'Semplice', 'Clean', 'Bravo', 'Mica male', 'Ez', 'Next.', 'Chirurgico', 'OK!'];
const _LOSS_COPY = ['Capita', 'Skill issue?', 'Cooked', 'Bruh', 'Ahi', 'La prossima', 'No.', 'L', 'Outplayed', 'Rough'];
const _DRAW_COPY = ['Meh', 'Pari', '50/50', 'Mah', 'Ok, I guess', 'Respect', 'Nulla di fatto', 'Pari e patta', 'Mid', 'X'];

function resultCopy(type, delta) {
  const d = delta !== null ? `${delta >= 0 ? '+' : ''}${delta} · ` : '';
  const pool = type === 'win' ? _WIN_COPY : type === 'loss' ? _LOSS_COPY : _DRAW_COPY;
  return d + pool[Math.floor(Math.random() * pool.length)];
}

// ── Toast ──
let _toastQueue = [];
let _toastBusy = false;

function toast(msg, type="ok") {
  _toastQueue.push({msg, type});
  if(!_toastBusy) _toastFlush();
}

function _toastFlush() {
  if(!_toastQueue.length) { _toastBusy = false; return; }
  _toastBusy = true;
  const {msg, type} = _toastQueue.shift();
  const el = $("notif");
  el.textContent = msg;

  const isResult = type.startsWith('result');
  let cls = 'notif';
  if(type === 'err') cls += ' err';
  else if(type === 'result-win')  cls += ' result result-win';
  else if(type === 'result-loss') cls += ' result result-loss';
  else if(type === 'result-draw') cls += ' result result-draw';
  else if(isResult) cls += ' result result-loss';
  el.className = cls;

  el.style.display = "block";
  const initTransform = isResult ? "translateX(-50%) scale(.94)" : "translateX(-50%) translateY(-4px)";
  const showTransform = isResult ? "translateX(-50%) scale(1)"   : "translateX(-50%) translateY(0)";
  const hideTransform = isResult ? "translateX(-50%) scale(.97)" : "translateX(-50%) translateY(-4px)";

  el.style.opacity = "0";
  el.style.transform = initTransform;
  el.style.transition = isResult
    ? 'opacity .2s ease, transform .25s cubic-bezier(.2,1,.3,1)'
    : 'opacity .2s, transform .2s';
  el.getBoundingClientRect();
  el.style.opacity = "1";
  el.style.transform = showTransform;

  // Cancella cab feedback se result arriva durante
  if(isResult) {
    clearTimeout(_cabFeedbackTimer);
    const feedback = $('cab-feedback');
    if(feedback) { feedback.classList.remove('show'); feedback.classList.remove('hide'); }
    _cabState = 'idle';
  }

  const duration = isResult ? 3500 : 2400;
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.transition = isResult
      ? 'opacity .3s ease, transform .3s ease'
      : 'opacity .2s, transform .2s';
    el.style.opacity = "0";
    el.style.transform = hideTransform;
    setTimeout(() => {
      el.style.display = "none";
      _toastBusy = false;
      _toastFlush();
    }, 300);
  }, duration);
}

function isRelativeDate(iso) {
  const now = new Date();
  const d = new Date(iso);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((today - dateDay) / 86400000) <= 7;
}
function memberSince(iso) {
  return isRelativeDate(iso) ? `da ${fmtDate(iso, true)}` : `dal ${fmtDate(iso)}`;
}
function fmtDate(iso, relative=false) {
  const now = new Date();
  const d = new Date(iso);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dayDiff = Math.round((today - dateDay) / 86400000);
  if(relative) {
    if(dayDiff === 0) return 'oggi';
    if(dayDiff === 1) return 'ieri';
    if(dayDiff < 7) return `${dayDiff} giorni`;
    if(dayDiff === 7) return 'una settimana';
  } else {
    if(dayDiff === 0) return 'oggi';
    if(dayDiff === 1) return 'ieri';
    if(dayDiff < 7) return `${dayDiff} giorni fa`;
    if(dayDiff === 7) return 'una settimana fa';
  }
  return d.toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'});
}

async function generateMatchEvents(m) {
  if(!m.result || m.result === 'cancelled' || m.result === 'draw') return;

  const winnerId = m.result === 'p1' ? m.p1 : m.p2;
  const loserId = m.result === 'p1' ? m.p2 : m.p1;
  const winner = getP(winnerId);
  const loser = getP(loserId);
  if(!winner || !loser) return;

  const winEh = eloCache[m.id] || globalEloCache[m.id + '_' + winnerId];
  const loseEh = globalEloCache[m.id + '_' + loserId];
  if(!winEh) return;

  const winOldElo = winEh.elo_before;
  const winNewElo = winEh.elo_after;
  const loseOldElo = loseEh ? loseEh.elo_before : null;
  const loseNewElo = loseEh ? loseEh.elo_after : null;

  const eventsToInsert = [];

  // Sorpasso diretto
  if(loseOldElo !== null && loseNewElo !== null) {
    if(winOldElo < loseOldElo && winNewElo > loseNewElo) {
      eventsToInsert.push({
        type: 'overtake', player_id: winnerId, target_id: loserId, match_id: m.id,
        data: { winner_name: winner.nickname, overtaken_name: loser.nickname, new_elo: winNewElo, overtaken_elo: loseNewElo }
      });
    }
  }

  // Sorpassi indiretti (vincitore scavalca terzi)
  players.forEach(p => {
    if(p.id === winnerId || p.id === loserId) return;
    if(p.elo >= winOldElo && p.elo < winNewElo) {
      eventsToInsert.push({
        type: 'overtake', player_id: winnerId, target_id: p.id, match_id: m.id,
        data: { winner_name: winner.nickname, overtaken_name: p.nickname, new_elo: winNewElo, overtaken_elo: p.elo }
      });
    }
  });

  // Sorpassi inversi (terzi superano il perdente)
  if(loseOldElo !== null && loseNewElo !== null) {
    players.forEach(p => {
      if(p.id === winnerId || p.id === loserId) return;
      if(p.elo <= loseOldElo && p.elo > loseNewElo) {
        eventsToInsert.push({
          type: 'overtake', player_id: p.id, target_id: loserId, match_id: m.id,
          data: { winner_name: p.nickname, overtaken_name: loser.nickname, new_elo: p.elo, overtaken_elo: loseNewElo }
        });
      }
    });
  }

  // Upset
  if(loseOldElo !== null && loseOldElo - winOldElo >= 50) {
    eventsToInsert.push({
      type: 'upset', player_id: winnerId, target_id: loserId, match_id: m.id,
      data: { winner_name: winner.nickname, loser_name: loser.nickname, diff: loseOldElo - winOldElo, delta: winNewElo - winOldElo }
    });
  }

  // Milestone ELO
  if(Math.floor(winNewElo / 100) > Math.floor(winOldElo / 100) && winNewElo >= 1500) {
    eventsToInsert.push({
      type: 'milestone', player_id: winnerId, match_id: m.id,
      data: { nickname: winner.nickname, milestone: Math.floor(winNewElo / 100) * 100, elo: winNewElo }
    });
  }

  // Streak (3, 5, 10)
  const streak = winner.win_streak || 0;
  if(streak === 3 || streak === 5 || streak === 10) {
    eventsToInsert.push({
      type: 'streak', player_id: winnerId, match_id: m.id,
      data: { nickname: winner.nickname, streak: streak }
    });
  }

  // Peak (non milestone)
  if(winNewElo > winOldElo && winNewElo > 1500 && Math.floor(winNewElo / 100) === Math.floor(winOldElo / 100)) {
    if(winNewElo >= (winner.elo_peak || 1500)) {
      eventsToInsert.push({
        type: 'peak', player_id: winnerId, match_id: m.id,
        data: { nickname: winner.nickname, elo: winNewElo }
      });
    }
  }

  // Inserisci (fire and forget)
  for(const ev of eventsToInsert) {
    try { await db.post('events', ev); } catch(e) { console.log('Event insert failed:', e); }
  }
}

async function doLogout() {
  stopPolling();
  stopRealtime();
  stopHeartbeat();
  await db.patch("players", `id=eq.${me.id}`, {last_seen_at: new Date(0).toISOString()});
  await fetch(`${SUPA_URL}/auth/v1/logout`, {method:"POST", headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+authToken}});
  authToken = null; me = null; players = []; matches = []; activeMatch = null;

// --- DATA ---
let eloCache = {};
const _toastedMatchIds = new Set();
const _eventedMatchIds = new Set();

async function fetchAll() {
  if(!me) return;
  const prevMatches = [...matches];
  const [ps, ms, done, eloH, globalDone, globalEloH, dbEvents] = await Promise.all([
    db.get("players", "order=elo.desc"),
    db.get("matches", `or=(p1.eq.${me.id},p2.eq.${me.id})&status=in.(active,pending_challenge)&select=*&order=created_at.desc&limit=50`),
    db.get("matches", `or=(p1.eq.${me.id},p2.eq.${me.id})&status=eq.done&select=*&order=updated_at.desc&limit=30`),
    db.get("elo_history", `player_id=eq.${me.id}&select=*&order=created_at.desc&limit=20`),
    db.get("matches", "status=eq.done&result=not.is.null&result=not.eq.cancelled&order=updated_at.desc&limit=30&select=*"),
    db.get("elo_history", "order=created_at.desc&limit=120&select=*"),
    db.get("events", "order=created_at.desc&limit=50&select=*")
  ]);
  if(Array.isArray(ps)) {
    players = ps;
    const upd = ps.find(p => p.id===me.id);
    if(upd) me = upd;
    if(_cabState === 'search') renderCABSearch();
  }
  if(Array.isArray(ms) && Array.isArray(done)) matches = [...ms, ...done];
  else if(Array.isArray(ms)) matches = ms;
  if(Array.isArray(eloH)) eloH.forEach(e => eloCache[e.match_id] = e);
  if(Array.isArray(globalDone)) globalMatches = globalDone;
  if(Array.isArray(globalEloH)) globalEloH.forEach(e => globalEloCache[e.match_id + '_' + e.player_id] = e);
  if(Array.isArray(dbEvents)) globalEvents = dbEvents;

  updateTopbar();
  await cleanupExpired();

  if(Array.isArray(done)) {
    done.forEach(m => {
      const wasActive = prevMatches.find(p => p.id === m.id && p.status === 'active');
      if(wasActive && !_toastedMatchIds.has(m.id)) {
        _toastedMatchIds.add(m.id);

        if(m.result === 'cancelled') {
          const wasDisputed = wasActive.disputed;
          toast(wasDisputed ? "Partita annullata — nessun accordo" : "Partita annullata", "err");
        } else if(m.result) {
          const isP1 = m.p1 === me.id;
          const won = m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : null;
          const elo = eloCache[m.id];
          const delta = elo ? (elo.elo_after - elo.elo_before) : null;
          if(won === null) toast(resultCopy('draw', delta), 'result-draw');
          else if(won) toast(resultCopy('win', delta), 'result-win');
          else toast(resultCopy('loss', delta), 'result-loss');

          // Genera eventi per questa partita (fire and forget, guard anti-duplicati)
          if(!_eventedMatchIds.has(m.id)) {
            _eventedMatchIds.add(m.id);
            generateMatchEvents(m);
          }
        }
      }
    });
  }

  if(Array.isArray(ms)) {
    ms.forEach(m => {
      const prev = prevMatches.find(p => p.id === m.id);
      if(prev && !prev.disputed && m.disputed) {
        const opp = players.find(p => p.id === (m.p1===me.id ? m.p2 : m.p1));
        // STEP 1: messaggio disputa più chiaro e umano
        toast(`${opp?.nickname||"?"} non è d'accordo`, "err");
      }
    });
  }

  renderHome();
}

function updateCountdowns() {
  if(!me) return;
  const now = Date.now();
  // Aggiorna barre progress sulle acard (incoming/sent)
  document.querySelectorAll('.acard[data-expire]').forEach(card => {
    const expire = parseInt(card.dataset.expire);
    const pct = Math.max(0, Math.min(100, ((expire - now) / CHALLENGE_EXPIRE_MS) * 100));
    const bar = card.querySelector('.acard-progress');
    if(bar) {
      bar.style.width = pct + '%';
      pct < 20 ? bar.classList.add('urgent') : bar.classList.remove('urgent');
    }
  });
  let anyExpired = false;
  matches.forEach(m => {
    if(m.status === 'pending_challenge') {
      const elapsed = Date.now() - new Date(m.created_at).getTime();
      const remaining = CHALLENGE_EXPIRE_MS - elapsed;
      const pct = Math.max(0, Math.min(100, (remaining / CHALLENGE_EXPIRE_MS) * 100));
      const urgent = pct < 20;
      const bar = document.getElementById('prog-' + m.id);
      if(bar) {
        bar.style.width = pct + '%';
        bar.className = 'card-challenge-progress' + (urgent ? ' urgent' : '');
      }
      if(remaining <= 0) anyExpired = true;
    }
  });
  if(anyExpired) cleanupExpired();
}
setInterval(updateCountdowns, 1000);

function getP(id) { return players.find(p => p.id===id); }

// ── ELO Odometer ──
let _lastElo = null;
let _lastDelta = null;
let _eloAnimating = false;
const REEL_DURATION = 1200; // ms per il rullo più veloce (cifra meno significativa)
const REEL_STEP = 80;      // ms aggiuntivi per ogni posizione verso sinistra

function animateElo(el, newVal) {
  const firstRender = _lastElo === null;
  if(firstRender) {
    // Login: mostra direttamente, nessuna animazione
    el.textContent = String(newVal);
    _lastElo = newVal;
    return;
  }
  if(_lastElo === newVal) return;
  if(_eloAnimating) { _lastElo = newVal; el.textContent = String(newVal); return; }

  const oldStr = String(_lastElo).padStart(String(newVal).length, '0');
  const newStr = String(newVal).padStart(oldStr.length, '0');
  const goingUp = newVal > _lastElo;
  _lastElo = newVal;
  _eloAnimating = true;

  // Costruisci rulli — una colonna per digit
  el.style.display = 'inline-flex';
  el.style.alignItems = 'flex-start';
  el.style.overflow = 'hidden';
  el.style.lineHeight = '1';

  const digits = newStr.split('');
  const oldDigits = oldStr.split('');
  const total = digits.length;

  el.innerHTML = digits.map((d, i) => {
    const changed = d !== oldDigits[i];
    return `<span class="odo-col" data-new="${d}" data-old="${oldDigits[i]}" data-changed="${changed}" style="display:inline-block;overflow:hidden;vertical-align:top;line-height:1"></span>`;
  }).join('');

  const cols = el.querySelectorAll('.odo-col');
  let maxDuration = 0;

  cols.forEach((col, i) => {
    const changed = col.dataset.changed === 'true';
    const newD = col.dataset.new;
    const oldD = col.dataset.old;

    if(!changed) {
      col.textContent = newD;
      return;
    }

    // Posizione da destra: 0 = cifra meno significativa
    const posFromRight = total - 1 - i;
    const duration = REEL_DURATION + posFromRight * REEL_STEP;
    const delay = posFromRight * 30; // stagger leggero: le unità partono prima
    maxDuration = Math.max(maxDuration, duration + delay);

    // Stack: old sopra, new sotto (o viceversa)
    const fromY = goingUp ? '110%' : '-110%';
    col.style.position = 'relative';
    col.innerHTML = `
      <span class="odo-old" style="display:block">${oldD}</span>
      <span class="odo-new" style="display:block;position:absolute;top:0;left:0;transform:translateY(${fromY})">${newD}</span>`;

    const oldEl = col.querySelector('.odo-old');
    const newEl = col.querySelector('.odo-new');
    const toOld = goingUp ? '-110%' : '110%';

    setTimeout(() => {
      oldEl.style.transition = `transform ${duration}ms cubic-bezier(.2,1,.3,1)`;
      newEl.style.transition = `transform ${duration}ms cubic-bezier(.2,1,.3,1)`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        oldEl.style.transform = `translateY(${toOld})`;
        newEl.style.transform = 'translateY(0)';
      }));
    }, delay);
  });

  // Cleanup dopo animazione
  setTimeout(() => {
    el.textContent = String(newVal);
    el.style.display = '';
    el.style.overflow = '';
    el.style.lineHeight = '';
    _eloAnimating = false;
  }, maxDuration + 100);
}

function updateTopbar() {
  const hNick = $("h-nick");
  const hElo = $("h-elo");
  const hDelta = $("h-delta");
  if(hNick) hNick.textContent = me.nickname;
  if(hElo) animateElo(hElo, me.elo);
  if(hDelta) {
    const myMatches = matches.filter(m => m.status === "done" && (m.p1===me.id||m.p2===me.id));
    const last = myMatches[0];
    const elo = last ? eloCache[last.id] : null;
    const delta = elo ? (elo.elo_after - elo.elo_before) : null;
    if(delta !== null && delta !== 0) {
      const text = (delta > 0 ? '+' : '') + delta;
      // STEP 1: draw delta in hero — delta 0 non appare mai, ma se appare è neutro
      const cls = 'home-hero-delta ' + (delta > 0 ? 'up' : 'down');
      hDelta.classList.remove('hidden');
      if(delta === _lastDelta) {
        hDelta.textContent = text;
        hDelta.className = cls;
      } else {
        _lastDelta = delta;
        const from = delta > 0 ? '60%' : '-60%';
        const delay = REEL_DURATION + 200;
        hDelta.textContent = text;
        hDelta.className = cls;
        hDelta.style.opacity = '0';
        hDelta.style.transform = `translateY(${from})`;
        hDelta.style.transition = 'none';
        setTimeout(() => {
          hDelta.style.transition = `transform 1s cubic-bezier(.15,0,.1,1), opacity .5s ease`;
          requestAnimationFrame(() => requestAnimationFrame(() => {
            hDelta.style.transform = 'translateY(0)';
            hDelta.style.opacity = '1';
          }));
        }, delay);
      }
    } else {
      _lastDelta = null;
      hDelta.classList.add('hidden');
    }
  }
  // Sub-label hero: partite giocate (non calcola percentile — lo lasciamo semplice)
  const hSub = $('h-sub');
  if(hSub) {
    const played = matches.filter(m => m.status === 'done' && (m.p1===me.id||m.p2===me.id) && m.result !== 'cancelled').length;
    if(played > 0) {
      hSub.textContent = played + (played === 1 ? ' partita' : ' partite');
    } else {
      hSub.textContent = '';
    }
  }
}

function matchLabel(m) {
  if(!m.white_player_id) {
    const p1 = getP(m.p1), p2 = getP(m.p2);
    return `${p1?.nickname||"?"} — ${p2?.nickname||"?"}`;
  }
  const white = getP(m.white_player_id);
  const blackId = m.p1 === m.white_player_id ? m.p2 : m.p1;
  const black = getP(blackId);
  return `${white?.nickname||"?"} — ${black?.nickname||"?"}`;
}

function matchLabelShort(m, myId) {
  if(!m.white_player_id) {
    const opp = getP(m.p1===myId ? m.p2 : m.p1);
    return opp?.nickname||"?";
  }
  const white = getP(m.white_player_id);
  const blackId = m.p1 === m.white_player_id ? m.p2 : m.p1;
  const black = getP(blackId);
  return `${white?.nickname||"?"} — ${black?.nickname||"?"}`;
}

// ── Factory functions card ──
// ── renderActiveCards: unico entry point per card attive ──

function renderActiveCards(activeCards, sentChallenges, incomingChallenges) {
  const container = $('home-active');
  const cards = [];
  const total = incomingChallenges.length + activeCards.length + sentChallenges.length;
  if(total === 0) { container.innerHTML = ''; return; }

  cards.push('<div class="home-active-label">In corso</div>');

  // Helper — struttura HTML condivisa da tutti gli stati
  // [accent 3px] [body] [cta 96px]
  function mkCard(accentClass, name, eloStr, statusHtml, ctaHtml, extra='', passive=false) {
    const passiveCls = passive ? ' acard-passive' : '';
    return `<div class="acard${passiveCls} card-enter">
      <div class="acard-accent ${accentClass}"></div>
      <div class="acard-body">
        <div class="acard-name">${name}${eloStr ? `<span class="acard-elo">${eloStr}</span>` : ''}</div>
        <div class="acard-status ${statusHtml.cls||''}">${statusHtml.text}</div>
        ${extra}
      </div>
      <div class="acard-cta">${ctaHtml}</div>
    </div>`;
  }

  // 1. Incoming — seconda riga dot colore + btns accetta/declina in fondo
  incomingChallenges.forEach(m => {
    const opp = getP(m.p1);
    const oppName = opp?.nickname || '?';
    const eloStr = opp?.elo ? String(opp.elo) : '';
    // Colore inline nella status line
    let colorLine = 'Ti sfida';
    if(m.white_player_id) {
      const amIWhite = m.white_player_id === me.id;
      colorLine = `Ti sfida · tu col ${amIWhite ? 'bianco' : 'nero'}`;
    }
    // Calcola countdown
    const incomingExpire = new Date(m.created_at).getTime() + CHALLENGE_EXPIRE_MS;
    const incomingPct = Math.max(0, Math.min(100, ((incomingExpire - Date.now()) / CHALLENGE_EXPIRE_MS) * 100));
    const incomingUrgent = incomingPct < 20;
    // Card con bottoni accetta/declina in fondo
    cards.push(`<div class="acard card-enter" style="flex-direction:column" data-expire="${incomingExpire}" data-type="incoming">
      <div style="display:flex;align-items:stretch;min-height:64px">
        <div class="acard-accent green"></div>
        <div class="acard-body">
          <div class="acard-name">${oppName}${eloStr ? `<span class="acard-elo">${eloStr}</span>` : ''}</div>
          <div class="acard-status">${colorLine}</div>
        </div>
        <div class="acard-cta" style="width:0;min-width:0;padding:0"></div>
      </div>
      <div class="acard-progress-wrap">
        <div class="acard-progress${incomingUrgent?' urgent':''}" id="aprog-${m.id}" style="width:${incomingPct}%"></div>
      </div>
      <div class="acard-incoming-btns">
        <button class="acard-accept" onclick="acceptChallenge('${m.id}')">Accetta</button>
        <button class="acard-decline" onclick="rejectChallenge('${m.id}')">Declina</button>
      </div>
    </div>`);
  });

  // 2. Dispute
  activeCards.filter(c => c.type === 'disputed').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('red', opp?.nickname||'?', opp?.elo||'',
      {text:'Non torna — rifai', cls:'red'},
      `<button class="acard-btn danger" onclick="openResultSheet('${m.id}')">Reinserisci</button>`
    ));
  });

  // 3. Live
  activeCards.filter(c => c.type === 'live').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('green', opp?.nickname||'?', opp?.elo||'',
      {text:"Com'è andata?"},
      `<button class="acard-btn primary" onclick="openResultSheet('${m.id}')">Inserisci</button>`
    ));
  });

  // 4. Waiting — passivo
  activeCards.filter(c => c.type === 'waiting').forEach(({ m }) => {
    const oppId = m.p1 === me.id ? m.p2 : m.p1;
    const opp = getP(oppId);
    cards.push(mkCard('', opp?.nickname||'?', '',
      {text:"Aspetta l'altro"},
      `<span class="acard-btn muted">In attesa</span>`,
      '', true
    ));
  });

  // 5. Sent — passivo con countdown
  sentChallenges.forEach(m => {
    const opp = getP(m.p2);
    const sentExpire = new Date(m.created_at).getTime() + CHALLENGE_EXPIRE_MS;
    const sentPct = Math.max(0, Math.min(100, ((sentExpire - Date.now()) / CHALLENGE_EXPIRE_MS) * 100));
    const sentUrgent = sentPct < 20;
    cards.push(`<div class="acard acard-passive card-enter" data-expire="${sentExpire}" data-type="sent">
      <div class="acard-accent"></div>
      <div class="acard-body">
        <div class="acard-name">${opp?.nickname||'?'}</div>
        <div class="acard-status">Sfida inviata</div>
        <div class="acard-progress-wrap" style="margin-top:4px">
          <div class="acard-progress${sentUrgent?' urgent':''}" id="aprog-${m.id}" style="width:${sentPct}%"></div>
        </div>
      </div>
      <div class="acard-cta"><button class="acard-btn cancel" onclick="cancelChallenge('${m.id}')">Annulla</button></div>
    </div>`);
  });

  container.innerHTML = cards.join('');
}

function renderHome() {
  const incomingChallenges = matches.filter(m => m.status==="pending_challenge" && m.p2===me.id);
  const sentChallenges     = matches.filter(m => m.status==="pending_challenge" && m.p1===me.id);
  const allActive = matches.filter(m => m.status==="active" && !m.tournament_id);
  const done = matches.filter(m => m.status==="done" && (m.p1===me.id||m.p2===me.id)).slice(0,15);

  const badge = $("badge");
  if(incomingChallenges.length > 0) { badge.textContent = incomingChallenges.length; badge.classList.remove("hidden"); }
  else badge.classList.add("hidden");

  updateCountdowns();

  const activeCards = allActive.map(m => {
    const isP1 = m.p1===me.id;
    const myRes = isP1 ? m.result_p1 : m.result_p2;
    if(m.disputed && !myRes) return { m, type: 'disputed' };
    if(!myRes) return { m, type: 'live' };
    return { m, type: 'waiting' };
  });
  const liveCards     = activeCards.filter(c => c.type === 'live');
  const disputedCards = activeCards.filter(c => c.type === 'disputed');
  window._homeState = { incomingChallenges, sentChallenges, liveCards, disputedCards };

  // Active cards — zona fissa tra CAB e storico
  renderActiveCards(activeCards, sentChallenges, incomingChallenges);

  // Contextual Action Bar
  updateCAB();

  // ── Storico ──
  const hasAnythingActive = allActive.length > 0 || incomingChallenges.length > 0 || sentChallenges.length > 0;
  const meaningful = done.filter(m => m.result !== "cancelled");

  if(meaningful.length === 0) {
    $('home-history-label').style.display = 'none';
    $('home-history-collapsed').classList.remove('visible');
    $('home-history-list').classList.remove('collapsed');
    $("home-history").innerHTML = hasAnythingActive ? '' : `
      <div style="margin-top:32px;text-align:center;padding:0 24px">
        <div style="font-size:32px;margin-bottom:12px;opacity:.3">♟</div>
        <div style="font-size:15px;color:#4a4642;font-weight:600;margin-bottom:6px">Nessuna partita ancora</div>
        <div style="font-size:13px;color:#3a3630;line-height:1.5;cursor:pointer" onclick="onCABTap()">Cerca un avversario e sfidalo<br>per iniziare a giocare</div>
      </div>`;
    return;
  }

  // Collassa storico se c'è un flusso attivo
  if(hasAnythingActive) {
    $('home-history-label').style.display = 'none';
    const collEl = $('home-history-collapsed');
    collEl.classList.add('visible');
    $('home-history-collapsed-text').textContent =
      meaningful.length === 1 ? '1 partita recente' : `${meaningful.length} partite recenti`;
    // Collassa lista se non già espansa manualmente
    const listEl = $('home-history-list');
    if(!listEl.dataset.manualExpand) {
      listEl.style.maxHeight = '0';
      listEl.classList.add('collapsed');
    }
  } else {
    $('home-history-label').style.display = '';
    $('home-history-collapsed').classList.remove('visible');
    const listEl = $('home-history-list');
    listEl.classList.remove('collapsed');
    listEl.style.maxHeight = '';
    delete listEl.dataset.manualExpand;
  }

  $("home-history").innerHTML = meaningful.map(m => {
    const opp = getP(m.p1===me.id ? m.p2 : m.p1);
    const isP1 = m.p1===me.id;
    const won = m.result==="p1" ? isP1 : m.result==="p2" ? !isP1 : null;
    const isDraw = won === null;
    // STEP 1: risultato testuale — secondario, sotto il delta
    const resultLabel = isDraw ? "Patta" : won ? "Vinta" : "Persa";
    const resultClass = isDraw ? "draw" : won ? "win" : "loss";
    const elo = eloCache[m.id];
    const eloDelta = elo ? (elo.elo_after - elo.elo_before) : null;
    // STEP 1: delta ELO protagonista — grande, colorato
    // draw: sempre elo-draw (#6a6560), mai rosso
    const eloClass = isDraw ? 'elo-draw' : eloDelta > 0 ? 'elo-up' : 'elo-down';
    const eloStr = (eloDelta !== null && eloDelta !== 0)
      ? `<span class="hrow-elo ${eloClass}">${eloDelta>0?'+':''}${eloDelta}</span>`
      : `<span class="hrow-elo" style="color:#3a3630">—</span>`;
    const colorDot = m.white_player_id
      ? (m.white_player_id===me.id
          ? '<span class="cdot w" style="margin-top:1px"></span>'
          : '<span class="cdot b" style="margin-top:1px"></span>')
      : '';
    const oppId = m.p1===me.id ? m.p2 : m.p1;
    return `<div class="hrow-wrap" data-opp="${oppId}">
      <div class="hrow-reveal"><span class="hrow-reveal-label">Gioca</span></div>
      <div class="hrow" onclick="openProfile('${oppId}', 'home')" style="cursor:pointer">
        <div class="hrow-accent ${resultClass}"></div>
        <div class="hrow-left">
          <div class="hrow-opp">${colorDot}${opp?.nickname||"?"}</div>
          <div class="hrow-meta">
            <span>${timeAgo(m.created_at)}</span>
            ${opp ? `<span style="color:#4a4642">·</span><span>${opp.elo}</span>` : ''}
          </div>
        </div>
        <div class="hrow-right">
          ${eloStr}
          <div class="hrow-result ${resultClass}">${resultLabel}</div>
        </div>
      </div>
    </div>`;
  }).join("");

  // Wrappa in lb-group per grouped list pattern
  const hist = $("home-history");
  if(hist.innerHTML) hist.innerHTML = `<div class="lb-group">${hist.innerHTML}</div>`;
  if(!hist._swipeInit) { hist._swipeInit = true; initHrowSwipe(hist); }

  // Hint swipe — solo quando storico espanso (nessun flusso attivo)
  if(!hasAnythingActive) setTimeout(maybeShowSwipeHint, 50);
}

// ── Swipe-to-challenge su hrow ──
const SNAP_THRESH = 90;

function initHrowSwipe(container) {
  container.addEventListener('touchstart', onSwipeStart, {passive: true});
  container.addEventListener('touchmove', onSwipeMove, {passive: false});
  container.addEventListener('touchend', onSwipeEnd, {passive: true});
}

let _sw = null;

function _swipeOffset(rawDx) {
  if(rawDx <= 0) return 0;
  const linear = Math.min(rawDx, 80);
  const extra = rawDx > 80 ? Math.sqrt(rawDx - 80) * 10 : 0;
  return linear + extra;
}

function _evalGuards(oppId) {
  // Sono bloccato solo se ho partite dove NON ho ancora inserito il mio risultato,
  // oppure ho sfide incoming senza risposta.
  // "waiting" (ho già inserito) e "disputed" (ho già reinserito) NON bloccano.
  // Sent challenges NON bloccano — ho già fatto la mia parte.
  const isBusy = isPlayerBusy(me.id);

  const opp = getP(oppId);
  const oppOnline = opp?.last_seen_at && (Date.now() - new Date(opp.last_seen_at).getTime()) < ONLINE_MS;
  const oppBusy = isPlayerBusy(oppId);

  if(!isBusy && oppOnline && !oppBusy) return { ok: true, label: 'Gioca' };
  const msg = isBusy ? 'Prima registra il risultato' : !oppOnline ? 'Offline' : 'In partita';
  return { ok: false, label: msg };
}

function onSwipeStart(e) {
  const wrap = e.target.closest('.hrow-wrap');
  if(!wrap) return;
  const t = e.touches[0];
  const oppId = wrap.dataset.opp;
  const guard = _evalGuards(oppId);
  const reveal = wrap.querySelector('.hrow-reveal');
  const label = wrap.querySelector('.hrow-reveal-label');
  reveal.classList.remove('state-ok', 'state-err');
  reveal.classList.add(guard.ok ? 'state-ok' : 'state-err');
  label.textContent = guard.label;
  _sw = {
    wrap, hrow: wrap.querySelector('.hrow'), reveal, label,
    cardW: wrap.offsetWidth, startX: t.clientX, startY: t.clientY,
    locked: null, lastX: t.clientX, lastT: Date.now(), vx: 0, guard
  };
}

function onSwipeMove(e) {
  if(!_sw) return;
  const t = e.touches[0];
  const rawDx = _sw.startX - t.clientX;
  const dy = Math.abs(t.clientY - _sw.startY);
  if(!_sw.locked) {
    if(Math.abs(rawDx) < 4 && dy < 4) return;
    _sw.locked = dy > Math.abs(rawDx) ? 'scroll' : 'swipe';
  }
  if(_sw.locked === 'scroll') return;
  e.preventDefault();
  const now = Date.now();
  const dt = now - _sw.lastT || 1;
  _sw.vx = (rawDx - (_sw.startX - _sw.lastX)) / dt;
  _sw.lastX = t.clientX;
  _sw.lastT = now;
  const offset = _swipeOffset(rawDx);
  const snapW = _sw.cardW - 24;
  _sw.hrow.style.transition = 'none';
  _sw.hrow.style.transform = `translateX(-${Math.min(offset, snapW)}px)`;
  _sw.reveal.style.width = Math.min(offset, snapW) + 'px';
}

function onSwipeEnd(e) {
  if(!_sw || _sw.locked !== 'swipe') {
    if(_sw) { _sw.reveal.style.width = '0'; _sw.reveal.classList.remove('state-ok','state-err'); }
    _sw = null;
    return;
  }
  const {wrap, hrow, reveal, label, cardW, guard} = _sw;
  const oppId = wrap.dataset.opp;
  const rawDx = _sw.startX - _sw.lastX;
  const offset = _swipeOffset(rawDx);
  const vx = _sw.vx;
  const snapW = cardW - 24;
  const triggered = offset >= SNAP_THRESH || (vx > 0.5 && rawDx > 30);

  function springBack(delay) {
    setTimeout(() => {
      hrow.style.transition = 'transform .45s cubic-bezier(.34,1.3,.64,1)';
      hrow.style.transform = 'translateX(0)';
      reveal.style.transition = 'width .45s cubic-bezier(.34,1.3,.64,1)';
      reveal.style.width = '0';
      setTimeout(() => { reveal.style.transition = ''; reveal.classList.remove('state-ok', 'state-err'); }, 460);
    }, delay);
  }

  if(!triggered) { springBack(0); _sw = null; return; }

  hrow.style.transition = 'transform .3s cubic-bezier(.2,.8,.3,1)';
  hrow.style.transform = `translateX(-${snapW}px)`;
  reveal.style.transition = 'width .3s cubic-bezier(.2,.8,.3,1)';
  reveal.style.width = snapW + 'px';

  if(guard.ok) {
    const fresh = _evalGuards(oppId);
    if(fresh.ok) {
      setTimeout(() => { springBack(0); openColorSheet(oppId); }, 160);
    } else {
      label.textContent = fresh.label;
      reveal.classList.remove('state-ok');
      reveal.classList.add('state-err');
      springBack(800);
    }
  } else {
    springBack(800);
  }
  _sw = null;
}

let _cabState = 'idle'; // idle | action | incoming | waiting | search
let _cabFeedbackTimer = null;

// Stato corrente della CAB — calcolato da renderHome
function updateCAB() {
  const hs = window._homeState || {};
  const liveCards     = hs.liveCards     || [];
  const disputedCards = hs.disputedCards || [];
  const incomingChal  = hs.incomingChallenges || [];
  const sentChal      = hs.sentChallenges  || [];

  if(_cabState === 'feedback') return;
  if(_cabState === 'search') return;

  const bar      = $('cab-bar');
  const label    = $('cab-label');
  const labelSub = $('cab-label-sub');
  const icon     = $('cab-icon');
  const arrow    = $('cab-arrow');

  // CAB: visibile solo quando puoi effettivamente sfidare qualcuno.
  // Se hai sent/waiting ma nessuna azione richiesta → CAB nascosta, le card sono la UI.
  const isBusy = isPlayerBusy(me.id);

  if(isBusy) {
    // Card attive comunicano già tutto — nascondi il CAB
    $('cab').style.display = 'none';
  } else if(sentChal.length > 0 && liveCards.length === 0 && disputedCards.length === 0 && incomingChal.length === 0) {
    // Solo sfide inviate — nascondi il CAB
    $('cab').style.display = 'none';
  } else {
    // IDLE — nessuna card attiva
    $('cab').style.display = '';
    _setCABState('idle', bar, label, labelSub, icon, arrow);
    label.textContent = 'Sfida qualcuno';
    bar.onclick = onCABTap;
  }
}

function _setCABState(state, bar, label, labelSub, icon, arrow) {
  _cabState = state;
  bar.className = 'cab-bar';
  labelSub.classList.add('hidden');
  labelSub.textContent = '';
  // Rimuovi timer bar se presente (usata solo in stato incoming)
  const existingTimer = document.getElementById('cab-timer-bar');
  if(existingTimer && state !== 'incoming') existingTimer.remove();

  if(state === 'idle') {
    bar.classList.add('cab-idle');
    arrow.classList.remove('hidden');
  } else if(state === 'waiting') {
    bar.classList.add('cab-waiting', 'cab-inactive');
    icon.classList.add('hidden');
    arrow.classList.add('hidden');
  }
}
