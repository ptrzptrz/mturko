// --- pulizia partite scadute ---
const CHALLENGE_EXPIRE_MS = 2 * 60 * 1000;
const MATCH_EXPIRE_MS = 15 * 60 * 1000;

// ── Funzione unificata: un giocatore è "occupato" se ha una partita attiva
// dove non ha ancora inserito il risultato.
// Una partita dove entrambi hanno già inserito NON blocca nuove sfide.
function isPlayerBusy(playerId) {
  // Occupato se ha partite attive dove non ha ancora inserito il risultato
  const hasUnsubmitted = matches.some(m => {
    if(m.status !== 'active') return false;
    if(m.tournament_id) return false;
    const isP1 = m.p1 === playerId;
    const isP2 = m.p2 === playerId;
    if(!isP1 && !isP2) return false;
    const myRes = isP1 ? m.result_p1 : m.result_p2;
    return !myRes;
  });
  if(hasUnsubmitted) return true;
  // Per se stesso: sfide incoming non gestite bloccano (devi rispondere prima)
  if(playerId === me?.id) {
    return matches.some(m => m.status === 'pending_challenge' && m.p2 === playerId);
  }
  return false;
}

async function cleanupExpired() {
  if(!me) return;
  const now = Date.now();
  const before = matches.length;

  const expiredChallenges = matches.filter(m => {
    if(m.status !== 'pending_challenge') return false;
    return (now - new Date(m.created_at).getTime()) > CHALLENGE_EXPIRE_MS;
  });

  // Partite active scadute — nessuno ha inserito entro il timeout
  const expiredMatches = matches.filter(m => {
    if(m.status !== 'active') return false;
    const ageFromUpdate = now - new Date(m.updated_at || m.created_at).getTime();
    return ageFromUpdate > MATCH_EXPIRE_MS;
  });

  matches = matches.filter(m => {
    const age = now - new Date(m.created_at).getTime();
    if(m.status === 'pending_challenge') return age <= CHALLENGE_EXPIRE_MS;
    if(m.status === 'active') {
      const ageFromUpdate = now - new Date(m.updated_at || m.created_at).getTime();
      return ageFromUpdate <= MATCH_EXPIRE_MS;
    }
    return true;
  });

  // Patcha DB per sfide scadute
  for(const m of expiredChallenges) {
    db.patch("matches", `id=eq.${m.id}`, {status: "done", result: "cancelled"}).catch(() => {});
  }
  // Patcha DB per partite active scadute — libera entrambi i giocatori
  for(const m of expiredMatches) {
    db.patch("matches", `id=eq.${m.id}`, {status: "done", result: "cancelled"}).catch(() => {});
  }

  if(matches.length !== before) renderHome();
}

function countdownStr(createdAt, expireMs) {
  const remaining = expireMs - (Date.now() - new Date(createdAt).getTime());
  if(remaining <= 0) return "scaduta";
  const secs = Math.ceil(remaining / 1000);
  const col = secs < 60 ? '#c33' : 'inherit';
  return `<span style="color:${col};font-weight:${secs<60?'600':'400'}">${secs}s</span>`;
}

function setupLongPress(el, onComplete, ms=800) {
  let timer = null;
  const start = () => {
    el.classList.add('pressing');
    timer = setTimeout(() => { el.classList.remove('pressing'); onComplete(); }, ms);
  };
  const cancel = () => { clearTimeout(timer); el.classList.remove('pressing'); };
  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
}

// --- RISULTATO: via openResultSheet ---

let resultSheetMatchId = null;

function openResultSheet(matchId) {
  const m = matches.find(x => x.id===matchId);
  if(!m) return;
  resultSheetMatchId = matchId;
  const isDisputed = m.disputed;
  const isP1 = m.p1 === me.id;
  const oppId = isP1 ? m.p2 : m.p1;
  const opp = getP(oppId);
  const oppName = opp?.nickname || '?';

  $('rsheet-eyebrow').textContent = isDisputed ? 'Disaccordo' : 'Com\'è andata?';

  const white = m.white_player_id ? getP(m.white_player_id) : getP(m.p1);
  const black = m.white_player_id ? getP(m.white_player_id === m.p1 ? m.p2 : m.p1) : getP(m.p2);

  if(isDisputed && white && black) {
    // Leggi last_result — il trigger salva i valori prima di azzerare result_p1/p2
    const oppLastRes = isP1 ? m.last_result_p2 : m.last_result_p1;
    const oppPlayerId = isP1 ? m.p2 : m.p1;
    const oppSaid = oppLastRes === 'draw' ? 'Patta'
      : oppLastRes === oppPlayerId ? 'Ha vinto'
      : oppLastRes ? 'Ha perso' : null;
    $('rsheet-context').innerHTML = oppSaid
      ? `<div style="font-size:13px;color:#6a6560">${oppName} dice: <strong>${oppSaid}</strong></div>`
      : `<div style="font-size:13px;color:#6a6560">${oppName} non è d'accordo</div>`;
    $('rsheet-dispute-warn').classList.remove('hidden');
  } else if(white && black) {
    $('rsheet-context').innerHTML = `<div style="font-size:13px;color:#6a6560">${white.nickname} — ${black.nickname}</div>`;
    $('rsheet-dispute-warn').classList.add('hidden');
  } else {
    $('rsheet-context').textContent = 'vs ' + oppName;
    $('rsheet-dispute-warn').classList.add('hidden');
  }

  const overlay = $('result-sheet-overlay');
  overlay.style.display = 'flex';
  document.body.classList.add('sheet-open');
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
}

function closeResultSheet() {
  const overlay = $('result-sheet-overlay');
  overlay.classList.remove('visible');
  document.body.classList.remove('sheet-open');
  setTimeout(() => { overlay.style.display = 'none'; resultSheetMatchId = null; }, 320);
}

async function confirmResultSheet(choice) {
  const matchId = resultSheetMatchId;
  if(!matchId) return;
  const m = matches.find(x => x.id===matchId);
  if(!m) return;
  closeResultSheet();
  const isP1 = m.p1 === me.id;
  const myResult = choice === 'win' ? (isP1 ? 'p1' : 'p2')
                 : choice === 'loss' ? (isP1 ? 'p2' : 'p1')
                 : 'draw';
  const field = isP1 ? 'result_p1' : 'result_p2';

  // Optimistic update — aggiorna il match locale immediatamente
  m[field] = myResult;
  renderHome();

  // Feedback
  cabShowFeedback();

  // Scrivi su DB e sincronizza
  await db.patch('matches', `id=eq.${matchId}`, {[field]: myResult});
  activeMatch = null;
  await fetchAll();
}

async function submitResultInline(matchId, myResult, btn) {
  if(btn) { btn.disabled=true; btn.style.opacity='0.6'; }
  const m = matches.find(x => x.id===matchId);
  if(!m) return;
  const isP1 = m.p1 === me.id;
  const field = isP1 ? "result_p1" : "result_p2";
  await db.patch("matches", `id=eq.${matchId}`, {[field]: myResult});
  activeMatch = null;
  const cardEl = $("card-live-" + matchId);
  if(cardEl) { cardEl.style.transition = "opacity .3s"; cardEl.style.opacity = "0.4"; }
  await fetchAll();
}

// --- LEADERBOARD ---
function getDailyDelta(playerId, currentElo) {
  const key = 'turko_elo_' + playerId;
  const stored = sessionStorage.getItem(key);
  if(!stored) { sessionStorage.setItem(key, String(currentElo)); return 0; }
  return currentElo - parseInt(stored);
}

function getRankChange(playerId, currentRank) {
  const key = 'turko_rank_' + playerId;
  const stored = sessionStorage.getItem(key);
  if(!stored) { sessionStorage.setItem(key, String(currentRank)); return 0; }
  return parseInt(stored) - currentRank; // positivo = salito
}

  else renderLeaderboard();
}

// ── Feed: label divider temporale ──
function dateToDividerLabel(d) {
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if(d.toDateString() === today.toDateString()) return 'Oggi';
  if(d.toDateString() === yesterday.toDateString()) return 'Ieri';
  const diffDays = Math.floor((today.getTime() - d.getTime()) / 86400000);
  if(diffDays === 2) return '2 giorni fa';
  if(diffDays === 3) return '3 giorni fa';
  if(diffDays === 4) return '4 giorni fa';
  if(diffDays === 5) return '5 giorni fa';
  if(diffDays === 6) return '6 giorni fa';
  if(diffDays < 14) return 'Una settimana fa';
  if(diffDays < 21) return '2 settimane fa';
  if(diffDays < 28) return '3 settimane fa';
  if(diffDays < 60) return 'Un mese fa';
  if(diffDays < 90) return '2 mesi fa';
  if(diffDays < 120) return '3 mesi fa';
  return d.toLocaleDateString('it-IT', {day:'numeric', month:'long'});
}

function generateFeedEvents() {
  const events = [];

  // ── EVENTI DAL DB ──
  (globalEvents || []).forEach(ev => {
    if(ev.type === 'peak') return;
    const time = new Date(ev.created_at).getTime();
    const data = ev.data || {};
    const player = getP(ev.player_id);
    const target = getP(ev.target_id);
    const timeStr = timeAgo(ev.created_at);
    const playerName = player?.nickname || data.nickname || '?';
    const targetName = target?.nickname || data.overtaken_name || '?';

    let text = '';
    let rowClass = 'lb-feed-row lb-feed-event';

    switch(ev.type) {
      case 'overtake':
        if(ev.target_id === me.id) {
          text = `<strong class="ev-overtake-neg">${playerName}</strong> ti ha superato`;
        } else if(ev.player_id === me.id) {
          text = `Hai superato <strong class="ev-overtake-pos">${targetName}</strong>`;
        }
        // Sorpassi tra altri: non mostrare (text resta vuoto → riga non generata)
        break;
      case 'upset':
        text = `<strong class="ev-upset">${playerName}</strong> ha battuto ${targetName} !`;
        break;
      case 'milestone':
        text = `<strong class="ev-milestone">${playerName}</strong> ha raggiunto ${data.milestone || data.elo}`;
        break;
      case 'streak':
        text = `<strong class="ev-streak">${playerName}</strong> ${data.streak} vittorie di fila`;
        break;
      case 'new_player':
        text = `<strong class="ev-newplayer">${data.nickname || playerName}</strong> si è unito`;
        break;
    }

    if(text) {
      events.push({
        type: ev.type,
        time: time,
        html: `<div class="${rowClass}" onclick="openProfile('${ev.player_id || ''}','leaderboard')">
          <div class="lb-feed-left">
            <div class="lb-feed-name">${text}</div>
          </div>
        </div>`
      });
    }
  });

  // ── PARTITE ──
  const allMatches = (globalMatches || []).filter(m =>
    m.status === 'done' && m.result && m.result !== 'cancelled'
  ).slice(0, 30);

  allMatches.forEach(m => {
    const isDraw = m.result === 'draw';
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    const winnerId = m.result === 'p1' ? m.p1 : m.result === 'p2' ? m.p2 : m.p1;
    const loserId = isDraw ? m.p2 : (m.result === 'p1' ? m.p2 : m.p1);
    const winner = getP(winnerId);
    const loser = getP(loserId);
    const p1 = getP(m.p1);
    const p2 = getP(m.p2);

    let nameText;
    if(isDraw) {
      if(m.p1 === me.id) nameText = `Patta con ${p2?.nickname || '?'}`;
      else if(m.p2 === me.id) nameText = `Patta con ${p1?.nickname || '?'}`;
      else nameText = `${p1?.nickname || '?'} patta con ${p2?.nickname || '?'}`;
    } else if(winnerId === me.id) {
      nameText = `Hai vinto contro ${loser?.nickname || '?'}`;
    } else if(loserId === me.id) {
      nameText = `${winner?.nickname || '?'} ti ha battuto`;
    } else {
      nameText = `<strong>${winner?.nickname || '?'}</strong> ha vinto contro ${loser?.nickname || '?'}`;
    }

    const winElo = globalEloCache[m.id + '_' + winnerId];
    const winDelta = winElo ? (winElo.elo_after - winElo.elo_before) : null;
    const displayDeltaClass = isDraw ? 'draw' : (winDelta !== null && winDelta >= 0 ? 'pos' : 'neg');

    const deltaStr = winDelta !== null
      ? `<div class="lb-feed-delta ${displayDeltaClass}">${winDelta >= 0 ? '+' : ''}${winDelta}</div>`
      : '';

    events.push({
      type: 'match',
      time: new Date(m.updated_at).getTime(),
      html: `<div class="lb-feed-row" onclick="openProfile('${isDraw ? m.p1 : winnerId}','leaderboard')">
        <div class="lb-feed-left">
          <div class="lb-feed-name">${nameText}</div>
        </div>
        <div class="lb-feed-right">
          ${deltaStr}
        </div>
      </div>`
    });
  });

  events.sort((a, b) => b.time - a.time);

  // ── Raggruppa per giorno ──
  const byDay = [];
  let currentDay = '';
  let dayRows = [];

  function flushDay() {
    if(!currentDay) return;
    byDay.push(`<div class="feed-divider">${currentDay}</div>`);
    if(dayRows.length > 0) byDay.push(`<div class="lb-group">${dayRows.join('')}</div>`);
    dayRows = [];
  }

  events.forEach(ev => {
    const dateStr = dateToDividerLabel(new Date(ev.time));
    if(dateStr !== currentDay) { flushDay(); currentDay = dateStr; }
    dayRows.push(ev.html);
  });
  flushDay();

  return byDay;
}

function renderLeaderboard() {
  const sorted = [...players].sort((a, b) => b.elo - a.elo);
  const myRank = sorted.findIndex(p => p.id === me.id);

  // ══════════════════════════════════════
  // VISTA: Classifica
  // ══════════════════════════════════════
  const rankList = $('lb-rank-list');
  if(sorted.length === 0) {
    rankList.innerHTML = '<div style="color:#3a3630;text-align:center;margin-top:48px;font-size:14px">Nessun giocatore</div>';
  } else {
    const leader = sorted[0];
    const leaderIsMe = leader.id === me.id;
    const leaderDelta = getDailyDelta(leader.id, leader.elo);
    const leaderDeltaHtml = leaderDelta !== 0
      ? `<div class="lb-row-daily ${leaderDelta>0?'pos':'neg'}">${leaderDelta>0?'+':''}${leaderDelta}</div>`
      : '';

    const leaderHtml = `<div class="lb-leader${leaderIsMe?' me':''}" onclick="openProfile('${leader.id}','leaderboard')">
      <div class="lb-leader-rank">1</div>
      <div class="lb-row-info">
        <div class="lb-leader-name">${leader.nickname}${(() => { const isOnlineL = leader.last_seen_at && (Date.now() - new Date(leader.last_seen_at).getTime()) < 30000; return leader.is_playing ? '<span class="lb-dot playing"></span>' : isOnlineL ? '<span class="lb-dot"></span>' : ''; })()}</div>
        ${leader.is_playing ? '<div class="lb-status">In partita</div>' : ''}
      </div>
      <div class="lb-row-elo-wrap">
        <div class="lb-leader-elo">${leader.elo}</div>
        ${leaderDeltaHtml}
      </div>
    </div>`;

    const restHtml = sorted.slice(1).map((p, i) => {
      const rank = i + 2;
      const isMe = p.id === me.id;
      const delta = getDailyDelta(p.id, p.elo);
      const rankChange = getRankChange(p.id, rank);
      const trendHtml = rankChange > 0
        ? '<span class="lb-row-trend up">▲</span>'
        : rankChange < 0 ? '<span class="lb-row-trend down">▼</span>' : '';
      const deltaHtml = delta !== 0
        ? `<div class="lb-row-daily ${delta>0?'pos':'neg'}">${delta>0?'+':''}${delta}</div>`
        : '';
      const totalGames = p.wins + p.losses + p.draws;
      let subLabel = totalGames === 0 ? '<div class="lb-row-sub">Nuovo</div>' : '';
      if(isMe && rank > 1) {
        const playerAbove = sorted[rank - 2];
        subLabel = `<div class="lb-row-sub">${playerAbove.elo - p.elo} punti da ${playerAbove.nickname}</div>`;
      }

      return `<div class="lb-row${isMe?' me':''}" onclick="openProfile('${p.id}','leaderboard')">
        <div class="lb-row-rank">${rank}${trendHtml}</div>
        <div class="lb-row-info">
          <div class="lb-row-name">${p.nickname}${(() => { const isOnlineP = p.last_seen_at && (Date.now() - new Date(p.last_seen_at).getTime()) < 30000; return p.is_playing ? '<span class="lb-dot playing"></span>' : isOnlineP ? '<span class="lb-dot"></span>' : ''; })()}${isMe?'<span class="lb-row-me-tag">tu</span>':''}</div>
          ${p.is_playing ? '<div class="lb-status">In partita</div>' : subLabel}
        </div>
        <div class="lb-row-elo-wrap">
          <div class="lb-row-elo">${p.elo}</div>
          ${deltaHtml}
        </div>
      </div>`;
    }).join('');

    rankList.innerHTML = leaderHtml + (restHtml ? `<div class="lb-group">${restHtml}</div>` : '');
  }

  // Sticky
  const sticky = $('lb-me-sticky');
  if(_lbCurrentView === 'classifica' && sorted.length > 12 && myRank >= 12) {
    sticky.classList.remove('hidden');
    const above = myRank > 0 ? sorted[myRank - 1] : null;
    const distanceHtml = above
      ? `<div style="font-size:11px;color:#4a4642;margin-top:4px;padding-left:36px">${above.elo - me.elo} punti da <strong style="color:#6a6560">${above.nickname}</strong></div>`
      : '';
    sticky.innerHTML = `<div class="lb-me-sticky-inner" onclick="openProfile('${me.id}','leaderboard')">
      <div class="lb-row-rank" style="color:#e8e6e3;font-weight:600">${myRank + 1}</div>
      <div class="lb-row-info">
        <div class="lb-row-name">${me.nickname} <span class="lb-row-me-tag">tu</span></div>
      </div>
      <div class="lb-row-elo-wrap">
        <div class="lb-row-elo" style="font-size:16px">${me.elo}</div>
      </div>
    </div>${distanceHtml}`;
  } else {
    sticky.classList.add('hidden');
    sticky.innerHTML = '';
  }

  // ══════════════════════════════════════
  // VISTA: Live (feed)
  // ══════════════════════════════════════
  const feedContainer = $('lb-feed');
  const feedEmpty = $('lb-feed-empty');

  // Contatore partite oggi
  const todayStart = new Date();
  todayStart.setHours(0,0,0,0);
  const todayMatches = (globalMatches || []).filter(m =>
    m.status === 'done' && m.result && m.result !== 'cancelled' &&
    new Date(m.updated_at).getTime() > todayStart.getTime()
  ).length;
  const counterHtml = todayMatches > 0
    ? `<div class="feed-counter">${todayMatches} ${todayMatches === 1 ? 'partita' : 'partite'} oggi</div>`
    : '';

  const feedEvents = generateFeedEvents();

  if(feedEvents.length === 0) {
    feedContainer.innerHTML = counterHtml;
    feedEmpty.classList.remove('hidden');
  } else {
    feedEmpty.classList.add('hidden');
    feedContainer.innerHTML = counterHtml + feedEvents.join('');
  }
  initLbFeedScroll();
}

function initLbFeedScroll() {
  const view = $('lb-view-live');
  if(!view || view._scrollInit) return;
  view._scrollInit = true;
  view.addEventListener('scroll', () => {
    if(_lbCurrentView !== 'live') return;
    if(_lbFeedLoading || _lbFeedAllLoaded) return;
    if(view.scrollTop + view.clientHeight >= view.scrollHeight - 100) {
      loadMoreFeed();
    }
  }, {passive: true});
}

async function loadMoreFeed() {
  _lbFeedLoading = true;
  const loader = $('lb-feed-loader');
  if(loader) loader.classList.remove('hidden');

  const more = await db.get("matches", `status=eq.done&result=not.is.null&result=not.eq.cancelled&order=updated_at.desc&limit=30&offset=${_lbFeedOffset}&select=*`);

  if(loader) loader.classList.add('hidden');
  _lbFeedLoading = false;

  if(!Array.isArray(more) || more.length === 0) {
    _lbFeedAllLoaded = true;
    return;
  }

  _lbFeedOffset += more.length;
  if(more.length < 30) _lbFeedAllLoaded = true;

  const feedContainer = $('lb-feed');
  const rows = more.filter(m => m.result !== 'cancelled').map(m => {
    const isDraw = m.result === 'draw';
    const isMyMatch = m.p1 === me.id || m.p2 === me.id;
    const winnerId = m.result === 'p1' ? m.p1 : m.result === 'p2' ? m.p2 : m.p1;
    const loserId = isDraw ? m.p2 : (m.result === 'p1' ? m.p2 : m.p1);
    const winner = getP(winnerId);
    const loser = getP(loserId);
    const p1 = getP(m.p1);
    const p2 = getP(m.p2);
    let nameText;
    if(isDraw) {
      if(m.p1 === me.id) nameText = `Patta con ${p2?.nickname || '?'}`;
      else if(m.p2 === me.id) nameText = `Patta con ${p1?.nickname || '?'}`;
      else nameText = `${p1?.nickname || '?'} patta con ${p2?.nickname || '?'}`;
    } else if(winnerId === me.id) {
      nameText = `Hai vinto contro ${loser?.nickname || '?'}`;
    } else if(loserId === me.id) {
      nameText = `${winner?.nickname || '?'} ti ha battuto`;
    } else {
      nameText = `<strong>${winner?.nickname || '?'}</strong> ha vinto contro ${loser?.nickname || '?'}`;
    }
    const winElo = globalEloCache[m.id + '_' + winnerId];
    const winDelta = winElo ? (winElo.elo_after - winElo.elo_before) : null;
    const displayDeltaClass = isDraw ? 'draw' : (winDelta !== null && winDelta >= 0 ? 'pos' : 'neg');
    const deltaStr = winDelta !== null
      ? `<div class="lb-feed-delta ${displayDeltaClass}">${winDelta >= 0 ? '+' : ''}${winDelta}</div>`
      : '';
    return {
      time: new Date(m.updated_at).getTime(),
      html: `<div class="lb-feed-row" onclick="openProfile('${isDraw ? m.p1 : winnerId}','leaderboard')">
        <div class="lb-feed-left"><div class="lb-feed-name">${nameText}</div></div>
        <div class="lb-feed-right">${deltaStr}</div>
      </div>`
    };
  });

  const allDividers = feedContainer.querySelectorAll('.feed-divider');
  const lastExistingDivider = allDividers.length > 0 ? allDividers[allDividers.length - 1].textContent.trim() : '';
  let currentDay = lastExistingDivider;
  let newHtml = '';
  let currentGroupRows = '';

  rows.forEach(row => {
    const dateStr = dateToDividerLabel(new Date(row.time));
    if(dateStr !== currentDay) {
      if(currentGroupRows) {
        if(currentDay === lastExistingDivider && !newHtml) {
          const lastGroup = feedContainer.querySelector('.lb-group:last-of-type');
          if(lastGroup) { lastGroup.insertAdjacentHTML('beforeend', currentGroupRows); currentGroupRows = ''; }
          else { newHtml += `<div class="lb-group">${currentGroupRows}</div>`; currentGroupRows = ''; }
        } else {
          newHtml += `<div class="lb-group">${currentGroupRows}</div>`;
          currentGroupRows = '';
        }
      }
      currentDay = dateStr;
      newHtml += `<div class="feed-divider">${dateStr}</div>`;
    }
    currentGroupRows += row.html;
  });

  if(currentGroupRows) {
    if(!newHtml && currentDay === lastExistingDivider) {
      const lastGroup = feedContainer.querySelector('.lb-group:last-of-type');
      if(lastGroup) { lastGroup.insertAdjacentHTML('beforeend', currentGroupRows); }
      else { newHtml += `<div class="lb-group">${currentGroupRows}</div>`; }
    } else {
      newHtml += `<div class="lb-group">${currentGroupRows}</div>`;
    }
  }

  if(newHtml) feedContainer.insertAdjacentHTML('beforeend', newHtml);
}

let currentProfileId = null;
let currentProfileMatches = [];

function openMyProfile() { openProfile(me.id, 'home'); }

async function openProfile(playerId, fromPage, noPush) {
  if(!noPush) profileStack.push({id: playerId, from: fromPage});
  currentProfileId = playerId;

  var playerRes = await db.get("players", "id=eq." + playerId + "&select=*");
  var player = Array.isArray(playerRes) ? playerRes[0] : null;
  if(!player) return;
  var idx = players.findIndex(function(p) { return p.id === playerId; });
  if(idx >= 0) players[idx] = player;
  if(playerId === me.id) me = player;

  var isMe = playerId === me.id;

  renderProfileHeader(player);
  renderEloSection(player);

  $("prof-h2h").innerHTML = '';
  $("prof-rivals").innerHTML = '';
  $("prof-day-groups").innerHTML = '<div class="empty">Carico...</div>';
  $("prof-cta-wrap").innerHTML = '';
  $("prof-footer").innerHTML = '';
  renderProfileFooter(isMe);

  showPage("profile");

  var eloH = await db.get("elo_history", "player_id=eq." + playerId + "&order=created_at.asc&select=*");
  var matchH = await db.get("matches", "or=(p1.eq." + playerId + ",p2.eq." + playerId + ")&status=eq.done&order=created_at.desc&limit=50");

  currentProfileMatches = Array.isArray(matchH) ? matchH : [];
  var eloMap = {};
  if(Array.isArray(eloH)) eloH.forEach(function(e) { eloMap[e.match_id] = e; });

  drawEloChart(eloH, player.elo);

  if(!isMe) renderH2H(playerId, currentProfileMatches);
  renderRivals(playerId, currentProfileMatches);
  renderDayGroups(currentProfileMatches, eloMap, playerId);
  if(!isMe) renderProfileCTA(player);
}

function renderProfileHeader(player) {
  var isMe = player.id === me.id;
  var lastSeenRaw = player.last_seen_at;
  var isEpoch = lastSeenRaw && new Date(lastSeenRaw).getFullYear() < 2000;
  var lastSeen = (lastSeenRaw && !isEpoch) ? timeAgo(lastSeenRaw) : null;

  var sorted = [...players].sort(function(a, b) { return b.elo - a.elo; });
  var rank = sorted.findIndex(function(p) { return p.id === player.id; }) + 1;
  var totalPlayers = sorted.length;

  var metaParts = [];
  if(rank > 0) metaParts.push('#' + rank + ' di ' + totalPlayers);
  if(player.city) metaParts.push(player.city);
  var joinDate = new Date(player.created_at);
  var monthNames = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  metaParts.push(monthNames[joinDate.getMonth()] + ' ' + joinDate.getFullYear());
  var metaLine = metaParts.join(' · ');

  var seenLine = (!isMe && lastSeen) ? '<div class="prof-rank-meta">Visto ' + lastSeen + '</div>' : '';

  $("prof-header-wrap").innerHTML =
    '<div class="prof-header">' +
      '<button class="prof-back-icon" onclick="document.getElementById(&quot;profile-back&quot;).click()">←</button>' +
      '<div class="prof-nick">' + player.nickname + '</div>' +
      '<div class="prof-rank-meta">' + metaLine + '</div>' +
      (player.bio ? '<div class="prof-bio">' + player.bio + '</div>' : '') +
      seenLine +
    '</div>' +
    '<div id="prof-edit-wrap"></div>';
}

function showEditProfile() {
  const p = players.find(x => x.id===me.id) || me;
  $("prof-edit-wrap").innerHTML = `
    <div class="prof-edit-form">
      <div class="box-label">Modifica profilo</div>
      <textarea id="edit-bio" rows="2" placeholder="Bio (max 100 caratteri)" maxlength="100">${p.bio||''}</textarea>
      <input id="edit-city" value="${p.city||''}" placeholder="Città" autocorrect="off">
      <div id="edit-err" class="err"></div>
      <button class="btn-g" onclick="saveProfile()">Salva</button>
      <button class="btn-o" onclick="$('prof-edit-wrap').innerHTML=''">Annulla</button>
    </div>`;
}

async function saveProfile() {
  const bio = $("edit-bio")?.value.trim() || '';
  const city = $("edit-city")?.value.trim() || '';
  const res = await db.patch("players", `id=eq.${me.id}`, {bio, city});
  if(Array.isArray(res) && res[0]) {
    me = {...me, ...res[0]};
    const idx = players.findIndex(x => x.id===me.id);
    if(idx>=0) players[idx] = me;
    updateTopbar();
    await openProfile(me.id, 'home');
    profileStack = [];
  }
}

function renderEloSection(player) {
  var total = player.wins + player.losses + player.draws;
  var winRate = total > 0 ? Math.round((player.wins / total) * 100) : 0;
  var streak = player.win_streak || 0;
  var peak = player.elo_peak || player.elo;
  var gap = peak - player.elo;

  var statsHtml = '<span class="win">' + player.wins + 'V</span> · <span class="loss">' + player.losses + 'P</span> · <span class="draw">' + player.draws + '=</span>';
  if(total > 0) statsHtml += ' · <span class="rate">' + winRate + '%</span>';
  if(streak >= 2) statsHtml += ' · <span class="streak">' + streak + '🔥</span>';

  $("prof-elo-section").innerHTML =
    '<div class="prof-elo-hero">' +
      '<div class="prof-elo-num">' + player.elo + '</div>' +
      (peak > player.elo ? '<div class="prof-elo-peak">Peak <strong>' + peak + '</strong></div>' : '') +
      (gap > 0 ? '<div class="prof-elo-gap">−' + gap + ' dal peak</div>' : '') +
    '</div>' +
    '<div class="prof-stats-line">' + statsHtml + '</div>';
}

function renderProfileFooter(isMe) {
  if(!isMe) { $("prof-footer").innerHTML = ''; return; }
  $("prof-footer").innerHTML =
    '<div class="prof-footer">' +
      '<button class="prof-footer-link" onclick="showEditProfile()">Modifica profilo</button>' +
      '<button class="prof-footer-link" onclick="doLogout()" style="color:#7a2020">Esci</button>' +
    '</div>';
}

function renderH2H(playerId, matchH) {
  const h2hMatches = matchH.filter(m =>
    (m.p1 === me.id && m.p2 === playerId) || (m.p1 === playerId && m.p2 === me.id)
  );
  if(h2hMatches.length === 0) {
    $("prof-h2h").innerHTML = '';
    return;
  }
  let myWins = 0, myLosses = 0, draws = 0;
  h2hMatches.forEach(m => {
    if(m.result === 'draw') { draws++; return; }
    const winnerId = m.result === 'p1' ? m.p1 : m.p2;
    if(winnerId === me.id) myWins++;
    else myLosses++;
  });
  $("prof-h2h").innerHTML = `
    <div class="prof-section-label">Testa a testa</div>
    <div class="lb-group">
      <div class="prof-h2h">
        <div class="prof-h2h-label">vs ${getP(playerId)?.nickname || '?'}</div>
        <div class="prof-h2h-record">
          <span class="w">${myWins}V</span>
          <span class="l">${myLosses}P</span>
          ${draws > 0 ? `<span class="d">${draws}=</span>` : ''}
        </div>
      </div>
    </div>`;
}

function renderRivals(playerId, matchH) {
  const rivalMap = {};
  matchH.forEach(m => {
    const oppId = m.p1 === playerId ? m.p2 : m.p1;
    if(!rivalMap[oppId]) rivalMap[oppId] = {wins: 0, losses: 0, draws: 0, total: 0};
    rivalMap[oppId].total++;
    if(m.result === 'draw') { rivalMap[oppId].draws++; return; }
    const winnerId = m.result === 'p1' ? m.p1 : m.p2;
    if(winnerId === playerId) rivalMap[oppId].wins++;
    else rivalMap[oppId].losses++;
  });

  const rivals = Object.entries(rivalMap)
    .map(([id, r]) => ({id, ...r}))
    .sort((a, b) => b.total - a.total)
    .slice(0, 10);

  if(rivals.length === 0) {
    $("prof-rivals").innerHTML = '';
    return;
  }

  const rows = rivals.map(r => {
    const opp = getP(r.id);
    return `<div class="prof-rival-row" onclick="openProfile('${r.id}','profile')">
      <div class="prof-rival-name">${opp?.nickname || '?'}</div>
      <div class="prof-rival-record"><span class="w">${r.wins}</span>-<span class="l">${r.losses}</span>${r.draws > 0 ? `-<span class="d">${r.draws}</span>` : ''}</div>
    </div>`;
  }).join('');

  $("prof-rivals").innerHTML = `
    <div class="prof-section-label">Rivali</div>
    <div class="lb-group">${rows}</div>`;
}



function renderProfileCTA(player) {
  const isOnline = player.last_seen_at && (Date.now() - new Date(player.last_seen_at).getTime()) < 30000;
  const isPlaying = player.is_playing;

  let btnClass, btnText, btnAction;
  if(!isOnline) {
    btnClass = 'disabled';
    btnText = 'Offline';
    btnAction = '';
  } else if(isPlaying) {
    btnClass = 'disabled';
    btnText = 'In partita';
    btnAction = '';
  } else {
    btnClass = 'active';
    btnText = 'Sfida';
    btnAction = `onclick="openColorSheet('${player.id}')"`;
  }

  $("prof-cta-wrap").innerHTML = `
    <div class="prof-cta">
      <button class="${btnClass}" ${btnAction}>${btnText}</button>
    </div>`;
}

function renderDayGroups(matchH, eloMap, playerId) {
  if(!matchH.length) {
    $("prof-day-groups").innerHTML = '<div class="empty" style="margin-top:24px">Nessuna partita ancora</div>';
    return;
  }

  var byDay = {};
  matchH.forEach(function(m) {
    var day = new Date(m.created_at).toLocaleDateString('it-IT', {day:'2-digit', month:'long', year:'numeric'});
    if(!byDay[day]) byDay[day] = [];
    byDay[day].push(m);
  });

  var html = '<div class="prof-section-label">Storico</div>';

  Object.entries(byDay).forEach(function(entry) {
    var day = entry[0], ms = entry[1];
    var validMs = ms.filter(function(m) { return m.result !== 'cancelled'; });

    var wins = validMs.filter(function(m) {
      var isP1 = m.p1 === playerId;
      return m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : false;
    }).length;
    var losses = validMs.filter(function(m) {
      var isP1 = m.p1 === playerId;
      return m.result === 'p1' ? !isP1 : m.result === 'p2' ? isP1 : false;
    }).length;
    var draws = validMs.filter(function(m) { return m.result === 'draw'; }).length;

    var dayElos = validMs.map(function(m) { return eloMap[m.id]; }).filter(Boolean).sort(function(a, b) {
      return new Date(a.created_at) - new Date(b.created_at);
    });
    var eloStart = dayElos.length ? dayElos[0].elo_before : null;
    var eloEnd = dayElos.length ? dayElos[dayElos.length - 1].elo_after : null;
    var totalDelta = dayElos.length ? eloEnd - eloStart : 0;
    var deltaClass = totalDelta > 0 ? 'elo-up' : totalDelta < 0 ? 'elo-down' : '';
    var deltaStr = totalDelta !== 0 ? '<span class="' + deltaClass + '">' + (totalDelta > 0 ? '+' : '') + totalDelta + '</span>' : '';

    var summaryParts = [];
    summaryParts.push(validMs.length + (validMs.length === 1 ? ' partita' : ' partite'));
    if(eloStart !== null) summaryParts.push(eloStart + '→' + eloEnd);

    html += '<div class="prof-day-header">' +
      '<div class="prof-day-label">' + day + '</div>' +
      '<div class="prof-day-summary">' + summaryParts.join(' · ') + ' ' + deltaStr + '</div>' +
    '</div>';

    html += '<div class="lb-group">';
    validMs.forEach(function(m) {
      var isP1 = m.p1 === playerId;
      var oppId = isP1 ? m.p2 : m.p1;
      var opp = getP(oppId);
      var won = m.result === 'p1' ? isP1 : m.result === 'p2' ? !isP1 : null;
      var resultLabel = won === null ? 'Patta' : won ? 'Vittoria' : 'Sconfitta';
      var resultClass = won === null ? 'draw' : won ? 'win' : 'loss';
      var elo = eloMap[m.id];
      var delta = elo ? (elo.elo_after - elo.elo_before) : null;
      var deltaHtml = delta !== null ? '<div class="prof-match-delta ' + (delta >= 0 ? 'elo-up' : 'elo-down') + '">' + (delta >= 0 ? '+' : '') + delta + '</div>' : '';

      html += '<div class="prof-match-row" onclick="openProfile(&apos;' + oppId + '&apos;,&apos;profile&apos;)">' +
        '<div class="prof-match-left">' +
          '<div class="prof-match-name">' + (opp ? opp.nickname : '?') + '</div>' +
          '<div class="prof-match-meta">' + timeAgo(m.created_at) + '</div>' +
        '</div>' +
        '<div class="prof-match-right">' +
          '<div class="prof-match-result ' + resultClass + '">' + resultLabel + '</div>' +
          deltaHtml +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });

  $("prof-day-groups").innerHTML = html;
}

// ── Swipe-back profilo ──
(function() {
  var scrollEl = $('prof-scroll');
  if(!scrollEl) return;
  var startX = 0, startY = 0, swiping = false;

  scrollEl.addEventListener('touchstart', function(e) {
    var touch = e.touches[0];
    if(touch.clientX > 25) return;
    startX = touch.clientX;
    startY = touch.clientY;
    swiping = true;
  }, {passive: true});

  scrollEl.addEventListener('touchmove', function(e) {
    if(!swiping) return;
    var dx = e.touches[0].clientX - startX;
    var dy = Math.abs(e.touches[0].clientY - startY);
    if(dy > Math.abs(dx)) { swiping = false; }
  }, {passive: true});

  scrollEl.addEventListener('touchend', function(e) {
    if(!swiping) return;
    swiping = false;
    var dx = e.changedTouches[0].clientX - startX;
    if(dx > 80) {
      var backBtn = $('profile-back');
      if(backBtn) backBtn.click();
    }
  }, {passive: true});
})();

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  const now = new Date();
  const date = new Date(iso);
  const diff = Math.floor((now - date) / 1000);
  if(diff < 60) return 'adesso';
  if(diff < 3600) { const m=Math.floor(diff/60); return m===1?'1 min fa':`${m} min fa`; }
  if(diff < 86400) { const h=Math.floor(diff/3600); return h===1?'1 ora fa':`${h} ore fa`; }
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dateDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayDiff = Math.round((today - dateDay) / 86400000);
  if(dayDiff === 1) return 'ieri';
  if(dayDiff < 7) return `${dayDiff} giorni fa`;
  if(dayDiff < 14) return '1 settimana fa';
  if(dayDiff < 21) return '2 settimane fa';
  if(dayDiff < 28) return '3 settimane fa';
  if(dayDiff < 60) return '1 mese fa';
  if(dayDiff < 365) { const mo=Math.floor(dayDiff/30); return `${mo} mesi fa`; }
  return fmtDate(iso);
}

function drawEloChart(eloH, currentElo) {
  if(eloChartInstance) { eloChartInstance.destroy(); eloChartInstance = null; }
  const canvas = $("elo-chart");
  if(!Array.isArray(eloH) || eloH.length === 0) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
      return;
  }
  const labels = eloH.map(e => {
    const d = new Date(e.created_at);
    return d.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});
  });
  const data = eloH.map(e => e.elo_after);
  labels.unshift('');
  data.unshift(eloH[0].elo_before);

  // Peak annotation
  const peakValue = Math.max(...data);
  const peakIndex = data.indexOf(peakValue);

  eloChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#e8e6e3',
        backgroundColor: 'rgba(255,255,255,0.04)',
        borderWidth: 2,
        pointRadius: data.map((v, i) => i === peakIndex ? 4 : 0),
        pointBackgroundColor: data.map((v, i) => i === peakIndex ? '#629924' : 'transparent'),
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: null },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
      },
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });
}

$("profile-back").onclick = () => {
  const current = profileStack.pop();
  const from = current ? current.from : 'home';
  if(from === 'profile') {
    const prev = profileStack[profileStack.length - 1];
    if(prev) { openProfile(prev.id, prev.from, true); return; }
  }
  currentProfileId = null;
  profileStack = [];
  showPage(from);
};

// --- NAV ---
const pageMap = {home:"page-home", search:"page-search", leaderboard:"page-lb", profile:"page-profile", "profile-me":"page-profile"};

function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nbtn").forEach(b => b.classList.remove("on"));
  const pageEl = $(pageMap[name]);
  if(pageEl) pageEl.classList.add("active");
  const navBtn = document.querySelector(`.nbtn[data-page="${name}"]`);
  if(navBtn) navBtn.classList.add("on");
  // STEP 2: visibilità CAB — solo su home
  setCabVisibility(name === 'profile-me' ? 'profile' : name);
  if(name==="search") { $("search-input").value = ""; renderSearch(); setTimeout(() => $("search-input").focus(), 50); }
  if(name==="leaderboard") renderLeaderboard();
  if(name==="profile-me") { openProfile(me.id, "home"); }
}

document.querySelectorAll(".nbtn").forEach(btn => {
  btn.onclick = () => showPage(btn.dataset.page);
});

function toggleEloTooltip(e) {
  e.stopPropagation();
  const tooltip = $('elo-tooltip-prof');
  tooltip.classList.toggle('visible');
  const close = () => { tooltip.classList.remove('visible'); document.removeEventListener('click', close); };
  if(tooltip.classList.contains('visible')) setTimeout(() => document.addEventListener('click', close), 0);
}

// STEP 2: chiudi CAB search al tap fuori
document.addEventListener('touchstart', (e) => {
  if(_cabState !== 'search') return;
  const cab = $('cab');
  if(!cab.contains(e.target)) closeCABSearch();
}, {passive: true});

// STEP 2: chiudi CAB search allo scroll della home
$('home-scroll').addEventListener('scroll', () => {
  if(_cabState === 'search') closeCABSearch();
}, {passive: true});
