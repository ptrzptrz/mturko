<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<title>turko — Feed v3 + stagger</title>
<style>
:root{
  --bg:#161512;--surface:#1d1a16;--border:#2a2724;
  --text:#e8e6e3;--muted:#8a8580;--dim:#6a6560;--ghost:#504a45;
  --green:#7ab535;--red:#d45454;
  --win-tint:rgba(122,181,53,.018);
  --lose-tint:rgba(212,84,84,.015);
  --red-muted:#8a4040;
  --feed-title:15px;--feed-body:14px;--feed-micro:12px;
  --fs-hero:48px;--fs-title:22px;--fs-body:16px;--fs-caption:13px;--fs-label:12px;--fs-micro:10px;
  --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;
  --r-md:14px;--r-xl:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100dvh}
.content{padding:0 var(--sp-lg);padding-top:calc(env(safe-area-inset-top,20px) + 16px);padding-bottom:120px}

.hero{margin-bottom:var(--sp-lg)}
.hero-nick{font-size:var(--fs-micro);color:var(--ghost);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.hero-elo{font-size:var(--fs-hero);font-weight:800;letter-spacing:-2px;line-height:1}
.hero-sub{font-size:var(--fs-label);color:var(--ghost);margin-top:var(--sp-xs)}
.chips{display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg)}
.chip{padding:var(--sp-sm) var(--sp-lg);border-radius:20px;font-size:var(--fs-caption);font-weight:600;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--dim);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.ds-group{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-md);overflow:hidden}

/* ── Feed rows ── */
.fr{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-md) var(--sp-lg);min-height:46px;border-bottom:0.5px solid var(--border)}
.fr:last-child{border-bottom:none}
.fr-l{flex:1;min-width:0}
.fr-n{font-size:var(--feed-title);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.fr-m{font-size:var(--feed-micro);margin-top:2px}
.fr-r{flex-shrink:0;text-align:right;margin-left:var(--sp-md)}
.fr-d{font-size:var(--feed-title);line-height:1.2}

.fr.w{background:var(--win-tint)}
.fr.w .fr-n{color:var(--text);font-weight:700}
.fr.w .fr-m{color:var(--ghost)}
.fr.w .fr-d{color:var(--green);font-weight:800}

.fr.l{background:var(--lose-tint)}
.fr.l .fr-n{color:var(--dim);font-weight:500}
.fr.l .fr-m{color:var(--ghost)}
.fr.l .fr-d{color:var(--red-muted);font-weight:500}

.fr.p .fr-n{color:var(--dim);font-weight:500}
.fr.p .fr-m{color:var(--ghost)}
.fr.p .fr-d{color:var(--ghost);font-weight:500}

.fr.o .fr-n{color:var(--dim);font-weight:400;font-size:var(--feed-body)}
.fr.o .fr-m{color:var(--ghost)}

/* ── Events ── */
.fe{display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-lg);border-bottom:0.5px solid var(--border);background:rgba(255,255,255,.012)}
.fe:last-child{border-bottom:none}
.fe-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--fs-caption);font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.fe-b{flex:1;min-width:0}
.fe-t{font-size:var(--feed-title);font-weight:600;color:var(--text);line-height:1.3}
.fe-m{font-size:var(--feed-micro);color:var(--ghost);margin-top:2px}
.fe-r{flex-shrink:0;text-align:right;margin-left:var(--sp-md)}
.fe-d{font-size:var(--feed-title);font-weight:700;color:var(--green)}

/* ── Batch ── */
.batch{border-bottom:0.5px solid var(--border);padding:var(--sp-md) var(--sp-lg) var(--sp-sm)}
.batch:last-child{border-bottom:none}
.batch-head{display:flex;align-items:center;gap:var(--sp-sm);margin-bottom:var(--sp-sm)}
.batch-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;letter-spacing:-.3px}
.batch-info{display:flex;align-items:baseline;gap:var(--sp-xs)}
.batch-name{font-size:var(--feed-title);font-weight:600;color:var(--muted)}
.batch-count{font-size:var(--feed-micro);color:var(--ghost)}
.batch-rows{margin-left:36px;padding-bottom:var(--sp-xs)}
.batch-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.batch-text{font-size:var(--feed-body);color:var(--dim);font-weight:500}
.batch-delta{font-size:var(--feed-body);font-weight:600;margin-left:var(--sp-md);flex-shrink:0}

/* ── Stagger animation ── */
.stagger{opacity:0;transform:translate3d(0,12px,0)}
.stagger.in{animation:staggerIn .4s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes staggerIn{to{opacity:1;transform:translate3d(0,0,0)}}

/* ── Sheet spring demo ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:10001;display:none;align-items:flex-end;pointer-events:none}
.sheet-overlay.visible{display:flex;background:rgba(0,0,0,.75);pointer-events:all}
.sheet-demo{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:24px 24px 40px;width:100%;max-width:480px;margin:0 auto;transform:translateY(100%);transition:transform .38s cubic-bezier(.34,1.56,.64,1)}
.sheet-overlay.visible .sheet-demo{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}

/* ── Replay button ── */
.replay{display:block;width:100%;padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--muted);font-size:var(--fs-caption);font-weight:600;font-family:inherit;cursor:pointer;text-align:center;margin-top:var(--sp-lg)}
.replay:active{background:var(--border)}
</style>
</head>
<body>
<div class="content">

<div class="hero">
  <div class="hero-nick">sss</div>
  <div><span class="hero-elo">1530</span><span style="font-size:var(--fs-title);font-weight:700;margin-left:var(--sp-sm);color:var(--red)">-1</span></div>
  <div class="hero-sub">70 pt ai 1600</div>
</div>

<div class="chips">
  <div class="chip on" onclick="replayStagger()">Tutto</div>
  <div class="chip" onclick="this.classList.add('on');this.previousElementSibling.classList.remove('on');replayStagger()">Partite</div>
  <div class="chip">Attività</div>
  <div class="chip">Classifica</div>
</div>

<div class="ds-group" id="feed"></div>

<button class="replay" onclick="replayStagger()">Replay stagger</button>
<button class="replay" onclick="openSheetDemo()">Apri sheet (spring demo)</button>

</div>

<!-- Sheet spring demo -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheetDemo()">
  <div class="sheet-demo" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="font-size:var(--fs-title);font-weight:700;color:var(--text);margin-bottom:var(--sp-lg)">tizio <span style="color:var(--dim);font-weight:400;font-size:var(--fs-caption)">1520</span></div>
    <div style="font-size:var(--fs-label);color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-sm)">Tempo</div>
    <div style="display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-xl)">
      <div style="flex:1;padding:14px 0;border-radius:10px;font-size:var(--fs-body);font-weight:600;text-align:center;border:1px solid var(--border);color:var(--dim)">Blitz</div>
      <div style="flex:1;padding:14px 0;border-radius:10px;font-size:var(--fs-body);font-weight:600;text-align:center;background:var(--text);color:var(--bg)">Rapid</div>
      <div style="flex:1;padding:14px 0;border-radius:10px;font-size:var(--fs-body);font-weight:600;text-align:center;border:1px solid var(--border);color:var(--dim)">Classic</div>
    </div>
    <div style="font-size:var(--fs-label);color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-sm)">Gioca con</div>
    <div style="display:flex;gap:var(--sp-sm)">
      <div style="flex:1;padding:18px 0;border-radius:14px;font-size:var(--fs-body);font-weight:700;text-align:center;background:var(--text);color:var(--bg);cursor:pointer" onclick="closeSheetDemo()">Bianco</div>
      <div style="flex:1;padding:18px 0;border-radius:14px;font-size:var(--fs-body);font-weight:700;text-align:center;background:#2a2724;color:var(--text);border:1px solid var(--border);cursor:pointer" onclick="closeSheetDemo()">Nero</div>
    </div>
  </div>
</div>

<script>
var feedData = [
  { type:'event', avatar:'ul', bg:'#4a6741', fg:'#c8e6c0', text:'ultimo si è unito a turko', meta:'2 ore fa' },
  { type:'win', text:'Hai vinto contro uffa', meta:'8 ore fa', delta:'+16' },
  { type:'draw', text:'Patta con uffa', meta:'8 ore fa', delta:'0' },
  { type:'batch', avatar:'ca', bg:'#5c3d5e', fg:'#d4b8d6', name:'caio', count:3, rows:[
    { opp:'tizio', delta:'+10', win:true },
    { opp:'ppp', delta:'+8', win:true },
    { opp:'mario', delta:'-15', win:false }
  ]},
  { type:'loss', text:'Hai perso contro caio', meta:'ieri', delta:'-8' },
  { type:'event', avatar:'ca', bg:'#5c3d5e', fg:'#d4b8d6', text:'caio ti ha superato', meta:'ieri' },
  { type:'win', text:'Hai vinto contro mario', meta:'2 giorni fa', delta:'+18' },
  { type:'others', text:'uffa ha vinto contro ppp', meta:'2 giorni fa' },
  { type:'win', text:'Hai vinto contro ppp', meta:'2 giorni fa', delta:'+12' },
  { type:'draw', text:'Patta con mario', meta:'2 giorni fa', delta:'0' },
  { type:'event', avatar:'ma', bg:'#5a4a2e', fg:'#d4c48a', text:'mario ha raggiunto quota 1500', meta:'3 giorni fa' },
  { type:'loss', text:'Hai perso contro mario', meta:'3 giorni fa', delta:'-18' },
  { type:'batch', avatar:'ma', bg:'#5a4a2e', fg:'#d4c48a', name:'mario', count:2, rows:[
    { opp:'aaa', delta:'+6', win:true },
    { opp:'tizio', delta:'+9', win:true }
  ]},
  { type:'win', text:'Hai vinto contro sss', meta:'4 giorni fa', delta:'+6' },
  { type:'event', avatar:'ca', bg:'#2e4a5a', fg:'#8ac4d4', text:'caio, 5 vittorie di fila!', meta:'4 giorni fa', delta:'+42' },
  { type:'loss', text:'Hai perso contro tizio', meta:'5 giorni fa', delta:'-4' },
  { type:'others', text:'aaa patta con tizio', meta:'5 giorni fa' },
];

function renderFeed() {
  var html = '';
  feedData.forEach(function(item) {
    if(item.type === 'win') {
      html += '<div class="fr w stagger"><div class="fr-l"><div class="fr-n">' + item.text + '</div><div class="fr-m">' + item.meta + '</div></div><div class="fr-r"><div class="fr-d">' + item.delta + '</div></div></div>';
    } else if(item.type === 'loss') {
      html += '<div class="fr l stagger"><div class="fr-l"><div class="fr-n">' + item.text + '</div><div class="fr-m">' + item.meta + '</div></div><div class="fr-r"><div class="fr-d">' + item.delta + '</div></div></div>';
    } else if(item.type === 'draw') {
      html += '<div class="fr p stagger"><div class="fr-l"><div class="fr-n">' + item.text + '</div><div class="fr-m">' + item.meta + '</div></div><div class="fr-r"><div class="fr-d">' + item.delta + '</div></div></div>';
    } else if(item.type === 'others') {
      html += '<div class="fr o stagger"><div class="fr-l"><div class="fr-n">' + item.text + '</div><div class="fr-m">' + item.meta + '</div></div></div>';
    } else if(item.type === 'event') {
      var deltaHtml = item.delta ? '<div class="fe-r"><div class="fe-d">' + item.delta + '</div></div>' : '';
      html += '<div class="fe stagger"><div class="fe-av" style="background:' + item.bg + ';color:' + item.fg + '">' + item.avatar + '</div><div class="fe-b"><div class="fe-t">' + item.text + '</div><div class="fe-m">' + item.meta + '</div></div>' + deltaHtml + '</div>';
    } else if(item.type === 'batch') {
      var rows = '';
      item.rows.forEach(function(r) {
        var dColor = r.win ? 'var(--green)' : 'var(--red-muted)';
        rows += '<div class="batch-row"><div class="batch-text">' + r.opp + '</div><div class="batch-delta" style="color:' + dColor + '">' + r.delta + '</div></div>';
      });
      html += '<div class="batch stagger"><div class="batch-head"><div class="batch-av" style="background:' + item.bg + ';color:' + item.fg + '">' + item.avatar + '</div><div class="batch-info"><div class="batch-name">' + item.name + '</div><div class="batch-count">· ' + item.count + ' partite</div></div></div><div class="batch-rows">' + rows + '</div></div>';
    }
  });
  return html;
}

function replayStagger() {
  var el = document.getElementById('feed');
  el.innerHTML = renderFeed();
  var items = el.querySelectorAll('.stagger');
  items.forEach(function(item, i) {
    item.classList.remove('in');
    item.style.animationDelay = (i * 60) + 'ms';
    // Force reflow
    item.offsetHeight;
    item.classList.add('in');
  });
}

function openSheetDemo() {
  var overlay = document.getElementById('sheet-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      overlay.classList.add('visible');
    });
  });
}

function closeSheetDemo() {
  var overlay = document.getElementById('sheet-overlay');
  overlay.classList.remove('visible');
  setTimeout(function() { overlay.style.display = 'none'; }, 400);
}

// Auto-play on load
setTimeout(replayStagger, 300);
</script>
</body>
</html>
