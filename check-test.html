<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>turko — Check Animation Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#161512;font-family:'Inter',system-ui,sans-serif;color:#e8e6e3;padding:40px 24px}
h2{font-size:11px;font-weight:600;color:#629924;text-transform:uppercase;letter-spacing:1.4px;margin:32px 0 16px}
h2:first-of-type{margin-top:0}
.desc{font-size:11px;color:#4a4642;margin-bottom:16px;line-height:1.5}
.row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.label{font-size:13px;color:#6a6560}

/* ── Animated check circle ── */
.check-circle{width:18px;height:18px;flex-shrink:0}
.check-circle svg{display:block}

/* Circle draws in */
.check-circle .circle{
  fill:none;
  stroke-width:1.5;
  stroke-linecap:round;
  stroke-dasharray:50;
  stroke-dashoffset:50;
}
.check-circle.ok .circle{
  stroke:#629924;
  animation:circleIn .3s ease forwards;
}
.check-circle.err .circle{
  stroke:#7a2020;
  animation:circleIn .3s ease forwards;
}

/* Check mark draws in after circle */
.check-circle .mark{
  fill:none;
  stroke-width:1.5;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:20;
  stroke-dashoffset:20;
}
.check-circle.ok .mark{
  stroke:#629924;
  animation:markIn .25s ease .2s forwards;
}
.check-circle.err .mark{
  stroke:#7a2020;
  animation:markIn .2s ease .2s forwards;
}

@keyframes circleIn{to{stroke-dashoffset:0}}
@keyframes markIn{to{stroke-dashoffset:0}}

/* Fade out */
.check-circle.fade{animation:fadeOut .2s ease forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(.8)}}

/* ── Demo input field ── */
.demo-field{position:relative;margin-bottom:24px}
.demo-input{background:transparent;border:none;border-bottom:1px solid #2a2724;padding:14px 30px 14px 0;font-size:17px;font-weight:500;color:#e8e6e3;width:100%;outline:none;transition:border-color .2s;font-family:inherit}
.demo-input:focus{border-bottom-color:#e8e6e3}
.demo-input.valid{border-bottom-color:#629924}
.demo-input.invalid{border-bottom-color:#7a2020}
.demo-input::placeholder{color:#3a3630;font-weight:400;font-size:15px}
.demo-status{position:absolute;right:0;top:50%;transform:translateY(-50%)}
.demo-hint{font-size:11px;margin-top:4px;min-height:16px;transition:color .2s;color:#3a3630}
.demo-hint.ok{color:#3d6b1a}
.demo-hint.err{color:#7a2020}

button.test{background:#252220;color:#e8e6e3;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-right:8px}
button.test:active{opacity:.7}
</style>
</head>
<body>

<h2>A — Check animato (cerchio + baffo)</h2>
<div class="row">
  <div class="check-circle ok" id="demo-ok">
    <svg viewBox="0 0 18 18"><circle class="circle" cx="9" cy="9" r="7.5"/><polyline class="mark" points="5.5,9.5 8,12 12.5,6.5"/></svg>
  </div>
  <span class="label">Disponibile</span>
</div>
<div class="row">
  <div class="check-circle err" id="demo-err">
    <svg viewBox="0 0 18 18"><circle class="circle" cx="9" cy="9" r="7.5"/><line class="mark" x1="6.5" y1="6.5" x2="11.5" y2="11.5"/><line class="mark" x1="11.5" y1="6.5" x2="6.5" y2="11.5" style="animation-delay:.25s"/></svg>
  </div>
  <span class="label">Già in uso</span>
</div>

<button class="test" onclick="replayA()">Replay</button>

<h2>B — Live nel campo (digita per testare)</h2>
<p class="desc">Digita "mario" per vedere "Già in uso". Digita qualsiasi altra cosa (3+ char) per "Disponibile".</p>
<div class="demo-field">
  <input class="demo-input" id="test-nick" placeholder="Nickname" maxlength="12" autocorrect="off" autocapitalize="none">
  <div class="demo-status" id="test-status"></div>
</div>
<div class="demo-hint" id="test-hint"></div>

<h2>C — Password feedback</h2>
<p class="desc">Digita per vedere il contatore e poi il check.</p>
<div class="demo-field">
  <input class="demo-input" id="test-pass" placeholder="Password" type="password">
  <div class="demo-status" id="test-pass-status"></div>
</div>
<div class="demo-hint" id="test-pass-hint">Minimo 6 caratteri</div>

<script>
function replayA() {
  ['demo-ok','demo-err'].forEach(function(id) {
    var el = document.getElementById(id);
    var cls = el.className.replace(' ok',' ').replace(' err',' ').trim();
    var wasOk = el.classList.contains('ok');
    var wasErr = el.classList.contains('err');
    el.className = cls;
    void el.offsetWidth; // force reflow
    if(wasOk) el.classList.add('ok');
    if(wasErr) el.classList.add('err');
  });
}

function makeCheck(ok) {
  var div = document.createElement('div');
  div.className = 'check-circle ' + (ok ? 'ok' : 'err');
  if(ok) {
    div.innerHTML = '<svg viewBox="0 0 18 18"><circle class="circle" cx="9" cy="9" r="7.5"/><polyline class="mark" points="5.5,9.5 8,12 12.5,6.5"/></svg>';
  } else {
    div.innerHTML = '<svg viewBox="0 0 18 18"><circle class="circle" cx="9" cy="9" r="7.5"/><line class="mark" x1="6.5" y1="6.5" x2="11.5" y2="11.5"/><line class="mark" x1="11.5" y1="6.5" x2="6.5" y2="11.5" style="animation-delay:.25s"/></svg>';
  }
  return div;
}

// Nickname test
var nickTimer = null;
document.getElementById('test-nick').addEventListener('input', function() {
  var nick = this.value.trim();
  var status = document.getElementById('test-status');
  var hint = document.getElementById('test-hint');
  clearTimeout(nickTimer);
  status.innerHTML = '';
  
  this.classList.remove('valid','invalid');
  
  if(!nick) {
    hint.textContent = '';
    hint.className = 'demo-hint';
    return;
  }
  if(nick.length < 3) {
    hint.textContent = 'Ancora ' + (3 - nick.length);
    hint.className = 'demo-hint';
    return;
  }
  
  hint.textContent = '...';
  hint.className = 'demo-hint';
  
  nickTimer = setTimeout(function() {
    var taken = nick.toLowerCase() === 'mario';
    var input = document.getElementById('test-nick');
    if(taken) {
      input.classList.add('invalid');
      status.innerHTML = '';
      status.appendChild(makeCheck(false));
      hint.textContent = 'Già in uso';
      hint.className = 'demo-hint err';
    } else {
      input.classList.add('valid');
      status.innerHTML = '';
      status.appendChild(makeCheck(true));
      hint.textContent = 'Disponibile';
      hint.className = 'demo-hint ok';
    }
  }, 400);
});

// Password test
document.getElementById('test-pass').addEventListener('input', function() {
  var pass = this.value;
  var status = document.getElementById('test-pass-status');
  var hint = document.getElementById('test-pass-hint');
  
  this.classList.remove('valid','invalid');
  status.innerHTML = '';
  
  if(!pass) {
    hint.textContent = 'Minimo 6 caratteri';
    hint.className = 'demo-hint';
  } else if(pass.length < 6) {
    this.classList.add('invalid');
    hint.textContent = 'Ancora ' + (6 - pass.length);
    hint.className = 'demo-hint err';
  } else {
    this.classList.add('valid');
    status.appendChild(makeCheck(true));
    hint.textContent = '';
    hint.className = 'demo-hint';
  }
});
</script>
</body>
</html>
